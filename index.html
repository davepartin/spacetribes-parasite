<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#081018">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="stp-build" content="v5.1.1">
<title>Space Tribes: Parasite</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#081018; --panel:#101c28; --panel2:#162636; --line:#2a4050;
  --text:#eef3f6; --dim:#8aa0ae; --energy:#f5c042; --danger:#ff5a4e;
  --good:#3ecf8e; --red:#e85a5a; --blue:#4da3ff; --green:#2db88a;
  --bio:#8dff6a; --ink:#071018; --die:#f4f1ea; --die-ink:#1a1a1a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif; min-height:100%; overscroll-behavior-y:contain;
  line-height:1.35; letter-spacing:0;}
body{background:
  radial-gradient(700px 420px at 50% -5%, #1a3a2a66, transparent),
  radial-gradient(600px 400px at 100% 40%, #3a152055, transparent),
  var(--bg);}
#app{max-width:520px;margin:0 auto;padding:10px 12px 180px;position:relative;min-height:100vh;z-index:1;}
.cta-spacer{height:8px;margin-bottom:12px;}
h1,h2,h3{margin:0 0 6px;font-family:'Orbitron',sans-serif;letter-spacing:.03em;line-height:1.2;}
h3{font-size:15px;}
button{font-family:inherit;border:none;cursor:pointer;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:800;
  background:var(--energy);color:var(--ink);border:1.5px solid #c49020;box-shadow:none;
  letter-spacing:.01em;}
.btn:active{transform:scale(.98);filter:brightness(.95);}
.btn:disabled,.btn.disabled{background:#1a2834;color:#6a7a88;border-color:#2a4050;box-shadow:none;pointer-events:none;filter:none;}
.btn.danger{background:#c43a32;color:#fff;border-color:#e04840;}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--dim);box-shadow:none;font-weight:600;}
.btn.reroll{background:#2a6a9a;color:#fff;border-color:#4da3ff;margin-top:10px;font-weight:800;}
.btn.reroll:disabled,.btn.reroll.disabled{background:#1a2834;color:#6a7a88;border-color:#2a4050;}
.btn.reroll.sec{width:auto;display:inline-flex;align-items:center;justify-content:center;
  padding:8px 12px;font-size:12px;margin:0;border-radius:10px;white-space:nowrap;}
.btn.reroll.all{margin-top:0;margin-bottom:8px;}
.btn.par-reroll{background:#1a5a38;color:#c8ffd8;border-color:#3ecf8e;margin-top:10px;font-weight:800;}
.btn.par-reroll:disabled,.btn.par-reroll.disabled{background:#1a2834;color:#6a7a88;border-color:#2a4050;}
.btn.par-reroll.sec{width:auto;display:inline-flex;align-items:center;justify-content:center;
  padding:8px 12px;font-size:12px;margin:0;border-radius:10px;white-space:nowrap;}
.btn.par-reroll.all{margin-top:0;margin-bottom:8px;}
.roll-sec{margin:10px 0 6px;padding:8px 8px 4px;border:1px solid var(--line);border-radius:12px;background:#0c1218aa;}
.roll-sec-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
.roll-sec-head .lane-label{margin:0;flex:1;}
.roll-top-actions{display:flex;flex-direction:column;gap:6px;margin:8px 0;}
.host-step{margin:9px 0;padding:10px;border:1.5px solid var(--line);border-radius:12px;background:#101d28;}
.host-step.pending{opacity:.62;background:#0c151e;}
.host-step.done{border-color:#3ecf8e55;background:#10231d;}
.host-step.compact{padding:8px 10px;}
.host-step-head{display:flex;align-items:center;gap:9px;min-width:0;}
.host-step-number{display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex:0 0 28px;border-radius:50%;
  background:var(--energy);color:var(--ink);font:800 15px/1 'IBM Plex Mono',monospace;box-shadow:0 2px 7px #0007;}
.host-step.done .host-step-number{background:var(--good);}
.host-step-copy{flex:1;min-width:0;}
.host-step-title{font-size:14px;font-weight:800;line-height:1.1;color:var(--text);}
.host-step-sub{font-size:10px;color:var(--dim);line-height:1.2;margin-top:2px;}
.host-step-status{flex:0 0 auto;padding:4px 6px;border-radius:7px;border:1px solid #f5c04255;background:#f5c04216;
  color:var(--energy);font:800 9px/1 'IBM Plex Mono',monospace;text-transform:uppercase;white-space:nowrap;}
.host-step-status.ready,.host-step-status.done{border-color:#3ecf8e55;background:#3ecf8e16;color:var(--good);}
.host-step-status.optional{border-color:#4da3ff55;background:#4da3ff16;color:#9ad7ff;}
.host-step-body{margin-top:8px;}
.btn.lock-side{background:#2a4a7a;color:#fff;border-color:#4da3ff;margin-top:8px;font-weight:800;}
.btn.lock-side.par{background:#1a5a38;color:#c8ffd8;border-color:#3ecf8e;}
.btn.lock-side:disabled,.btn.lock-side.disabled{background:#1a2834;color:#6a7a88;border-color:#2a4050;}
.btn.lock-side.done{background:#122018;border:1.5px solid var(--good);color:var(--good);}
.par-energy{text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:14px;
  color:var(--bio);margin:8px 0 4px;}
.panel.locked-side{opacity:.72;border-color:var(--good)!important;}
.lock-badge{display:inline-block;margin-left:6px;padding:2px 7px;border-radius:99px;font-size:10px;
  font-weight:800;letter-spacing:.06em;background:#3ecf8e33;color:var(--good);vertical-align:middle;}
.bot-tag{display:inline-block;margin-left:5px;padding:2px 5px;border-radius:6px;background:#3ecf8e22;border:1px solid #3ecf8e66;
  color:#9aefc8;font:800 8px/1 'IBM Plex Mono',monospace;letter-spacing:.06em;vertical-align:middle;}
.bot-mode-btn.on{border-color:var(--good);background:#102b20;color:#9aefc8;}
.bot-seat-note{padding:8px 10px;border-radius:9px;background:#3ecf8e12;border:1px solid #3ecf8e44;color:#9aefc8;
  font-size:12px;font-weight:800;text-align:center;}
.move-grid{display:grid;gap:8px;margin:8px 0;}
.growth-opt.move{border-color:#8dff6a55;}
.growth-opt.move.feed{border-color:#3ecf8e66;}
.growth-opt.move.harden{border-color:#4aa8ff66;}
.growth-opt.move.outbreak{border-color:#ff5a4e66;}
.growth-opt.move.poison{border-color:#c77dff66;}
.growth-opt.move.picked{box-shadow:0 0 0 1px #8dff6a55;}
.target-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.btn.target{padding:8px 10px;font-size:12px;background:var(--panel2);border:1.5px solid var(--line);color:var(--text);box-shadow:none;}
.btn.target.on{border-color:var(--energy);background:#2a2410;color:var(--energy);}
.die-faces{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;
  letter-spacing:.02em;line-height:1.2;}
.die-option-reference{margin:8px 0 5px;padding:8px;border:1px solid var(--line);border-radius:10px;background:#0a131c;}
.die-option-title{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;}
.die-option-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;}
.die-option-chip{position:relative;min-width:0;min-height:43px;padding:6px 4px;border:1.5px solid var(--line);border-radius:9px;
  background:#142230;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.05;}
button.die-option-chip{width:100%;font:inherit;cursor:pointer;touch-action:manipulation;}
button.die-option-chip:active{transform:scale(.97);}
.die-option-chip b{font:800 11px/1.05 'IBM Plex Mono',monospace;white-space:normal;}
.die-option-chip span{font-size:8px;color:#d1dfeb;margin-top:3px;line-height:1.05;}
.die-option-chip.current{border-color:var(--energy);box-shadow:0 0 0 2px #f5c04255;background:#2a2414;}
.die-option-chip.current span{color:var(--energy);font-weight:800;}
.die-option-chip.base-face{background:#66501d;color:#fff0b0;}
.die-option-chip.energy-face{background:#194d79;color:#d9efff;}
.die-option-chip.pct{background:#155b45;color:#d8fff0;}
.die-option-chip.points-face{background:#533582;color:#f0e3ff;}
.die-option-chip.scar{background:#4a1822;color:#ffd7dc;}
.die-option-chip.specialty{padding-right:18px;background:#3f3415;color:#fff1a8;border-color:#f5c04255;}
.die-option-chip.specialty::after{content:'?';position:absolute;right:5px;top:5px;width:13px;height:13px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;background:#f5c042;color:#171006;font:800 9px/1 sans-serif;}
.mod-face-reference{padding:9px 7px;}
.mod-face-reference .face-strip{margin:4px 0 1px;gap:7px;flex-wrap:nowrap;align-items:flex-start;}
.mod-face-option{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-width:0;}
.mod-face-option .face-chip{cursor:default;flex:0 0 auto;}
.mod-face-option .mod-face-meta{min-height:10px;margin-top:5px;color:var(--dim);font:800 8px/1 'IBM Plex Mono',monospace;
  letter-spacing:.03em;text-align:center;text-transform:uppercase;white-space:nowrap;}
.mod-face-option.current .mod-face-meta{color:var(--energy);}
.crit-math{margin-top:4px;padding:3px 6px;border-radius:7px;background:#f5c04218;border:1px solid #f5c04255;
  color:var(--energy);font:800 10px/1.25 'IBM Plex Mono',monospace;white-space:nowrap;}
.extra-roll-link{align-self:center;margin:0 0 22px;color:var(--energy);font:800 18px/1 'IBM Plex Mono',monospace;}
.specialty-resolution{margin:7px 0 0;padding:8px 10px;border-radius:9px;background:#f5c04212;border:1px solid #f5c04244;
  color:#ffe7a0;font-size:12px;line-height:1.35;text-align:center;}
.par-receipt{margin-top:8px;border:1px solid #8dff6a44;border-radius:10px;overflow:hidden;background:#08130f;}
.par-receipt-title{padding:7px 9px;background:#8dff6a12;color:var(--bio);font:800 11px/1.2 'IBM Plex Mono',monospace;
  letter-spacing:.05em;text-transform:uppercase;}
.par-receipt-row{display:grid;grid-template-columns:minmax(88px,.8fr) minmax(0,1.7fr) auto;gap:8px;align-items:center;
  padding:7px 9px;border-top:1px solid #8dff6a20;font-size:11px;line-height:1.25;}
.par-receipt-row .name{color:var(--text);font-weight:800;}.par-receipt-row .why{color:var(--dim);min-width:0;}
.par-receipt-row .amount{color:var(--energy);font:800 13px/1 'IBM Plex Mono',monospace;white-space:nowrap;}
.par-receipt-row.total{background:#8dff6a12;}.par-receipt-row.total .name,.par-receipt-row.total .amount{color:var(--bio);font-size:15px;}
@media (max-width:400px){
  .dice-row.par-row .die{width:56px;height:56px;border-radius:12px;}
  .dice-row.par-row .die .face-num{width:26px;height:26px;font-size:17px;}
  .mod-face-reference{padding-left:5px;padding-right:5px;}
  .mod-face-reference .face-strip{gap:5px;}
  .mod-face-reference .face-chip.energy-face,.mod-face-reference .face-chip.pct,
  .mod-face-reference .face-chip.base-face,.mod-face-reference .face-chip.points-face,
  .mod-face-reference .face-chip.scar{width:43px;height:43px;border-radius:10px;font-size:10px;}
  .mod-face-option .mod-face-meta{font-size:7px;}
  .par-receipt-row{grid-template-columns:minmax(76px,.75fr) minmax(0,1.45fr) auto;gap:5px;padding:7px 7px;font-size:10px;}
  .dice-row.par-row .die .num{font-size:15px;}
  .dice-row.par-row .die.instinct .num{font-size:11px;}
  .dice-row.par-row{gap:6px;}
  .host-step{padding:9px 8px;}
  .host-step-head{gap:7px;}
  .host-step-number{width:26px;height:26px;flex-basis:26px;font-size:13px;}
  .host-step-status{padding:4px 5px;font-size:8px;}
}
.small{font-size:13px;color:var(--dim);line-height:1.4;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}
.starfield i{position:absolute;width:2px;height:2px;border-radius:50%;background:#c8ffe8;opacity:.4;animation:tw 3s infinite;}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.6}}
.grid-scan{display:none;}

.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.char-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:16px 8px;
  text-align:center;color:inherit;min-width:0;}
.char-card:active{transform:scale(.96);}
.char-card .avatar{font-size:44px;display:block;}
.seat-mark{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;flex:0 0 auto;line-height:0;vertical-align:middle;}
.seat-mark svg{width:100%;height:100%;display:block;filter:drop-shadow(0 2px 4px #0008);}
.char-card .seat-mark,.roster-name-row .seat-mark{width:44px;height:44px;}
.me-chip .seat-mark{width:26px;height:26px;}
.standings-bar .seat-mark{width:16px;height:16px;}
.wait-row .seat-mark,.reveal-row .seat-mark{width:26px;height:26px;}
.award-row .seat-mark{width:18px;height:18px;margin-right:2px;}
.rnode .seat-mark{display:inline-flex;width:18px;height:18px;margin:0 auto;}
.who-chip{display:inline-flex;align-items:center;gap:6px;min-width:0;vertical-align:middle;}
.standings-bar .sb-name{display:flex;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parasite-art{display:inline-block;filter:drop-shadow(0 0 18px #8dff6a55);animation:pulse 2.8s infinite;line-height:0;}
.parasite-art img{display:block;border-radius:18px;width:100%;height:auto;max-width:160px;margin:0 auto;
  box-shadow:0 0 0 2px #8dff6a33, 0 8px 24px #0009;}
.char-card .cname{font-size:18px;font-weight:800;margin-top:4px;font-family:'Orbitron',sans-serif;}
.char-card .ctitle{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.roster-card{background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;color:inherit;}
.roster-card.on{border-color:var(--energy);box-shadow:0 0 0 1px #f5c04255;}
.roster-card .rname{font-weight:800;font-family:'Orbitron',sans-serif;margin-top:4px;}
.roster-meta{text-align:center;margin:8px 0;color:var(--dim);font-size:13px;}
.roster-meta b{color:var(--energy);}
.roster-count{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.roster-count button{min-width:48px;padding:10px 0;border-radius:12px;border:2px solid var(--line);background:var(--panel2);color:inherit;font-family:'Orbitron',sans-serif;font-weight:800;}
.roster-count button.on{border-color:var(--energy);background:#f5c04222;color:var(--energy);}
.roster-names{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px;}
.roster-name-row{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 10px;}
.roster-name-row .seat-label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);min-width:52px;}
.roster-name-row input,.claim-name{flex:1;min-width:0;background:#0a1018;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:16px;font-family:'Rajdhani',sans-serif;font-weight:700;}
.roster-name-row input:focus,.claim-name:focus{outline:none;border-color:var(--energy);}
.char-card.claim{cursor:default;text-align:left;padding:12px;}
.char-card.claim .claim-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.char-card.claim .claim-row .btn{margin:0;padding:10px 12px;font-size:13px;width:auto;}
.char-card .cname.empty{color:var(--dim);font-style:italic;font-weight:600;}
@media (max-width:420px){
  .char-grid{grid-template-columns:1fr;}
}

.chrome-sticky{position:sticky;top:0;z-index:22;background:linear-gradient(#081018fc,#081018f5);
  backdrop-filter:blur(10px);padding:4px 0 5px;margin:0 0 8px;border-bottom:1px solid #2a405055;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:5px;margin:0;padding:0;min-height:0;}
.standings-bar{border:1px solid var(--line);border-radius:12px;padding:8px 8px 6px;margin:0 0 10px;
  background:var(--panel);box-shadow:0 4px 14px #0005;}
.standings-bar .sb-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.standings-bar .sb-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;}
.standings-bar .sb-chip{min-width:0;display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);
  border-radius:9px;padding:7px 7px;font-family:'IBM Plex Mono',monospace;}
.standings-bar .sb-chip.me{border-color:var(--energy);box-shadow:0 0 0 1px #f5c04233;}
.standings-bar .sb-chip.lead{border-color:#f5c04266;}
.standings-bar .sb-name{justify-content:flex-start;flex:1;min-width:0;}
.standings-bar .sb-name span{overflow:hidden;text-overflow:ellipsis;}
.standings-bar .sb-pts{font-size:14px;font-weight:800;color:var(--energy);line-height:1;margin-left:auto;}
.mod-status-line{font-size:12px;color:var(--dim);margin:0 0 10px;line-height:1.35;}
.me-chip{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);
  border-radius:999px;padding:3px 8px 3px 4px;font-weight:700;font-size:12px;color:inherit;line-height:1.1;min-width:0;}
.me-chip .seat-mark{width:18px;height:18px;}
.me-chip .who{gap:5px;font-size:12px;}
.me-chip .em{font-size:14px;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px 8px;
  font-weight:700;font-size:12px;display:flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;
  line-height:1.1;white-space:nowrap;}
.stat-chip.energy{color:var(--energy);border-color:#f5c04255;}
.stat-chip.base{color:var(--good);border-color:#3ecf8e55;}
.stat-chip.base.dim{color:var(--dim);border-color:var(--line);}
.stat-chip.par-en{color:var(--bio);border-color:#8dff6a55;}
.stat-chip.pts{color:var(--energy);}
.round-strip{display:flex;gap:4px;margin:0 0 10px;overflow-x:auto;padding-bottom:2px;}
.rnode{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:58px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel);
  text-align:center;padding:4px 2px 5px;position:relative;}
.rnode .rn{font-size:9px;color:var(--dim);font-weight:700;}
.rnode .re{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;line-height:1.15;font-weight:800;margin-top:2px;font-family:'IBM Plex Sans',sans-serif;}
.rnode.now{border-color:var(--energy);box-shadow:0 0 10px #f5c04233;}
.rnode.done{opacity:.4;}
.rnode.late{background:#1a1810;}
.rnode .rw{position:absolute;top:-5px;right:-3px;font-size:10px;}
.strip-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:0 0 4px;}

.turn-coach{border-radius:12px;padding:12px;margin-bottom:10px;border:1.5px solid var(--line);
  background:linear-gradient(135deg,#122030,#0e2818);}
.turn-coach.parasite{background:linear-gradient(135deg,#2a1218,#142018);border-color:#8dff6a44;}
.turn-coach .step{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--energy);margin-bottom:4px;}
.turn-coach .title{font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;line-height:1.15;}
.turn-coach .how{font-size:14px;color:var(--text);margin-top:6px;line-height:1.4;}
.turn-coach .how b{color:var(--energy);}

.role-banner{display:none;}

.dice-row{display:flex;justify-content:center;align-items:flex-start;gap:10px;margin:10px 0;flex-wrap:wrap;}
.dice-row.par-row{gap:8px;}
.die-wrap{text-align:center;position:relative;}
.die-wrap.selected .die{box-shadow:0 0 0 3px var(--energy), 0 6px 16px #0008;}
/* Solid yellow silhouette ring for clip-path dice (box-shadow gets clipped away). */
.die-wrap.selected:has(.die.d8)::before,
.die-wrap.selected:has(.die.d10)::before,
.die-wrap.selected:has(.die.d12)::before{
  content:'';position:absolute;left:50%;top:-4px;width:76px;height:76px;margin-left:-38px;
  background:var(--energy);pointer-events:none;z-index:0;
}
.die-wrap.selected:has(.die.d8)::before{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.die-wrap.selected:has(.die.d10)::before{clip-path:polygon(50% 0,91% 27%,84% 76%,50% 100%,16% 76%,9% 27%);}
.die-wrap.selected:has(.die.d12)::before{clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);}
.die-wrap.selected .die.d8,
.die-wrap.selected .die.d10,
.die-wrap.selected .die.d12{
  position:relative;z-index:1;box-shadow:none;
  filter:drop-shadow(0 4px 3px #0009);
}
.die-wrap.can-pick{cursor:pointer;}
.die-wrap.roll-pick{appearance:none;background:transparent;color:inherit;font:inherit;cursor:pointer;
  border:2px solid transparent;border-radius:14px;padding:5px;margin:0;min-width:78px;touch-action:manipulation;}
.die-wrap.roll-pick:active{transform:scale(.97);}
.die-wrap.roll-pick.picked{border-color:var(--energy);background:#f5c04214;
  box-shadow:0 0 0 2px #f5c04255,0 5px 14px #0007;}
.die-wrap.roll-pick.picked .die-sub{color:var(--energy);font-weight:800;}
.die-wrap.roll-pick:focus-visible{outline:2px solid #fff;outline-offset:2px;}
.die{width:68px;height:68px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  position:relative;margin:0 auto;background:var(--die);color:var(--die-ink);font-weight:800;
  font-family:'IBM Plex Mono',monospace;
  box-shadow:inset 0 2px 0 #fff8, inset 0 -6px 0 #0002, 0 6px 14px #0007;
  border:1px solid #0002;}
.die.d8,.die.d10,.die.d12{border-radius:0;border:0;filter:drop-shadow(0 4px 3px #0009);isolation:isolate;}
/* Fast CSS polyhedrals: one clipped silhouette + one translucent facet layer. */
.die.d8{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.die.d10{clip-path:polygon(50% 0,91% 27%,84% 76%,50% 100%,16% 76%,9% 27%);}
.die.d12{clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);}
.die.d8::after,.die.d10::after,.die.d12::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;}
.die.d8::after{background:conic-gradient(from -45deg at 50% 50%,rgba(255,255,255,.28) 0 25%,rgba(255,255,255,.08) 25% 50%,rgba(0,0,0,.24) 50% 75%,rgba(0,0,0,.08) 75% 100%);}
.die.d10::after{background:conic-gradient(from -36deg at 50% 47%,rgba(255,255,255,.26) 0 20%,rgba(255,255,255,.08) 20% 40%,rgba(0,0,0,.2) 40% 60%,rgba(0,0,0,.09) 60% 80%,rgba(255,255,255,.04) 80% 100%);}
.die.d12::after{background:conic-gradient(from -30deg at 50% 50%,rgba(255,255,255,.24) 0 16.66%,rgba(255,255,255,.1) 16.66% 33.33%,rgba(0,0,0,.02) 33.33% 50%,rgba(0,0,0,.2) 50% 66.66%,rgba(0,0,0,.1) 66.66% 83.33%,rgba(255,255,255,.05) 83.33% 100%);}
.die.d8 .pips,.die.d10 .pips,.die.d12 .pips,.die .poly-num{position:relative;z-index:3;}
.die .poly-num{color:#fff;text-shadow:0 2px 3px #000b,0 0 5px #fff5;font-size:25px;}
/* Solid color dice: white pips + white number (starter + bought extras) */
.die.red{background:linear-gradient(160deg,#ef5a5a,#c22e3e);color:#fff;border:1px solid #8a1a28;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #e85a5a44;}
.die.blue{background:linear-gradient(160deg,#4da3ff,#216fbf);color:#fff;border:1px solid #154a86;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #4da3ff44;}
.die.green{background:linear-gradient(160deg,#35c894,#1a8f68);color:#fff;border:1px solid #0f5c42;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #2db88a44;}
.die.attack{background:linear-gradient(160deg,#e87840,#b84820);color:#fff;border:1px solid #7a2a10;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #e8784044;}
.die.mod{background:linear-gradient(160deg,#6adf7a,#2a9a48);color:#fff;border:1px solid #186030;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #8dff6a33;}
/* Human mod die — same size as crew dice, color by face kind */
.die.hmod{background:linear-gradient(160deg,#f0c040,#c49220);color:#1a1208;border:1px solid #8a6a10;
  box-shadow:inset 0 2px 0 #ffffff55, inset 0 -5px 0 #00000035, 0 6px 14px #f5c04255;}
.die.hmod.energy{background:linear-gradient(160deg,#5eb0ff,#2a6fbf);color:#fff;border-color:#154a86;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #4da3ff44;}
.die.hmod.pct{background:linear-gradient(160deg,#4adf9a,#1a8f68);color:#fff;border-color:#0f5c42;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #2db88a44;}
.die.hmod.base{background:linear-gradient(160deg,#f0c040,#c49220);color:#1a1208;border-color:#8a6a10;}
.die.hmod.points{background:linear-gradient(160deg,#c9a0ff,#7a4fc4);color:#fff;border-color:#5a2a9a;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #a78bfa44;}
.die.hmod.scar{background:
  linear-gradient(125deg, transparent 44%, #8a304055 47%, #a0405088 50%, #8a304055 53%, transparent 56%),
  linear-gradient(160deg,#c43a4a,#4a1018);color:#fff;border-color:#8a2030;
  box-shadow:inset 0 2px 0 #ffffff28, inset 0 -5px 0 #00000050, 0 6px 16px #ff5a4e33;}
.die.hmod.scar .num{font-size:12px;letter-spacing:.02em;font-weight:800;line-height:1.15;white-space:pre-line;}
.die.hmod.off{background:linear-gradient(160deg,#3a4450,#1a2228);color:#8aa0ae;border-color:#2a4050;
  box-shadow:inset 0 2px 0 #ffffff10, inset 0 -5px 0 #0006, 0 6px 14px #0006;}
.die .num{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.die.red .num,.die.blue .num,.die.green .num{color:#fff;}
.die.attack .num,.die.mod .num{font-size:22px;color:#fff;}
.die.hmod .num{font-size:17px;line-height:1.1;padding:4px;text-align:center;color:inherit;}
.die.instinct .num{font-size:13px;line-height:1.1;padding:4px;text-align:center;color:inherit;}
.die .pips{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:84%;height:84%;gap:0;}
.die .pips i{border-radius:50%;background:#1c2430;place-self:center;width:62%;height:62%;box-shadow:inset 0 1px 2px #0005;}
.die.red .pips i,.die.blue .pips i,.die.green .pips i,.die.attack .pips i{background:#fff;box-shadow:0 1px 1px #0005;}
.die.mod .pips i{background:#fff;}
.die .face-num{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;z-index:2;
  color:var(--die-ink);background:var(--die);box-shadow:none;}
.die.red .face-num{color:#fff;background:#c22e3e;}
.die.blue .face-num{color:#fff;background:#216fbf;}
.die.green .face-num{color:#fff;background:#1a8f68;}
.die.attack .face-num{color:#fff;background:#b84820;}
.die.mod .face-num{color:#fff;background:#2a9a48;}
/* Bought bonus die: light diagonal hatch + corner + (same color family as starter) */
.die.bonus::before{content:'';position:absolute;inset:2px;border-radius:12px;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(-38deg,transparent 0 4px,rgba(255,255,255,.3) 4px 6px);}
.die.bonus .pips,.die.bonus .num{position:relative;z-index:2;}
.die.bonus .face-num{z-index:3;}
.die.bonus .die-bonus-mark{position:absolute;top:2px;right:4px;z-index:4;font-size:11px;font-weight:800;
  line-height:1;color:#fff;text-shadow:0 1px 2px #000a;pointer-events:none;}
.die .corner-num{display:none;}
.die.rolling{animation:shake .5s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) translateY(-5px)}
  50%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
.die-label{font-size:11px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.die-label.red{color:var(--red);} .die-label.blue{color:var(--blue);} .die-label.green{color:var(--green);}
.die-sub{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;line-height:1.2;}
.reroll-flash{animation:flashy .45s;}
@keyframes flashy{0%{box-shadow:0 0 0 4px var(--energy)}100%{}}

.face-strip{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.face-chip{width:36px;height:36px;border-radius:8px;border:1.5px solid #0003;background:var(--die);
  color:var(--die-ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;
  box-shadow:inset 0 -3px 0 #0002, 0 2px 6px #0004;}
.face-chip.hot{background:linear-gradient(160deg,#fff8e0,#f5c042);border-color:#c49020;}
/* Forge face chips — match the selected Attack die color so you know which die you're bumping */
.face-chip.red,.face-chip.blue,.face-chip.green{
  width:46px;height:46px;border-radius:11px;font-size:22px;font-weight:800;line-height:1;
  color:#fff;text-shadow:0 1px 2px #000a;letter-spacing:-.02em;
  box-shadow:inset 0 2px 0 #ffffff45, inset 0 -4px 0 #00000045, 0 3px 10px #0006;
}
.face-chip.red{background:linear-gradient(160deg,#ef5a5a,#c22e3e);border:1.5px solid #8a1a28;}
.face-chip.blue{background:linear-gradient(160deg,#4da3ff,#216fbf);border:1.5px solid #154a86;}
.face-chip.green{background:linear-gradient(160deg,#35c894,#1a8f68);border:1.5px solid #0f5c42;}
.face-chip.red{--forge-face-bg:linear-gradient(160deg,#ef5a5a,#c22e3e);}
.face-chip.blue{--forge-face-bg:linear-gradient(160deg,#4da3ff,#216fbf);}
.face-chip.green{--forge-face-bg:linear-gradient(160deg,#35c894,#1a8f68);}
/* Keep the full rectangular phone tap target, but shape the visible forge face to match its die. */
.face-chip.forge-d8,.face-chip.forge-d10,.face-chip.forge-d12{
  border:0;background:transparent;box-shadow:none;isolation:isolate;
}
.face-chip.forge-d8::after,.face-chip.forge-d10::after,.face-chip.forge-d12::after{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:var(--forge-facets),var(--forge-face-bg);
  filter:drop-shadow(0 3px 3px #0008);
}
.face-chip.forge-d8{--forge-facets:conic-gradient(from -45deg at 50% 50%,rgba(255,255,255,.28) 0 25%,rgba(255,255,255,.08) 25% 50%,rgba(0,0,0,.24) 50% 75%,rgba(0,0,0,.08) 75% 100%);}
.face-chip.forge-d8::after{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.face-chip.forge-d10{--forge-facets:conic-gradient(from -36deg at 50% 47%,rgba(255,255,255,.26) 0 20%,rgba(255,255,255,.08) 20% 40%,rgba(0,0,0,.2) 40% 60%,rgba(0,0,0,.09) 60% 80%,rgba(255,255,255,.04) 80% 100%);}
.face-chip.forge-d10::after{clip-path:polygon(50% 0,91% 27%,84% 76%,50% 100%,16% 76%,9% 27%);}
.face-chip.forge-d12{--forge-facets:conic-gradient(from -30deg at 50% 50%,rgba(255,255,255,.24) 0 16.66%,rgba(255,255,255,.1) 16.66% 33.33%,rgba(0,0,0,.02) 33.33% 50%,rgba(0,0,0,.2) 50% 66.66%,rgba(0,0,0,.1) 66.66% 83.33%,rgba(255,255,255,.05) 83.33% 100%);}
.face-chip.forge-d12::after{clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);}
.face-chip.forge-d8.hot::after,.face-chip.forge-d10.hot::after,.face-chip.forge-d12.hot::after,
.face-chip.forge-d8.forged::after,.face-chip.forge-d10.forged::after,.face-chip.forge-d12.forged::after{
  filter:drop-shadow(0 0 2px var(--energy)) drop-shadow(0 3px 3px #0008);
}
/* Same yellow silhouette ring as choose-die: halo lives on a WRAPPER outside clip-path isolation. */
.face-chip-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:54px;height:54px;flex:0 0 auto;}
.face-chip-wrap .face-chip{position:relative;z-index:1;margin:0;}
.face-chip-wrap.picked::before{content:'';position:absolute;left:50%;top:50%;width:54px;height:54px;
  margin:-27px 0 0 -27px;background:var(--energy);pointer-events:none;z-index:0;}
.face-chip-wrap.forge-d8.picked::before{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.face-chip-wrap.forge-d10.picked::before{clip-path:polygon(50% 0,91% 27%,84% 76%,50% 100%,16% 76%,9% 27%);}
.face-chip-wrap.forge-d12.picked::before{clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);}
.face-strip.forge-faces{overflow:visible;gap:10px;padding:4px 2px;}
.face-chip.red.hot,.face-chip.blue.hot,.face-chip.green.hot{
  box-shadow:inset 0 2px 0 #ffffff55, inset 0 -4px 0 #00000040, 0 0 0 2px var(--energy), 0 3px 12px #f5c04255;
}
/* Bonus / NEW die faces — same diagonal hatch as the die */
.face-chip.bonus{position:relative;overflow:visible;}
.face-chip.bonus::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(-38deg,transparent 0 3px,rgba(255,255,255,.28) 3px 5px);}
.face-chip.forge-d8.bonus::before{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);z-index:1;}
.face-chip.forge-d10.bonus::before{clip-path:polygon(50% 0,91% 27%,84% 76%,50% 100%,16% 76%,9% 27%);z-index:1;}
.face-chip.forge-d12.bonus::before{clip-path:polygon(25% 4%,75% 4%,100% 50%,75% 96%,25% 96%,0 50%);z-index:1;}
.face-chip.red.bonus,.face-chip.blue.bonus,.face-chip.green.bonus{color:#fff;}
.face-chip.blank{background:var(--panel2);color:var(--dim);border-color:var(--line);box-shadow:none;}
.face-chip.flat{background:#2a2010;color:var(--energy);border-color:#f5c04255;}
.face-chip.picked{outline:2px solid var(--energy);outline-offset:2px;}
.face-chip.forged{box-shadow:0 0 0 2px var(--energy), inset 0 -3px 0 #0002;}
.face-chip.red.forged,.face-chip.blue.forged,.face-chip.green.forged{
  box-shadow:0 0 0 2px var(--energy), inset 0 2px 0 #ffffff45, inset 0 -4px 0 #00000045;
}
.face-chip.forge-d8.hot,.face-chip.forge-d10.hot,.face-chip.forge-d12.hot,
.face-chip.forge-d8.picked,.face-chip.forge-d10.picked,.face-chip.forge-d12.picked,
.face-chip.forge-d8.forged,.face-chip.forge-d10.forged,.face-chip.forge-d12.forged{
  outline:0;box-shadow:none;
}
.forge-level{position:absolute;right:-5px;top:-7px;z-index:5;min-width:22px;height:22px;padding:0 4px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;background:#101c28;color:#fff;border:2px solid var(--energy);
  font:800 10px/1 'IBM Plex Mono',monospace;box-shadow:0 2px 6px #0009;}
.face-chip{position:relative;}
/* Mod-die shop faces — mini dice */
.face-chip.energy-face,.face-chip.pct,.face-chip.base-face,.face-chip.points-face,.face-chip.scar{
  width:48px;height:48px;border-radius:12px;font-size:12px;line-height:1.05;padding:3px;
  text-align:center;white-space:pre-line;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -4px 0 #00000040, 0 3px 10px #0006;}
.face-chip.scar{width:54px;height:54px;}
.face-chip.energy-face{background:linear-gradient(160deg,#5eb0ff,#2a6fbf);color:#fff;border:1px solid #154a86;}
.face-chip.pct{background:linear-gradient(160deg,#4adf9a,#1a8f68);color:#fff;border:1px solid #0f5c42;}
.face-chip.base-face{background:linear-gradient(160deg,#f0c040,#c49220);color:#1a1208;border:1px solid #8a6a10;}
.face-chip.points-face{background:linear-gradient(160deg,#c9a0ff,#7a4fc4);color:#fff;border:1px solid #5a2a9a;}
.face-chip.scar{
  background:
    linear-gradient(125deg, transparent 44%, #8a304055 47%, #a0405088 50%, #8a304055 53%, transparent 56%),
    linear-gradient(160deg,#5a1520,#2a080e);
  color:#fff;border:1.5px solid #7a303899;font-size:10px;font-weight:800;letter-spacing:.02em;
  line-height:1.1;text-shadow:none;
  box-shadow:inset 0 2px 0 #ffffff18, inset 0 -4px 0 #00000055, 0 3px 10px #0006;
  display:flex;align-items:center;justify-content:center;padding:4px;
}
.face-chip.scar .scar-chip-inner{text-align:center;white-space:pre-line;line-height:1.1;color:#fff;text-shadow:none;}
.face-chip.scar .scar-chip-inner.scar-big{font-size:15px;color:#fff;}
.face-chip.scar .scar-chip-inner.scar-words{font-size:9px;font-weight:800;color:#fff;}
.face-chip.scar .scar-chip-inner.scar-blank{font-size:10px;color:#fff;font-weight:700;}
.face-chip.scar.scar-color{padding:5px;}

.shop-item{display:flex;flex-direction:column;align-items:stretch;gap:10px;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.shop-item .si-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.shop-item .si-name{font-weight:700;font-size:14px;}
.shop-item .si-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}
.shop-item .si-cost{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  color:var(--energy);background:#f5c04218;border:1px solid #f5c04244;border-radius:8px;padding:5px 8px;}
.buy-btn{background:var(--panel2);color:var(--text);font-weight:700;border-radius:10px;padding:10px 12px;font-size:13px;
  white-space:nowrap;border:1.5px solid var(--line);box-shadow:none;font-family:'IBM Plex Sans',sans-serif;}
.buy-btn:active{transform:scale(.98);filter:brightness(.95);}
.buy-btn.primary{background:var(--energy);color:var(--ink);border-color:#c49020;font-weight:800;}
.buy-btn:disabled{background:#1a2834;color:#5a6a78;border-color:#2a4050;filter:none;}
.buy-btn.owned{background:transparent;border:1.5px solid var(--good);color:var(--good);}
.die-wrap.new-die .die{outline:2px solid var(--energy);outline-offset:2px;}
.die-wrap.new-die .die-sub{color:var(--energy);font-weight:800;letter-spacing:.04em;}

.cat-picks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.cat-pick{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:14px;
  border:2px solid var(--line);background:linear-gradient(180deg,#142230,#0c1822);color:var(--text);
  font-weight:700;font-size:12px;cursor:pointer;box-shadow:inset 0 1px 0 #ffffff10;width:100%;min-width:0;}
.cat-pick .cp-die{pointer-events:none;}
.cat-pick .cp-die .die{width:56px;height:56px;border-radius:12px;margin:0;}
.cat-pick .cp-die .die .face-num{width:24px;height:24px;font-size:15px;}
.cat-pick .cp-name{letter-spacing:.02em;font-size:13px;font-weight:800;}
.cat-pick .cp-meta{font-size:11px;font-weight:800;color:var(--energy);font-family:'IBM Plex Mono',monospace;}
.cat-pick.red{border-color:#e85a5a;background:linear-gradient(180deg,#2a1418,#120c12);}
.cat-pick.red .cp-name{color:#ffb0b0;}
.cat-pick.blue{border-color:#4da3ff;background:linear-gradient(180deg,#142436,#0c1420);}
.cat-pick.blue .cp-name{color:#a8d4ff;}
.cat-pick.green{border-color:#2db88a;background:linear-gradient(180deg,#143028,#0c1814);}
.cat-pick.green .cp-name{color:#9aefc8;}
.cat-pick:disabled{opacity:.35;cursor:default;}
.cat-pick.picked{border-color:var(--energy);box-shadow:0 0 0 2px #f5c04255, inset 0 1px 0 #ffffff14;background:#1a2810;}
.cat-pick.picked.red{background:linear-gradient(180deg,#3a1a1e,#1a1012);}
.cat-pick.picked.blue{background:linear-gradient(180deg,#1a2a40,#101820);}
.cat-pick.picked.green{background:linear-gradient(180deg,#1a3024,#101814);}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper .buy-btn{min-width:40px;padding:8px 0;text-align:center;}
.stepper .step-val{min-width:28px;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:16px;}
.par-upgrade-list{display:grid;gap:7px;margin:8px 0 10px;}
.par-upgrade{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:10px;

/** v5 tuning — Growth Attack does the table scaling; only the stipend varies. */
function parasiteTuning(n){
  n = Math.max(MIN_PLAYERS, Math.min(MAX_PLAYERS, n|0 || 6));
  return {
    n, crew: n - 1,
    parStipend: ({3:5, 4:6, 5:7, 6:7})[n] || 7,
    mirrorSeed: CFG.mirrorSeedPerCrew * (n - 1),
  };
}
/** Parasite Growth Attack — beta × previous round's true crew total, + permanent hold bumps. */
function mirrorBetaFor(n){
  const map = CFG.mirrorBetaBy || {};
  return map[n] != null ? map[n] : CFG.mirrorBeta;
}
function parasiteBaseAttackNow(parasite, n){
  const t = parasiteTuning(n || (parasite && parasite.balanceN) || 6);
  const prevCrew = (parasite && parasite.prevCrew != null) ? parasite.prevCrew : t.mirrorSeed;
  const offset = ((CFG.mirrorOffsetBy||{})[t.n]|0);
  const mirror = Math.round(mirrorBetaFor(t.n) * prevCrew) + offset;
  const stored = (parasite && parasite.holdBumps)|0;
  return { stored, seatBonus: mirror, mirror, prevCrew, total: mirror + stored };
}
function hostParStipendNow(){
  return parasiteTuning(tableSize(G)).parStipend;
}
function rankPtsFor(n, high, low){
  n = Math.max(1, n|0);
  if (n === 1) return [high];
  const out = [];
  for (let i=0;i<n;i++) out.push(Math.max(low, Math.round(high - (high-low)*i/(n-1))));
  return out;
}
function ordinalPlace(place){
  const j = place % 10, k = place % 100;
  if (j===1 && k!==11) return place+'st';
  if (j===2 && k!==12) return place+'nd';
  if (j===3 && k!==13) return place+'rd';
  return place+'th';
}

function ensureForgeLevels(d){
  if (!d) return [];
  const n = (d.faces||[]).length;
  if (!Array.isArray(d.forgeLevels)) d.forgeLevels = Array(n).fill(0);
  while (d.forgeLevels.length < n) d.forgeLevels.push(0);
  if (d.forgeLevels.length > n) d.forgeLevels.length = n;
  d.forgeLevels = d.forgeLevels.map(v=>Math.max(0,Math.min(CFG.maxForgeLevel||2,v|0)));

    if (ok) return s;
  }
  // greedy fallback
  const byCount = {};
  items.forEach(p => { byCount[p]=(byCount[p]||0)+1; });
  const out = [];
  while (out.length < items.length){

function randInt(maxExclusive){

  const acc = opts.acc || { atk:0, energy:0, reroll:0, pct:0 };
  let attack = (rolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  const colorSum = c => (rolls||[]).filter(d=>d.color===c).reduce((s,d)=>s+(d.v||0), 0);

  // Claim preview: locking a claim face banks it THIS round (stacking — always adds)
  let claim = null, scorePts = 0, modLabel = 'no mod', gainScar = false;
  let permBase = Math.max(0, (acc.atk|0));
  let pctNow = Math.max(0, (acc.pct|0));
  if (modRoll && modRoll.kind==='scar'){ gainScar = true; modLabel = 'gain Wound'; }
  else if (modRoll && modRoll.kind==='points'){ scorePts = modRoll.value|0; modLabel = '+'+scorePts+' pts (no combat)'; }
  else if (modRoll && CLAIM_KINDS.includes(modRoll.kind)){
    claim = { kind: modRoll.kind, value: modRoll.value|0 };
    if (modRoll.kind==='atk'){ permBase += claim.value; modLabel = 'Bank Base +'+claim.value; }
    else if (modRoll.kind==='pct'){ pctNow += claim.value; modLabel = 'Bank +'+claim.value+'%'; }
    else if (modRoll.kind==='energy'){ modLabel = 'Bank +'+claim.value+'⚡/round'; }
    else if (modRoll.kind==='reroll'){ modLabel = 'Bank +'+claim.value+'🎲/round'; }
  } else if (modRoll && modRoll.kind==='base'){
    // legacy face
    claim = { kind:'atk', value: modRoll.value|0 };
    permBase += claim.value;
    modLabel = 'Bank Base +'+claim.value;
  }

  // Scar hits — drain hits energy, shatter/− color hit the total
  let shatterSub = 0, colorSub = 0, pendingDrain = 0;
  (scarRolls||[]).forEach(s=>{
    if (!s || s.id==='blank') return;
    if (s.id==='drain') pendingDrain += 2;
    else if (s.id==='shatter') shatterSub += Math.max(0, ...(rolls||[]).map(d=>d.v||0));
    else if (s.id==='red' || s.id==='blue' || s.id==='green') colorSub += Math.floor(0.5 * colorSum(s.id));
    else if (s.id==='bleed') colorSub += Math.floor(0.2 * attack); // legacy face safety
  });

  const modAdd = Math.floor(attack * pctNow / 100);
  let total = attack + permBase + modAdd - shatterSub - colorSub;
  total = Math.max(0, total);
  const scarLabels = (scarRolls||[]).filter(s=>s && s.id!=='blank').map(s=>{
    const face = scarFaceById(s.id);
    return face ? scarFacePlain(face) : (s.label||'');
  }).filter(Boolean);
  return {
    attack, total, modAdd, scorePts, modLabel, claim, gainScar,
    permBase, pctNow, claimedBase: claim && claim.kind==='atk' ? claim.value : 0,
    pendingEnergy: 0, pendingDrain,
    scarLabel: scarLabels.join(' · ').replace(/\n/g,' '),
    shatterSub, colorSub, scarRolls,
  };
}

/** v5 parasite portion: Growth Attack + Attack Dice + Specialty + color path + Feeding Time. */
function computeParasitePortion(parasite, aRolls, instinctRoll, opts){
  opts = opts || {};
  const atk = (aRolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  let instinctAdd = 0;
  let instinctNote = instinctRoll;
  const instId = instinctRoll && instinctRoll.id ? instinctRoll.id : instinctRoll;
  if (instId === 'gnash') instinctAdd = 8;
  else if (instId === 'fever') instinctAdd = Math.floor(atk * 0.25);
  else if (instId === 'twin'){
    const vals = (aRolls||[]).map(d=>d.v||0);
    instinctAdd = vals.length ? Math.min(...vals) : 0;
  } else if (instId === 'echo'){
    instinctAdd = opts.highestHumanDie || 0;
  } else if (instId === 'explode'){
    instinctAdd = opts.instinctExtra|0;
    instinctNote = 'explode';
  }
  const n = opts.n != null ? opts.n : (parasite.balanceN || 6);
  const baseInfo = parasiteBaseAttackNow(parasite, n);
  const baseAtk = baseInfo.total;
  const channel = opts.channel || null;
  const chanAdd = channel ? channelAddFor(channel, opts.hostRolls||[]) : 0;
  const woundAdd = Math.max(0, opts.woundCount|0) * CFG.woundAttack;
  const total = baseAtk + atk + instinctAdd + chanAdd + woundAdd;
  return {
    atk, instinctAdd, instinctNote, chanAdd, channel, woundAdd,
    baseAtk, baseMirror: baseInfo.mirror, baseStored: baseInfo.stored,
    flat: 0, pctAdd: 0, fusion: 0, aura: 0, tonightFlat: 0,
    total,
  };
}

/** Preserve the physical face and the CRIT bonus as separate, explainable values. */
function parasiteAttackRollParts(d){
  d = d || {};
  const total = Number(d.v)||0;

  const critBonus = d.critBonus != null ? Number(d.critBonus)||0 : (d.exploded ? Math.max(0,total-natural) : 0);
  return { natural, critBonus, total };
}

  return lead + (p.critBonus ? `${p.natural} + CRIT bonus ${p.critBonus} = ${p.total}` : `${p.total}`);

function resolvePlayerBundle(g, pid, action){
  const pl = g.players[pid];
  const a = action || {};
  const scarRolls = a.scarRolls || (a.scarRoll ? [a.scarRoll] : []);
  const br = computeHumanTotal(a.rolls, a.modRoll||null, scarRolls, 0, { acc: accOf(pl) });
  const drainDebt = br.pendingDrain||0;
  const ptsDelta = a.ptsDelta||0;
  const scorePts = br.scorePts||0;
  return { br, pending: 0, ptsDelta, scorePts, scarLoss: drainDebt, drainDebt };
}

/** Well-Rounded Bonus: at least one locked 6+ die in every attack color. */
function hasCombinedArms(rolls){
  return COLORS.every(color =>
    (rolls||[]).some(d => d && d.color===color && (d.v||0) >= CFG.combinedArmsMin)
  );
}
function combinedArmsProgress(rolls){

    name: COLOR_META[color].name,
    high: Math.max(0, ...(rolls||[]).filter(d=>d && d.color===color).map(d=>d.v||0)),
  }));
}
function addPointAward(award, label, amount){
  amount = Number(amount)||0;
  if (!award || !amount) return;
  award.pts += amount;
  award.pointLines = award.pointLines || [];
  award.pointLines.push({ label, pts: amount });
}

/* ================= ROUND RESOLUTION ================= */
function resolveRound(g){
  const r = g.round;
  const roster = rosterOf(g);
  const actions = (g.rounds && g.rounds[r] && g.rounds[r].actions) || {};
  if (roster.some(p=>!actionLocked(actions[p]))) return g;
  if (g.rounds[r].result) return g;

  const kind = roundKind(r, g);
  const hostId = kind==='infection' ? hostIdForRound(g, r) : null;
  const n = roster.length;

  // --- 1) apply everyone's shop spends ---
  roster.forEach(pid=>{
    const a = actions[pid], pl = g.players[pid];
    accOf(pl);
    let spent = 0;
    let addedDie = null;
    if (a.addDie && canAddColor(pl, a.addDie, null)){
      spent += nextHumanDieCost(pl);
      const fromRoll = (a.rolls||[]).find(d=>d.tempNew);
      addedDie = { id:fromRoll?fromRoll.dieId:uid(a.addDie[0]), color:a.addDie, faces:stdFaces(), size:6, baseStart:1, forgeLevels:Array(6).fill(0), bonus:true };
      pl.dice.push(addedDie);
    }
    (a.sizeUps||[]).forEach(dieId=>{
      const d = dieId==='preview' ? addedDie : findDie(pl.dice, dieId);
      if (d && applySizeUp(d, CFG.maxDieSize)) spent += CFG.sizeUpCost;
    });
    (a.forges||[]).forEach(f=>{
      const d = f.dieId==='preview' ? addedDie : findDie(pl.dice, f.dieId);
      if (d && applyForge(d, f.faceIndex, CFG.forgeBump)) spent += CFG.forgeCost;
    });
    (a.modUps||[]).forEach(idx=>{
      const face = pl.modDie[idx];
      if (face && face.kind!=='scar' && (face.level|0) < modMaxLevel(face)){
        face.level += 1;
        spent += CFG.modUpgradeCost;
      }
    });
    spent += Math.max(0, a.rerollBuys||0) * CFG.rerollCost;
    const healN = Math.max(0, a.healScars||0);
    spent += healN * (CFG.healScarCost||3);
    for (let h=0; h<healN; h++) healOneScar(pl);
    pl.energy = Math.max(0, (pl.energy||0) - spent);
  });

  // --- 2) bundles (claim previews included in totals) ---
  const rolls = {}, bundles = {}, breakdown = {};
  roster.forEach(pid=>{
    const a = actions[pid];
    rolls[pid] = deep(a.rolls||[]);
    bundles[pid] = resolvePlayerBundle(g, pid, a);
  });

  // --- 3) bank claims / scars from the Mod lock (STACKING — every lock adds) ---
  roster.forEach(pid=>{
    const a = actions[pid], pl = g.players[pid];
    const mr = normalizeModRoll(a.modRoll);
    if (mr && mr.kind==='scar') addScarDie(pl);
    else if (mr && (CLAIM_KINDS.includes(mr.kind) || mr.kind==='base')){
      const k = mr.kind==='base' ? 'atk' : mr.kind;
      accOf(pl)[k] += Math.max(0, mr.value|0);
      pl.baseAtk = accOf(pl).atk; // legacy header mirror
    }
  });

  const awards = {};
  roster.forEach(p=> awards[p]={pts:0, energy:0, tags:[], pointLines:[], pendingEnergy:0});
  roster.forEach(pid=>{
    const pack = bundles[pid];
    breakdown[pid] = {
      attack: pack.br.attack, total: pack.br.total, modAdd: pack.br.modAdd, modLabel: pack.br.modLabel,
      permBase: pack.br.permBase||0, claimedBase: pack.br.claimedBase||0, scorePts: pack.scorePts||0,
      claim: pack.br.claim||null,
      modRoll: deep(actions[pid].modRoll||null), scarRoll: deep(actions[pid].scarRoll||null),
      pendingEnergy: 0, ptsDelta: pack.ptsDelta,
      scars: scarCount(g.players[pid]), scarRolls: deep(actions[pid].scarRolls||[]),
      shatterSub: pack.br.shatterSub||0, colorSub: pack.br.colorSub||0,
    };
    awards[pid].drainDebt = pack.drainDebt||0;
    if (pack.ptsDelta) addPointAward(awards[pid], 'Roll adjustment', pack.ptsDelta);
    if (pack.scorePts){
      addPointAward(awards[pid], 'Mod die Points face', pack.scorePts);
      awards[pid].tags.push('mod-pts');
    }
    if (hasCombinedArms(rolls[pid])){
      addPointAward(awards[pid], 'Well-Rounded Bonus', CFG.combinedArmsPts);
      awards[pid].tags.push('combined-arms');
    }
  });

  // --- INFECTION ---
  if (kind==='infection'){
    const humans = roster.filter(p=>p!==hostId);
    const hAct = actions[hostId];
    const channel = hAct.channel || (hAct.growth && hAct.growth.key) || 'sever';
    const woundTargets = [...new Set(Array.isArray(hAct.woundTargets) ? hAct.woundTargets : [])]
      .filter(pid=> humans.includes(pid) && scarCount(g.players[pid]) < CFG.maxScars)
      .slice(0,CFG.maxFeedTargets||2);

    // parasite shop: stipend + bank pay for buys and rerolls; leftover banks
    g.parasite.bank = (g.parasite.bank||0) + parasiteTuning(n).parStipend;
    const parBuys = hAct.parBuys||{};
    const spentPar = applyParShop(g.parasite, parBuys);
    const parRerolls = Math.max(0, hAct.parRerolls||0);
    g.parasite.bank = Math.max(0, g.parasite.bank - spentPar - parRerolls);

    // crew total (+ SEVER cancels the crew's top dice)
    const humanTotals = {};
    let crewTotalRaw = 0;
    humans.forEach(h=>{
      humanTotals[h] = { attack: bundles[h].br.attack, total: bundles[h].br.total };
      crewTotalRaw += bundles[h].br.total;
    });
    let severed = [], severSub = 0;
    if (channel==='sever'){
      const all = [];
      humans.forEach(h=> (rolls[h]||[]).forEach((d,di)=> all.push({ pid:h, di, v:d.v||0 })));
      all.sort((a,b)=> b.v - a.v);
      severed = all.slice(0, CFG.severN).map(x=>({ pid:x.pid, di:x.di, v:x.v }));
      severSub = severed.reduce((s,x)=> s + x.v, 0);
      severed.forEach(x=>{ if (rolls[x.pid] && rolls[x.pid][x.di]) rolls[x.pid][x.di].severed = true; });
    }
    const crewTotal = Math.max(0, crewTotalRaw - severSub);

    const hostHuman = bundles[hostId].br;
    const highestHumanDie = Math.max(0, ...(hAct.rolls||[]).map(d=>d.v||0));
    const parPart = computeParasitePortion(g.parasite, hAct.aRolls||[], hAct.instinctRoll, {
      n, hostRolls: hAct.rolls||[], channel, woundCount: woundTargets.length,
      highestHumanDie, instinctExtra: hAct.instinctExtra|0,
    });
    const hostTotal = hostHuman.total + parPart.total;
    const hostWins = hostTotal > crewTotal; // ties go to the crew

    // Optional greed: each chosen crewmate takes one Wound and gives +2 parasite attack.
    let scarsCreated = 0;
    woundTargets.forEach(pid=>{ if (addScarDie(g.players[pid])) scarsCreated++; });

    // outcome
    if (hostWins){
      addPointAward(awards[hostId], 'Parasite round win', CFG.hostWinPts(r, g));
      awards[hostId].energy += CFG.hostWinEn;
      awards[hostId].tags.push('host-win-energy');
    } else {
      humans.forEach(h=>{
        addPointAward(awards[h], 'Crew round win', CFG.humanWinPts(r, g));
        awards[h].energy += CFG.winEn;
        awards[h].tags.push('win-energy');
      });
      const ladder = CFG.ladderPts(r, g);
      const ladderWinners = humans.slice().sort((a,b)=> humanTotals[b].total - humanTotals[a].total).slice(0, ladder.length);
      ladderWinners.forEach((h,i)=>{
        addPointAward(awards[h], 'Attack MVP #'+(i+1), ladder[i]);
        awards[h].tags.push('ladder-'+(i+1));
      });
      g.parasite.holdBumps = (g.parasite.holdBumps|0) + ((CFG.holdBumpBy||{})[n] != null ? CFG.holdBumpBy[n] : CFG.holdBump);
    }
    g.parasite.bossMeter = (g.parasite.bossMeter||0) + scarsCreated + (hostWins ? 1 : 0);

    // categories among crew — severed dice don't count
    const cats = {};
    COLORS.forEach(c=>{
      const best = humans.map(h=>{
        const vals = (rolls[h]||[]).filter(d=>d.color===c && !d.severed).map(d=>d.v);
        return { h, v: vals.length ? Math.max(...vals) : -1 };
      }).sort((a,b)=>b.v-a.v);
      if (best.length>=2 && best[0].v > best[1].v && best[0].v >= 0) cats[c] = best[0].h;
      else if (best.length===1 && best[0].v>=0) cats[c] = best[0].h;
      else cats[c] = null;
      if (cats[c]){
        addPointAward(awards[cats[c]], COLOR_META[c].name+' color win', CFG.catPts(r, g));
        awards[cats[c]].energy += CFG.catEn;
        awards[cats[c]].tags.push('cat-'+c);
      }
    });

    // Growth Attack remembers true crew strength (before Green's cancellation).
    g.parasite.prevCrew = crewTotalRaw;

    // points, then next-round income (stipend + Base Energy + underdog)
    roster.forEach(p=>{
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
    });
    const minPts = Math.min(...roster.map(p=>g.players[p].pts||0));
    roster.forEach(p=>{
      awards[p].energy += CFG.roundStipend + (accOf(g.players[p]).energy|0);
      if ((g.players[p].pts||0) === minPts){
        awards[p].energy += CFG.underdogEn;
        awards[p].tags.push('underdog');
      }
      g.players[p].energy += awards[p].energy;
      if (awards[p].drainDebt) g.players[p].energy = Math.max(0, g.players[p].energy - awards[p].drainDebt);
    });

    g.rounds[r].result = {
      kind, hostId, hostWins, crewSize: humans.length,
      crewTotal, crewTotalRaw, hostTotal,
      hostHuman: hostHuman.total, hostAttack: hostHuman.attack,
      parPart, growth: { key: channel, target: null },
      channel, channelTarget: null, woundTargets, pathVersion: 2,
      severed, severSub, scarsCreated,
      baseAttackBump: hostWins ? 0 : CFG.holdBump,
      rolls, humanTotals, breakdown, cats, mvp: null, awards,
      aRolls: hAct.aRolls||[], pModRoll: null,
      instinctRoll: hAct.instinctRoll, instinctExtra: hAct.instinctExtra||0,
      instinctExtraRoll: hAct.instinctExtraRoll||null,
      bossMeter: g.parasite.bossMeter,
      finalTarget: bossHP(g),
      parasiteAfter: deep(g.parasite),
      resolvedAt: Date.now(),
    };
  }

  // --- BOSS ---
  else if (kind==='boss'){
    const totals = {};
    let crewTotal = 0;
    roster.forEach(pid=>{
      totals[pid] = bundles[pid].br.total;
      crewTotal += totals[pid];
    });
    const hp = bossHP(g);
    const hpParts = bossHPParts(g);
    const cleared = crewTotal >= hp;
    g.escaped = !cleared;
    const order = roster.slice().sort((a,b)=> totals[b]-totals[a]);
    const bonus = rankPtsFor(roster.length, cleared ? 12 : 4, 1);
    order.forEach((pid,i)=>{
      addPointAward(awards[pid], cleared ? 'Boss hero rank #'+(i+1) : 'Boss escape rank #'+(i+1), bonus[i]||1);
      awards[pid].tags.push(cleared ? 'hero' : 'escape');
    });
    if (cleared){
      addPointAward(awards[order[0]], 'Boss top attack', CFG.killBlowPts);
      awards[order[0]].tags.push('kill');
    }
    roster.forEach(p=>{
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      if (awards[p].drainDebt) g.players[p].energy = Math.max(0, g.players[p].energy - awards[p].drainDebt);
    });
    g.rounds[r].result = {
      kind, rolls, totals, breakdown, crewTotal, hp, hpParts, cleared, escaped: !cleared,
      awards, hero: order[0], bossMeter: g.parasite.bossMeter,
      resolvedAt: Date.now(),
    };
  }

  if (r >= totalRounds(g)) g.status = 'over';
  else g.round = r + 1;
  return g;
}

const APP_BUILD = 'v5.1.2';
let connectTimer = null;
let restPollTimer = null;
let usingRest = false;
let fbReady = false;

function configOK(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('PASTE'); }
function dbRoot(){ return String(firebaseConfig.databaseURL||'').replace(/\/$/,''); }

function normalizeGame(v){
  if (!v || typeof v !== 'object') return v;
  const g = v;
  if (!g.rounds) g.rounds = {};
  if (!g.players) g.players = {};
  if (!Array.isArray(g.roster) || g.roster.length < MIN_PLAYERS){
    // legacy 4-seat games
    const legacy = DEFAULT_ROSTER.filter(p => g.players && g.players[p]);
    g.roster = legacy.length >= MIN_PLAYERS ? legacy : DEFAULT_ROSTER.slice();
  }
  g.roster = g.roster.filter(p => knownSeat(p));
  g.playerIds = g.roster.slice();
  if (!Array.isArray(g.schedule) || g.schedule.length !== infectionSlots(g)){
    // keep existing if plausible; otherwise rebuild from roster (2N slots, everyone twice)
    if (!Array.isArray(g.schedule) || g.schedule.length !== infectionSlots(g)) g.schedule = buildHostSchedule(g.roster);
  }
  if (!g.parasite) g.parasite = starterParasite(g.roster.length);
  else {
    const t = parasiteTuning(g.roster.length);
    if (g.parasite.prevCrew == null) g.parasite.prevCrew = t.mirrorSeed;
    if (g.parasite.holdBumps == null) g.parasite.holdBumps = 0;
    if (g.parasite.bank == null) g.parasite.bank = 0;
    if (!Array.isArray(g.parasite.attack) || !g.parasite.attack.length) g.parasite.attack = starterParasite(g.roster.length).attack;
    (g.parasite.attack||[]).forEach(d=>{
      if (!d) return;
      if (d.size == null) d.size = d.faces && d.faces.length >= 7 ? d.faces.length : 8;
      d.color = 'attack'; d.baseStart = 3; ensureForgeLevels(d);
    });
    if (g.parasite.balanceN == null) g.parasite.balanceN = t.n;
  }
  rosterOf(g).forEach(pid=>{
    let pl = g.players[pid];
    if (!pl){
      pl = g.players[pid] = {
        name:'', isBot:false, pts:0, energy:CFG.roundStipend, dice:starterDice(), modDie:starterModDie(),
        acc: starterAcc(), baseAtk:0, scars:0, perks:{ freeReroll:false },
      };
    }
    pl.isBot = !!pl.isBot;
    if (pl.name == null || pl.name === ''){
      if (LEGACY_NAMES[pid]) pl.name = LEGACY_NAMES[pid];
      else pl.name = '';
    } else {
      pl.name = cleanPlayerName(pl.name);
    }
    if (!pl.dice) pl.dice = starterDice();
    (pl.dice||[]).forEach(d=>{
      if (d && d.bonus == null) d.bonus = !isStarterDieId(d.id);
    });
    if (!pl.modDie) pl.modDie = starterModDie();
    normalizeHumanModDie(pl);
    accOf(pl);
    pl.baseAtk = accOf(pl).atk|0; // legacy header mirror
    (pl.dice||[]).forEach(d=>{
      if (!d) return;
      if (d.size == null) d.size = (d.faces && d.faces.length >= 7) ? d.faces.length : 6;
      d.baseStart = 1; ensureForgeLevels(d);
    });
    if (!pl.perks) pl.perks = { freeReroll:false };
    if (pl.scars == null){
      // migrate legacy scarLv / poisonLv into scar dice count
      pl.scars = Math.min(CFG.maxScars||6, (pl.scarLv||0) + (pl.poisonLv||0));
    }
    if (pl.energy == null) pl.energy = CFG.roundStipend;
    if (pl.pts == null) pl.pts = 0;
    delete pl.path;
    delete pl.scarLv;
    delete pl.poisonLv;
  });
  if (g.parasite && g.parasite.bossMeter == null) g.parasite.bossMeter = 0;
  return g;
}

function applyRemoteGame(v){
  try{
    if (!v){
      ui.showRosterPick = true;
      ui.pendingCount = loadSavedCount();
      ui.pendingNames = Array(ui.pendingCount).fill('');
      G = null;
      render();
      return;
    }
    if ((v.schema||1) < SCHEMA){
      G = normalizeGame({ ...v, status:'need_reset' });
      render();
      return;
    }
    G = normalizeGame(v);
    fbReady = true;
    if (connectTimer){ clearTimeout(connectTimer); connectTimer=null; }
    maybeResolve();
    render();
  }catch(err){
    console.error(err);
    showConnectError(err && err.message ? err.message : String(err));
  }
}

function showConnectError(msg){
  const app = $('#app');
  if (!app) return;
  app.innerHTML = `<div class="panel center">
    <h2>Can't reach the ship</h2>
    <p class="small">${esc(msg||'Connection stalled.')}</p>
    <p class="small">Build ${APP_BUILD}. Check signal, then retry.</p>
    <button class="btn" onclick="retryConnect()">Retry connection</button>
    <button class="btn ghost" style="margin-top:8px" onclick="confirmResetGame()">Force new game</button>
  </div>${bottomDockHTML()}`;
}

function restGetGame(){
  return fetch(dbRoot()+'/games/current.json', { cache:'no-store' })
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
function restPut(path, data){
  return fetch(dbRoot()+'/'+path+'.json', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data), cache:'no-store'
  }).then(r=>{ if(!r.ok) throw new Error('Write failed HTTP '+r.status); return r.json(); });
}

function startRestPolling(){
  if (restPollTimer) return;
  usingRest = true;
  const tick = ()=> restGetGame().then(applyRemoteGame).catch(err=> console.warn('rest poll', err));
  tick();
  restPollTimer = setInterval(tick, 2000);
}

function initFirebase(){
  connectTimer = setTimeout(()=>{
    if (fbReady || G) return;
    // Mobile WebSocket stall → REST fallback
    console.warn('Firebase SDK slow; switching to REST');
    startRestPolling();
  }, 2500);

  try{
    if (!window.firebase){
      showConnectError('Firebase failed to load. Hard-refresh the page.');
      startRestPolling();
      return;
    }
    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    gameRef = db.ref('games/current');
    gameRef.on('value', snap=> applyRemoteGame(snap.val()), err=>{
      console.error(err);
      showConnectError(err.message||'Database permission/network error');
      startRestPolling();
    });
    // connected probe
    db.ref('.info/connected').on('value', s=>{
      if (s.val() === true) fbReady = true;
    });
  }catch(err){
    console.error(err);
    showConnectError(err.message||String(err));
    startRestPolling();
  }
}

function retryConnect(){
  G = null; fbReady = false;
  if (restPollTimer){ clearInterval(restPollTimer); restPollTimer=null; }
  usingRest = false;
  render();
  initFirebase();
}

/* ================= BASIC COMPUTER PLAYER ================= */
function botSeededRandom(g, pid, round){
  let h = 2166136261 >>> 0;
  const text = String((g&&g.createdAt)||0)+'|'+String(pid)+'|'+String(round);
  for (let i=0;i<text.length;i++){
    h ^= text.charCodeAt(i);
    h = Math.imul(h,16777619) >>> 0;
  }
  return ()=>{
    h += 0x6D2B79F5;
    let t = h;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function botPick(list, rng){ return (list||[])[Math.floor(rng() * (list||[]).length)] || null; }
function botRollFace(faces, rng){
  const i = Math.floor(rng() * faces.length);
  return { index:i, value:faces[i] };
}
function botRollExploding(faces, rng){
  const first = botRollFace(faces,rng);
  const max = Math.max(...faces);
  let bonus = null, total = first.value;
  if (first.value===max){ bonus=botRollFace(faces,rng); total+=bonus.value; }
  return { index:first.index, value:total, shown:first.value, exploded:!!bonus, bonus };
}
function buildBasicBotAction(pid, g){
  const pl = g.players[pid];
  const r = g.round;
  const rng = botSeededRandom(g,pid,r);
  const kind = roundKind(r,g);
  const isHost = kind==='infection' && hostIdForRound(g,r)===pid;
  let energy = Math.max(0,pl.energy||0);
  const forges=[], modUps=[], sizeUps=[];
  let addDie=null, healScars=0;

  // Beginner shop: heal one bad Wound, then make one affordable permanent improvement.
  if (scarCount(pl)>0 && energy>=CFG.healScarCost && rng()<0.65){
    healScars=1; energy-=CFG.healScarCost;
  }
  const humanDice = deep(pl.dice||starterDice());
  const addCost = nextHumanDieCost(pl);
  const sizable = humanDice.filter(d=>dieSizeOf(d)<CFG.maxDieSize);
  const modChoices = (pl.modDie||[]).map((f,i)=>({f,i})).filter(x=>x.f&&x.f.kind!=='scar'&&(x.f.level|0)<modMaxLevel(x.f));
  const shopRoll = rng();
  if (shopRoll<0.22 && humanDice.length<6 && energy>=addCost){
    const counts={red:0,blue:0,green:0}; humanDice.forEach(d=>counts[d.color]=(counts[d.color]||0)+1);
    addDie = COLORS.slice().sort((a,b)=>counts[a]-counts[b])[0];
    energy-=addCost;
    humanDice.push({id:`bot_${pid}_${r}`,color:addDie,faces:stdFaces(),size:6,baseStart:1,forgeLevels:Array(6).fill(0),bonus:true,tempNew:true});
  } else if (shopRoll<0.48 && sizable.length && energy>=CFG.sizeUpCost){
    const d=sizable.slice().sort((a,b)=>dieSizeOf(a)-dieSizeOf(b))[0];
    sizeUps.push(d.id); energy-=CFG.sizeUpCost; applySizeUp(d,CFG.maxDieSize);
  } else if (shopRoll<0.72 && modChoices.length && energy>=CFG.modUpgradeCost){
    const pick=botPick(modChoices,rng); modUps.push(pick.i); energy-=CFG.modUpgradeCost;
  } else if (energy>=CFG.forgeCost){
    let best=null, low=Infinity;
    humanDice.forEach(d=>d.faces.forEach((v,i)=>{
      if (forgeLevelOf(d,i)<CFG.maxForgeLevel && v<low){ low=v; best={dieId:d.id,faceIndex:i}; }
    }));
    if (best){ forges.push(best); energy-=CFG.forgeCost; const d=findDie(humanDice,best.dieId); if(d) applyForge(d,best.faceIndex,CFG.forgeBump); }
  }

  const rolls = humanDice.map(d=>{
    const rf=botRollFace(d.faces,rng);
    return {dieId:d.id,color:d.color,faces:d.faces,size:dieSizeOf(d),index:rf.index,v:rf.value,first:rf.value,
      forgeLevel:forgeLevelOf(d,rf.index),rerolled:false,tempNew:!!d.tempNew,bonus:!!d.bonus};
  });
  const modPrev=deep(pl.modDie||starterModDie());
  modUps.forEach(i=>{ if(modPrev[i]&&modPrev[i].kind!=='scar') modPrev[i].level=Math.min(modMaxLevel(modPrev[i]),(modPrev[i].level|0)+1); });
  const mi=Math.floor(rng()*modPrev.length), mf=modPrev[mi];
  const modRoll={index:mi,kind:mf.kind,level:mf.level|0,value:modFaceValue(mf)};
  const scarRolls=[];
  const scarsActive=Math.max(0,scarCount(pl)-healScars);
  for(let s=0;s<scarsActive;s++){
    const si=Math.floor(rng()*SCAR_DIE_FACES.length), f=SCAR_DIE_FACES[si];
    scarRolls.push({index:si,id:f.id,label:scarFacePlain(f),color:f.color||null,level:1});
  }
  const action={phase:'locked',role:isHost?'host':'human',at:(g.createdAt||0)+r,
    forges,modUps,sizeUps,addDie,buyFreeReroll:false,rerollBuys:0,healScars,gainScar:modRoll.kind==='scar',
    rolls,modRoll,scarRolls,scarRoll:scarRolls[0]||null,ptsDelta:0,scarEnergyLoss:0};

  if (isHost){
    const bank=(g.parasite.bank||0)+parasiteTuning(rosterOf(g).length).parStipend;
    const pb={dice:0,sizes:0,forges:0};
    const canDie=(g.parasite.attack||[]).length<CFG.parMaxDice && bank>=nextParasiteDieCost(g.parasite);
    const canSize=(g.parasite.attack||[]).some(d=>dieSizeOf(d)<CFG.parMaxDieSize) && bank>=CFG.sizeUpCost;
    if (canDie && rng()<0.30) pb.dice=1;
    else if (canSize && rng()<0.55) pb.sizes=1;
    else pb.forges=1; // always affordable from the host stipend in normal play
    const fake=deep(g.parasite); applyParShop(fake,pb);
    const aRolls=(fake.attack||[]).map(d=>{
      const er=botRollExploding(d.faces,rng);
      return {dieId:d.id,faces:d.faces,size:dieSizeOf(d),index:er.index,v:er.value,shown:er.shown,
        critBonus:er.bonus?er.bonus.value:0,exploded:er.exploded,first:er.shown,rerolled:false};
    });
    const instIds=fake.instinct||INSTINCT_FACES.map(f=>f.id);
    const instinctRoll=botPick(instIds,rng);
    let instinctExtra=0, instinctExtraRoll=null;
    if(instinctRoll==='explode'){
      const er=botRollExploding(hotFaces(),rng); instinctExtra=er.value;
      instinctExtraRoll={index:er.index,v:er.value,shown:er.shown,critBonus:er.bonus?er.bonus.value:0,
        exploded:er.exploded,first:er.shown,faces:hotFaces(),size:hotFaces().length};
    }
    const channel=botPick(['ravage','crush','sever'],rng);
    const eligible=rosterOf(g).filter(p=>p!==pid&&scarCount(g.players[p])<CFG.maxScars);
    const want = rng()<0.70 ? (CFG.minFeedTargets||1) : (CFG.maxFeedTargets||2);
    const feedN=Math.min(eligible.length, Math.max(CFG.minFeedTargets||1, want));
    const woundTargets=shuffleWithRng(eligible,rng).slice(0,feedN);
    Object.assign(action,{channel,channelTarget:null,woundTargets,parBuys:pb,parRerolls:0,
      growth:{key:channel,target:null},aRolls,instinctRoll,instinctExtra,instinctExtraRoll});
  }
  return action;
}
function shuffleWithRng(list,rng){
  const out=(list||[]).slice();
  for(let i=out.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}
function fillMissingBotActions(g){
  if (!g || g.status!=='active') return false;
  const r=g.round;
  if(!g.rounds) g.rounds={};
  if(!g.rounds[r]) g.rounds[r]={actions:{}};
  if(!g.rounds[r].actions) g.rounds[r].actions={};
  let changed=false;
  rosterOf(g).forEach(pid=>{
    if(g.players[pid]&&g.players[pid].isBot&&!actionLocked(g.rounds[r].actions[pid])){
      g.rounds[r].actions[pid]=buildBasicBotAction(pid,g); changed=true;
    }
  });
  return changed;
}
let botWriteInFlight=false;
function saveMissingBotActions(){
  if(botWriteInFlight||!G||G.status!=='active') return;
  botWriteInFlight=true;
  if(usingRest||!gameRef){
    restGetGame().then(cur=>{
      cur=normalizeGame(cur||G); fillMissingBotActions(cur);
      const rr=cur.round, acts=(cur.rounds[rr]&&cur.rounds[rr].actions)||{};
      if(rosterOf(cur).every(p=>actionLocked(acts[p]))) cur=resolveRound(cur);
      return restPut('games/current',cur).then(()=>applyRemoteGame(cur));
    }).catch(err=>console.warn('computer turn',err)).finally(()=>{botWriteInFlight=false;});
    return;
  }
  gameRef.transaction(g=>{
    if(!g||g.status!=='active'||(g.schema||1)<SCHEMA) return;
    g=normalizeGame(g); fillMissingBotActions(g);
    const rr=g.round, acts=(g.rounds[rr]&&g.rounds[rr].actions)||{};
    return rosterOf(g).every(p=>actionLocked(acts[p])) ? resolveRound(g) : g;
  }).catch(err=>console.warn('computer turn',err)).finally(()=>{botWriteInFlight=false;});
}

function maybeResolve(retry){
  if (!G || G.status!=='active' || animating) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (!G.rounds) G.rounds = {};
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  const missingBot = rosterOf(G).some(p=>G.players[p]&&G.players[p].isBot&&!actionLocked(actions[p]));
  if(missingBot){ saveMissingBotActions(); return; }
  if (rosterOf(G).some(p=>!actionLocked(actions[p]))) return;
  if (G.rounds[r] && G.rounds[r].result) return;

  if (usingRest || !gameRef){
    // REST read-modify-write
    restGetGame().then(cur=>{
      cur = normalizeGame(cur || G);
      if (!cur || cur.status!=='active') return;
      if ((cur.schema||1) < SCHEMA) return;
      const rr = cur.round;
      const acts = (cur.rounds[rr] && cur.rounds[rr].actions) || {};
      if (rosterOf(cur).some(p=>!actionLocked(acts[p]))) return;
      if (cur.rounds[rr] && cur.rounds[rr].result) return;
      const next = resolveRound(cur);
      return restPut('games/current', next).then(()=>applyRemoteGame(next));
    }).catch(err=> console.warn('resolve rest', err));
    return;
  }

  gameRef.transaction(g=>{
    if (!g || g.status!=='active') return;
    if ((g.schema||1) < SCHEMA) return g;
    g = normalizeGame(g);
    return resolveRound(g);
  }).then(res=>{
    if (!res.committed && !retry) setTimeout(()=>maybeResolve(true), 400);
  }).catch(err=>{
    console.warn('transaction failed, REST fallback', err);
    usingRest = true;
    maybeResolve(true);
  });
}
function submitAction(action){
  if (!me || !G) return;
  submitActionFor(me, action);
}
function submitActionFor(pid, action){
  if (!pid || !G || !action) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (!G.rounds[r]) G.rounds[r] = { actions:{} };
  if (!G.rounds[r].actions) G.rounds[r].actions = {};
  if (actionLocked(G.rounds[r].actions[pid])) return;
  G.rounds[r].actions[pid] = action;
  render();
  maybeResolve();
  const path = 'games/current/rounds/'+r+'/actions/'+pid;
  if (usingRest || !gameRef){
    restPut(path, action)
      .then(()=> restGetGame().then(applyRemoteGame))
      .catch(err=>{
        if (pid === me) showConnectError(err.message||'Could not save your turn');
        else console.warn('seat save', err);
      });
    return;
  }
  gameRef.child('rounds/'+r+'/actions/'+pid).set(action).catch(err=>{
    console.warn(err);
    usingRest = true;
    submitActionFor(pid, action);
  });
}

function loadSavedCount(){
  try{
    const n = parseInt(localStorage.getItem('stp_table_n')||'4', 10);
    if (n >= MIN_PLAYERS && n <= MAX_PLAYERS) return n;
  }catch(e){}
  return 4;
}
function startNewGame(roster, names, botIds){
  const count = typeof roster === 'number' ? roster : (Array.isArray(roster) ? roster.length : (ui.pendingCount || loadSavedCount()));
  const ids = Array.isArray(roster) ? roster.filter(knownSeat) : ALL_PIDS.slice(0, count);
  let data;
  try{
    data = normalizeGame(newGameData(ids, names, botIds));
  }catch(err){
    alert(err.message || 'Bad table');
    ui.showRosterPick = true;
    render();
    return;
  }
  localStorage.setItem('stp_table_n', String(ids.length));
  if (me && (!ids.includes(me) || (data.players[me]&&data.players[me].isBot))){ me = null; localStorage.removeItem('stp_me'); }
  // If this phone already has a matching saved name, claim that seat
  try{
    const saved = cleanPlayerName(localStorage.getItem('stp_myname')||'');
    if (saved){
      const match = ids.find(p => data.players[p] && !data.players[p].isBot && cleanPlayerName(data.players[p].name||'').toLowerCase() === saved.toLowerCase());
      if (match){
        me = match;
        localStorage.setItem('stp_me', me);
      }
    }
  }catch(e){}
  session = null; cart = null;
  try{ localStorage.removeItem('stp_seen_'+(G && G.createdAt)); }catch(e){}
  ui.showRosterPick = false;
  G = data;
  render();
  const save = ()=> {
    if (gameRef && !usingRest){
      return gameRef.set(data).catch(()=> restPut('games/current', data));
    }
    return restPut('games/current', data);
  };
  save().then(()=> applyRemoteGame(data)).catch(err=> showConnectError(err.message||'Could not create game'));
}
function confirmResetGame(){
  if (G){
    if (!confirm('Are you sure you want to reset the whole game for all players?\n\nThis wipes the current run on every phone.')) return;
  }
  ui.pendingCount = (G && G.roster && G.roster.length) ? G.roster.length : loadSavedCount();
  if (G && G.players && rosterOf(G).length===ui.pendingCount){
    const bots = {};
    ui.pendingNames = rosterOf(G).map((pid,i) => {

function setPendingCount(n){

/** Can pay `cost` human reroll energy. Free covers a selected Attack die or a Mod/Wound section (not "all"). */
function canAffordHumanRerollCost(cost, opts){
  if (!session || session.humanLocked || session.phase!=='roll') return false;
  opts = opts || {};
  cost = Math.max(0, cost|0);
  const free = (opts.allowFree === false) ? 0 : (session.freeLeft||0);
  const needPaid = Math.max(0, cost - free);
  return energyLeft() >= needPaid;
}
function spendHumanRerollCost(cost, opts){
  opts = opts || {};
  if (!canAffordHumanRerollCost(cost, opts)) return false;
  cost = Math.max(0, cost|0);
  let remaining = cost;
  if (opts.allowFree !== false){
    while (remaining > 0 && (session.freeLeft||0) > 0){
      session.freeLeft--;
      remaining--;

function canAffordParRerollCost(cost, opts={}){

function spendParRerollCost(cost, opts={}){

function previewHumanDice(pl){
  const dice = deep(pl.dice);
  if (cart.addDie) dice.push({ id:'preview', color:cart.addDie, faces:stdFaces(), size:6, baseStart:1, forgeLevels:Array(6).fill(0), bonus:true });
  (cart.sizeUps||[]).forEach(dieId=>{

    if (d) applySizeUp(d, CFG.maxDieSize);
  });
  (cart.forges||[]).forEach(f=>{

function previewModDie(pl){
  const m = deep(pl.modDie);
  (cart.modUps||[]).forEach(idx=>{

  });
  return m;
}

/* ================= RENDER SHELL ================= */
function render(){
  const app = $('#app');
  try{
  if (!configOK()){ app.innerHTML = setupScreen(); return; }
  if (!G){
    app.innerHTML = `<div class="panel center"><h2 class="brand-hero" style="font-size:18px">SPACE TRIBES</h2><p>Connecting…</p><p class="small">Build ${APP_BUILD}. If this hangs, wait 3s for backup link.</p><button class="btn ghost" onclick="retryConnect()">Retry now</button><button class="btn" style="margin-top:8px" onclick="confirmResetGame()">New game</button></div>${bottomDockHTML()}`;
    return;
  }
  if (G.status==='need_reset'){
    app.innerHTML = `<div class="panel center">
      <h2>Schema v${SCHEMA}</h2>
      <p class="small">v5.1: 3–6 players, everyone hosts once per half, then fights the parasite dice the table built. Start a fresh game.</p>
      <button class="btn" onclick="confirmResetGame()">Start new game</button>
    </div>${bottomDockHTML()}${rosterPickModalHTML()}`;
    return;
  }
  if (me && G && (!rosterOf(G).includes(me) || (G.players[me]&&G.players[me].isBot))){
    me = null; localStorage.removeItem('stp_me');
  }
  if (!me){ app.innerHTML = charSelectScreen() + rosterPickModalHTML(); return; }
  if (G.status==='over'){
    const TR = totalRounds(G);
    const res = G.rounds[TR] && G.rounds[TR].result;
    if (res && lastSeen() < TR){
      app.innerHTML = chromeHTML() + verdictHTML(TR) + bottomDockHTML() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
      return;
    }
    app.innerHTML = chromeHTML() + finalScreen() + bottomDockHTML() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
    setTimeout(runFinalReveal, 50);
    return;
  }
  // auto-show last result if unseen
  const prev = G.round - 1;
  if (prev >= 1 && G.rounds[prev] && G.rounds[prev].result && lastSeen() < prev && !animating){
    app.innerHTML = chromeHTML() + verdictHTML(prev) + bottomDockHTML() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
    return;
  }
  app.innerHTML = gameScreen() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
  }catch(err){
    console.error(err);
    showConnectError('Render error: '+(err && err.message ? err.message : String(err)));
  }
}
