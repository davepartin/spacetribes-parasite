function claimSeat(pid){
  if (!G || !rosterOf(G).includes(pid)) return;
  if (G.players[pid] && G.players[pid].isBot){ alert('That seat is a Computer. Join an open human seat instead.'); return; }
  const el = document.getElementById('claim-'+pid);
  const name = cleanPlayerName(el && el.value);
  if (!name){ alert('Type your name first.'); return; }
  // block duplicate names on other seats
  const clash = rosterOf(G).find(p => p!==pid && cleanPlayerName((G.players[p]&&G.players[p].name)||'').toLowerCase()===name.toLowerCase());
  if (clash){ alert('That name is already taken.'); return; }
  const prev = cleanPlayerName((G.players[pid]&&G.players[pid].name)||'');
  if (prev && prev.toLowerCase() !== name.toLowerCase()){
    if (!confirm('Replace "'+prev+'" with "'+name+'" on this seat?')) return;
  }
  G.players[pid].name = name;
  delete G.players[pid].path;
  me = pid;
  localStorage.setItem('stp_me', pid);
  localStorage.setItem('stp_myname', name);
  render();
  const save = ()=> {
    const payload = { name };
    if (gameRef && !usingRest){
      return gameRef.child('players/'+pid).update(payload).catch(()=> restPatchPlayer(pid, payload));
    }
    return restPatchPlayer(pid, payload);
  };
  save().catch(err => console.warn('claim save', err));
}
function restPatchPlayer(pid, payload){
  return restGetGame().then(g=>{
    if (!g || !g.players || !g.players[pid]) return null;
    Object.assign(g.players[pid], payload);
    return restPut('games/current', g);
  }).catch(()=>null);
}
function pickChar(p){
  // back-compat for older calls / tests
  claimSeat(p);
}

function roundStripHTML(){
  let nodes = '';
  const TR = totalRounds(G);
  for (let r=1;r<=TR;r++){
    const kind = roundKind(r);
    const now = r===G.round;
    const done = r < G.round || (G.status==='over' && r<=TR);
    let label = '';
    let cls = '';
    if (kind==='training'){ label = 'Train'; cls='train'; }
    else if (kind==='boss'){ label = 'Boss'; cls='boss'; }
    else if (kind==='skirmish'){ label = 'All'; cls='train'; }
    else {
      const hid = hostIdForRound(G, r);
      if (r === G.round || (G.rounds[r] && G.rounds[r].result)){
        label = `${crewImg(hid)}<span>${esc(playerShort(hid).slice(0,6))}</span>`;
      } else {
        label = '???'; cls+=' fog';
      }
    }
    const res = G.rounds[r] && G.rounds[r].result;
    let mark = '';
    if (res){
      if (res.kind==='infection') mark = res.hostWins ? '💀' : '🛡️';
      if (res.kind==='boss') mark = res.cleared ? '🏆' : '🛸';
      if (res.kind==='training' || res.kind==='skirmish') mark = '✨';
    }
    nodes += `<div class="rnode ${now?'now':''} ${done&&!now?'done':''} ${cls}"><div class="rn">R${r}</div><div class="re">${label}</div>${mark?`<div class="rw">${mark}</div>`:''}</div>`;
  }
  return `<div class="strip-label">Mission progress</div><div class="round-strip">${nodes}</div>`;

  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  const locked = actionLocked(actions[me]);
  let title, how, stepLabel = `Round ${r} · ${kind}`;

  if (locked){
    title = 'Waiting on the crew';
    how = `Your roll is locked. Hang tight until everyone submits.`;
  } else if (kind==='training'){
    if (phase==='roll'){
      title = 'Training — roll';
      how = `Tap a low Attack die to reroll only it, or reroll Mod/Wound, then <b>Lock in</b>. Categories score too.`;

      how = `${tip('forge','Forge')}, upgrade ${tip('mod','Mod')}, or heal. Then tap <b>Roll dice</b>. No parasite this round.`;

      title = 'Skirmish — roll';
      how = `No host. Tap an Attack die to reroll only it if needed, then <b>Lock in</b>.`;
    } else {
      title = 'Skirmish — shop';
      how = `No host this round — score like training. Shop, then <b>Roll dice</b>.`;
    }
  } else if (kind==='boss'){
    if (phase==='roll'){
      title = 'THE REVEAL — roll';
      how = `Crew vs <b>${bossHP(G)} HP</b>. Push your total, then <b>Lock in</b>.`;

      title = 'THE REVEAL — shop';
      how = `Boss HP <b>${bossHP(G)}</b>. Spend ⚡ wisely, then <b>Roll dice</b>. Everyone’s totals add together.`;
    }
  } else if (isHost){
    if (phase==='roll'){
      const needH = !session.humanLocked;

      if (needH && needP){

function resetChoices(){

    if (!confirm('Go back and clear this round’s upgrades? Your current roll will be discarded.')) return;
    session.phase = 'upgrade';
    session.rolls = null;
    session.baseRolls = null;
    session.baseModRoll = null;
    session.modRoll = null;
    session.scarRoll = null;
    session.scarRolls = [];
    session.aRolls = null;
    session.pModRoll = null;
    session.instinctRoll = null;
    session.paidRerolls = 0;
    session.freeLeft = 0;

    session.parRerolls = 0;
    session.parPathRerolls = 0;

    session.humanLocked = false;

    session._previewPar = null;

function selectDie(id){ ui.selectedDie=id; ui.selectedFace=null; render(); }
function pickFace(dieId, faceIndex){ ui.selectedDie=dieId; ui.selectedFace={dieId,faceIndex}; render(); }
function queueForge(){
  if (!ui.selectedFace || energyLeft() < CFG.forgeCost) return;
  const preview = previewHumanDice(G.players[me]);
  const die = findDie(preview, ui.selectedFace.dieId);
  if (!die || forgeLevelOf(die,ui.selectedFace.faceIndex) >= CFG.maxForgeLevel) return;
  cart.forges.push({ ...ui.selectedFace });
  render();
}
function undoForge(){ cart.forges.pop(); render(); }
function pickModFace(i){ ui.selectedModFace=i; render(); }
function queueModUp(){
  if (ui.selectedModFace==null || energyLeft() < CFG.modUpgradeCost) return;
  const pl = G.players[me];
  const preview = previewModDie(pl);
  const face = preview[ui.selectedModFace];
  if (!face || face.kind==='scar' || (face.level|0) >= modMaxLevel(face)) return;
  cart.modUps.push(ui.selectedModFace);
  render();
}
function queueHealScar(delta){
  const pl = G.players[me];
  const max = scarCount(pl);
  let n = Math.max(0, (cart.healScars||0) + (delta|0));
  n = Math.min(n, max);
  const baseSpend = (cart.forges||[]).length*CFG.forgeCost + (cart.modUps||[]).length*CFG.modUpgradeCost + (cart.addDie?nextHumanDieCost(pl):0);
  while (n > 0 && (myBudget() - baseSpend - n*(CFG.healScarCost||3)) < 0) n--;
  cart.healScars = n;
  render();
}
function pickAddColor(c){
  if (cart.addDie){
    // already added — tap Remove to change
    return;
  }
  if (!canAddColor(G.players[me], c, null)) return;
  ui.pickAddColor = (ui.pickAddColor === c) ? null : c;
  render();
}
function confirmAddDie(){
  const c = ui.pickAddColor;
  if (!c) return;
  if (!canAddColor(G.players[me], c, null)) return;
  if (energyLeft() < nextHumanDieCost(G.players[me])) return;
  cart.addDie = c;
  ui.pickAddColor = null;
  ui.selectedDie = 'preview';
  ui.selectedFace = null;
  render();
}
function setAddDie(c){
  // legacy: select + add in one tap
  ui.pickAddColor = c;
  confirmAddDie();
}
function clearAddDie(){
  cart.addDie = null;
  ui.pickAddColor = null;
  if (ui.selectedDie === 'preview'){
    const first = G.players[me] && G.players[me].dice && G.players[me].dice[0];
    ui.selectedDie = first ? first.id : null;
  }
  ui.selectedFace = null;
  render();
}
function queueSizeUp(){
  if (!ui.selectedDie) return;
  const pl = G.players[me];
  const preview = previewHumanDice(pl);
  const d = findDie(preview, ui.selectedDie);
  if (!d || dieSizeOf(d) >= CFG.maxDieSize) return;
  const refund = (cart.forges||[]).filter(f=>f.dieId===ui.selectedDie).length*CFG.forgeCost;
  if (energyLeft()+refund < CFG.sizeUpCost) return;
  // Click order matters: sizing now wipes forge work already queued on this die.
  cart.forges = (cart.forges||[]).filter(f=>f.dieId!==ui.selectedDie);
  cart.sizeUps.push(ui.selectedDie);
  ui.selectedFace = null;
  render();
}
function undoSizeUp(){ cart.sizeUps.pop(); ui.selectedFace=null; render(); }
function parBuy(key, delta){
  const pb = cart.parBuys || (cart.parBuys = { dice:0, sizes:0, forges:0 });
  pb[key] = Math.max(0, (pb[key]|0) + (delta|0));
  const bank = (G.parasite.bank||0) + hostParStipendNow();
  while (parShopCost(pb,G.parasite) > bank && pb[key] > 0) pb[key]--;
  render();
}
function pickChannel(key){
  if (!CHANNELS[key]) return;
  if (!session || session.phase!=='upgrade') return;
  cart.channel = key;
  render();
}
function toggleWoundTarget(pid){
  if (!cart) return;
  if (pid === me || !G.players[pid]) return;
  if (scarCount(G.players[pid]) >= CFG.maxScars) return;
  const targets = cart.woundTargets || (cart.woundTargets = []);
  const i = targets.indexOf(pid);
  if (i >= 0) targets.splice(i, 1);
  else if (targets.length < (CFG.maxFeedTargets||2)) targets.push(pid);
  render();
}
// Host must feed on one or two eligible crewmates for power.

/* ================= ROLL ================= */
function prepareHostGrowthPreview(){
  const fake = deep(G.parasite);
  applyParShop(fake, (cart && cart.parBuys) || {});
  session._previewTonight = 0;
  session._previewPar = fake;
  session._parBudget = Math.max(0, ((G.parasite.bank||0) + hostParStipendNow()) - parShopCost(cart && cart.parBuys,G.parasite));
  return fake;
}
function rollHumanBundle(){
  const preview = previewHumanDice(G.players[me]);
  const modPrev = previewModDie(G.players[me]);
  const rolls = preview.map(d=>{
    const rf = rollFace(d.faces);
    const bonus = isBonusDie(d);
    return { dieId:d.id, color:d.color, faces:d.faces, size:dieSizeOf(d), forgeLevels:ensureForgeLevels(d).slice(), forgeLevel:forgeLevelOf(d,rf.index), index:rf.index, v:rf.value, first:rf.value, rerolled:false, tempNew:d.id==='preview', bonus };
  });
  if (cart.addDie){
    const last = rolls[rolls.length-1];
    if (last && last.tempNew){ last.dieId = uid(cart.addDie[0]); last.bonus = true; }
  }
  const mi = rollIndex(modPrev.length);
  const modRoll = { index:mi, kind:modPrev[mi].kind, level:modPrev[mi].level, value:modFaceValue(modPrev[mi]) };
  const scarsActive = Math.max(0, scarCount(G.players[me]) - Math.max(0, (cart && cart.healScars)|0));
  const scarRolls = [];
  for (let s=0; s<scarsActive; s++){
    const si = rollIndex(SCAR_DIE_FACES.length);
    const f = SCAR_DIE_FACES[si];
    scarRolls.push({ index:si, id:f.id, label:scarFacePlain(f), color:f.color||null, level:1 });
  }
  session.baseRolls = deep(rolls);
  session.baseModRoll = deep(modRoll);
  session.rolls = deep(rolls);
  session.modRoll = deep(modRoll);
  session.scarRolls = scarRolls;
  session.scarRoll = scarRolls[0] || null; // legacy single pointer
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  reapplyScarFromBase();
  session.humanRolled = true;
  session.humanLocked = false;
}
function rollParasiteBundle(){
  const fake = session._previewPar || prepareHostGrowthPreview();
  session.aRolls = (fake.attack||[]).map(d=>{
    const er = rollExplodingAttack(d.faces);
    return { dieId:d.id, faces:d.faces, size:dieSizeOf(d), index:er.index, v:er.value, shown:er.shown,
      critBonus:er.bonus ? er.bonus.value : 0, exploded:er.exploded, first:er.shown, rerolled:false };
  });
  session.pModRoll = null;
  const inst = fake.instinct || INSTINCT_FACES.map(f=>f.id);
  const ii = rollIndex(inst.length);
  session.instinctRoll = inst[ii];
  session.instinctExtra = 0;
  session.instinctExtraRoll = null;
  if (session.instinctRoll==='explode'){
    const er = rollExplodingAttack(hotFaces());
    session.instinctExtra = er.value;
    session.instinctExtraRoll = { index:er.index, v:er.value, shown:er.shown,
      critBonus:er.bonus ? er.bonus.value : 0, exploded:er.exploded, first:er.shown,
      faces:hotFaces(), size:hotFaces().length };
  }
  session.parRolled = true;
  session.parLocked = false;
}
/** Host: enter roll phase without rolling yet — human and parasite roll independently. */
function startHostRollPhase(){

  session.parRolled = false;

  session.baseRolls = null;
  session.modRoll = null;
  session.scarRoll = null;
  session.scarRolls = [];
  session.aRolls = null;
  session.pModRoll = null;
  session.instinctRoll = null;
  session.instinctExtra = 0;
  session.instinctExtraRoll = null;
  session.parEnergy = session._parBudget != null ? session._parBudget : hostParStipendNow();
  session.parRerolls = 0;

function beginHumanRoll(){

  flashRoll(['attack','mod','scar']);
}
function beginParasiteRoll(){
  if (!session || session.phase!=='roll' || session.parLocked) return;
  const eligible = rosterOf(G).filter(pid=>pid!==me && scarCount(G.players[pid])<CFG.maxScars).length;
  const picked = ((cart&&cart.woundTargets)||[]).length;
  if (eligible>0 && (picked<(CFG.minFeedTargets||1) || picked>(CFG.maxFeedTargets||2))) return;
  if (!session._previewPar) prepareHostGrowthPreview();
  if (session.parEnergy == null) session.parEnergy = session._parBudget != null ? session._parBudget : hostParStipendNow();
  rollParasiteBundle();
  session.selectedRoll = null;
  flashRoll(['parAttack','parMod','instinct']);
}
function lockHumanRoll(){
  if (!session || !session.humanRolled || session.humanLocked) return;
  session.humanLocked = true;
  session.selectedRoll = null;
  render();
}
function lockParasiteRoll(){
  if (!session || !session.parRolled || session.parLocked) return;
  const eligible = rosterOf(G).filter(pid=>pid!==me && scarCount(G.players[pid])<CFG.maxScars).length;
  const picked = ((cart&&cart.woundTargets)||[]).length;
  if (eligible>0 && (picked<(CFG.minFeedTargets||1) || picked>(CFG.maxFeedTargets||2))) return;

/** Non-host: classic single roll of everything. */
function beginRoll(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  if (isHost){ startHostRollPhase(); return; }

  rollHumanBundle();
  session.parEnergy = 0;
  session.parRerolls = 0;
  session.humanRolled = true;
  session.humanLocked = false;
  session.parRolled = false;
  session.parLocked = false;

/** Restore clean dice/mod, then apply each Scar die once. */
function reapplyScarFromBase(){
  if (!session) return;
  session.rolls = deep(session.baseRolls || session.rolls || []);
  session.modRoll = session.baseModRoll ? deep(session.baseModRoll) : session.modRoll;
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  (session.rolls||[]).forEach(d=>{ d.scarZeroed = false; d.scarNote = ''; });
  (session.scarRolls||[]).forEach(sr => applyHurtFace(sr, 'scar'));
}
function applyHurtFace(hurt, kind){
  // Scar dice are uniform (level 1 effects). Mutates session.rolls / energy / pts.
  if (!hurt || hurt.id==='blank') return;
  const rolls = session.rolls || [];
  if (hurt.id==='drain'){
    session.scarEnergyLoss = (session.scarEnergyLoss||0) + 2;
  } else if (hurt.id==='bleed'){
    rolls.forEach(d=>{ d.v = Math.max(0, Math.floor((d.v||0) * 0.8)); });
  } else if (hurt.id==='shatter'){
    if (rolls.length){
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const lost = rolls[hi].v||0;
      rolls[hi].scarNote = (rolls[hi].scarNote ? rolls[hi].scarNote+' · ' : '') + '−'+lost+' '+kind;
    }
  }
}

      const chanOK = !!cart.channel && feedReady;
      parActions = `<div class="host-step done compact">${hostStepHeadHTML(2,'Roll Parasite Dice','Attack dice + Specialty die','Done ✓','done')}</div>

          <button class="btn par-reroll all" onclick="rerollParSection('all')" ${!canParAll?'disabled':''}>Reroll all · ⚡${CFG.rerollAllCost||2}</button>

  return `${humanPanel}

    <div class="fixed-cta">${bottom}</div>`;

function isShaking(){
  return !!(session && session.shakeSecs && session.shakeSecs.length);
}
function pickRoll(type, i){
  if (!session || session.phase!=='roll' || isShaking()) return;
  if (isHumanRollType(type) && session.humanLocked) return;
  if (isParasiteRollType(type) && session.parLocked) return;
  const same = session.selectedRoll && session.selectedRoll.type===type && session.selectedRoll.i===(i|0);
  session.selectedRoll = same ? null : { type, i:i|0 };
  render();
}
/** Shake only the dice in these sections (attack/mod/scar or parAttack/parMod/instinct). */
function flashRoll(sections){
  session.selectedRoll = null;
  session.shakeSecs = Array.isArray(sections) ? sections.slice() : [];
  render();
  setTimeout(()=>{ if(session){ session.shakeSecs = []; render(); } }, 450);
}
function rerollHumanAttackDice(){
  (session.baseRolls||[]).forEach(d=>{
    const rf = rollFace(d.faces);
    d.index=rf.index; d.v=rf.value; d.first=rf.value; d.forgeLevel=((d.forgeLevels||[])[rf.index])|0; d.rerolled=true;
    d.scarZeroed=false; d.scarNote='';
  });
}
function rerollHumanAttackDie(i){
  const d = (session.baseRolls||[])[i|0];
  if (!d) return false;
  const rf = rollFace(d.faces);
  d.index=rf.index; d.v=rf.value; d.first=rf.value; d.forgeLevel=((d.forgeLevels||[])[rf.index])|0; d.rerolled=true;
  d.scarZeroed=false; d.scarNote='';
  return true;
}
function rerollSelectedHumanAttack(){
  if (!session || session.humanLocked || session.phase!=='roll' || isShaking()) return;
  if (!session.humanRolled && !(session.rolls && session.rolls.length)) return;
  const picked = session.selectedRoll;
  if (!picked || picked.type!=='h' || !Number.isInteger(picked.i) || !(session.baseRolls||[])[picked.i]) return;
  const cost = CFG.rerollCost||1;
  if (!spendHumanRerollCost(cost, {allowFree:true})) return;
  const i = picked.i;
  if (!rerollHumanAttackDie(i)) return;
  reapplyScarFromBase();
  flashRoll(['attack:'+i]);
}
function rerollHumanModDie(){
  const faces = previewModDie(G.players[me]);
  const mi = rollIndex(faces.length);
  const modRoll = { index:mi, kind:faces[mi].kind, level:faces[mi].level, value:modFaceValue(faces[mi]) };
  session.baseModRoll = deep(modRoll);
  session.modRoll = deep(modRoll);
}
function rerollHumanScarDice(){
  (session.scarRolls||[]).forEach((_, i)=>{
    const si = rollIndex(SCAR_DIE_FACES.length);
    const f = SCAR_DIE_FACES[si];
    session.scarRolls[i] = { index:si, id:f.id, label:scarFacePlain(f), color:f.color||null, level:1 };
  });
  session.scarRoll = (session.scarRolls && session.scarRolls[0]) || null;
}
function rerollHumanSection(section){
  if (!session || session.humanLocked || session.phase!=='roll' || isShaking()) return;
  if (!session.humanRolled && !(session.rolls && session.rolls.length)) return;
  const all = section==='all';
  const cost = all ? (CFG.rerollAllCost||2) : (CFG.rerollCost||1);
  if (section==='scar' && !(session.scarRolls||[]).length) return;
  // Free covers a selected Attack die or one Mod/Wound section — "all" always costs full energy
  if (!spendHumanRerollCost(cost, { allowFree: !all })) return;
  const secs = [];
  if (all || section==='attack'){ rerollHumanAttackDice(); secs.push('attack'); }
  if (all || section==='mod'){ rerollHumanModDie(); secs.push('mod'); }
  if (all || section==='scar'){ rerollHumanScarDice(); secs.push('scar'); }
  reapplyScarFromBase();
  flashRoll(secs);
}
function rerollParAttackDice(){
  (session.aRolls||[]).forEach(d=>{
    const er = rollExplodingAttack(d.faces);
    Object.assign(d, { index:er.index, v:er.value, shown:er.shown,
      critBonus:er.bonus ? er.bonus.value : 0, exploded:er.exploded, first:er.shown, rerolled:true });
  });
}
function rerollParAttackDie(i){
  const d = (session.aRolls||[])[i|0];
  if (!d) return false;
  const er = rollExplodingAttack(d.faces);
  Object.assign(d, { index:er.index, v:er.value, shown:er.shown,
    critBonus:er.bonus ? er.bonus.value : 0, exploded:er.exploded, first:er.shown, rerolled:true });
  return true;
}
function rerollSelectedParAttack(){
  if (!session || session.parLocked || session.phase!=='roll' || isShaking()) return;
  if (!session.parRolled && !(session.aRolls && session.aRolls.length)) return;
  const picked = session.selectedRoll;
  if (!picked || picked.type!=='a' || !Number.isInteger(picked.i) || !(session.aRolls||[])[picked.i]) return;
  const cost = CFG.parRerollCost||1;
  if (!spendParRerollCost(cost, {allowPath:true})) return;
  const i = picked.i;
  if (!rerollParAttackDie(i)) return;
  flashRoll(['parAttack:'+i]);
}
function rerollParModDie(){ /* v5: parasite has no mod die */ }
function rerollParInstinct(){
  const inst = (session._previewPar || G.parasite).instinct || INSTINCT_FACES.map(f=>f.id);
  session.instinctRoll = inst[rollIndex(inst.length)];
  session.instinctExtra = 0;
  session.instinctExtraRoll = null;
  if (session.instinctRoll==='explode'){
    const er = rollExplodingAttack(hotFaces());
    session.instinctExtra = er.value;
    session.instinctExtraRoll = { index:er.index, v:er.value, shown:er.shown,
      critBonus:er.bonus ? er.bonus.value : 0, exploded:er.exploded, first:er.shown,
      faces:hotFaces(), size:hotFaces().length };
  }
}
function rerollParSection(section){
  if (!session || session.parLocked || session.phase!=='roll' || isShaking()) return;
  if (!session.parRolled && !(session.aRolls && session.aRolls.length)) return;
  const all = section==='all';
  const cost = all ? (CFG.rerollAllCost||2) : (CFG.parRerollCost||1);
  if (!spendParRerollCost(cost, {allowPath:!all})) return;
  const secs = [];
  if (all || section==='attack'){ rerollParAttackDice(); secs.push('parAttack'); }
  if (all || section==='instinct'){ rerollParInstinct(); secs.push('instinct'); }
  flashRoll(secs);
}
function confirmReroll(){
  if (!session || !session.selectedRoll) return;
  const t = session.selectedRoll.type;
  if (t==='h') rerollSelectedHumanAttack();
  else if (t==='hm') rerollHumanSection('mod');
  else if (t==='s') rerollHumanSection('scar');
}
function confirmParReroll(){
  if (!session || !session.selectedRoll) return;
  const t = session.selectedRoll.type;
  if (t==='a') rerollSelectedParAttack();
  else if (t==='m') rerollParSection('mod');
  else if (t==='i') rerollParSection('instinct');
}

function lockIn(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  if (isHost){
    if (!session.humanLocked || !session.parLocked) return;
    if (!session.rolls || !session.aRolls) return;
    if (!cart.channel) return;
    const eligible = rosterOf(G).filter(pid=>pid!==me && scarCount(G.players[pid])<CFG.maxScars).length;
    if (eligible>0 && ((cart.woundTargets||[]).length<(CFG.minFeedTargets||1) || (cart.woundTargets||[]).length>(CFG.maxFeedTargets||2))) return;
  } else if (!session.rolls){
    return;
  }
  const gainScar = !!(session.modRoll && session.modRoll.kind==='scar');
  const action = {
    phase:'locked',
    role: isHost ? 'host' : 'human',
    at: Date.now(),
    forges: cart.forges||[],
    modUps: cart.modUps||[],
    sizeUps: cart.sizeUps||[],
    addDie: cart.addDie||null,
    buyFreeReroll: !!cart.buyFreeReroll,
    rerollBuys: session.paidRerolls||0,
    healScars: Math.max(0, cart.healScars||0),
    gainScar,
    rolls: session.rolls,
    modRoll: session.modRoll,
    scarRolls: session.scarRolls||[],
    scarRoll: (session.scarRolls && session.scarRolls[0]) || session.scarRoll || null,
    ptsDelta: session.ptsDelta||0,
    scarEnergyLoss: session.scarEnergyLoss||0,
  };
  if (isHost){
    action.channel = cart.channel || 'sever';
    action.channelTarget = null;
    action.woundTargets = (cart.woundTargets||[]).slice();
    action.parBuys = cart.parBuys || {};
    action.parRerolls = session.parRerolls||0;
    action.growth = { key: cart.channel || 'sever', target: null };
    action.aRolls = session.aRolls;
    action.instinctRoll = session.instinctRoll;
    action.instinctExtra = session.instinctExtra||0;
    action.instinctExtraRoll = session.instinctExtraRoll||null;
  }
  submitAction(action);
  session = { round:r, phase:'upgrade', rolls:null, paidRerolls:0, freeLeft:0, shakeSecs:[], selectedRoll:null };
  cart = freshCart();
  render();
}

function waitingHTML(r){
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  const hostId = hostIdForRound(G, r);
  return `<div class="panel">
    <h3 class="center">Waiting on the crew…</h3>
    ${rosterOf(G).map(p=>{
      const ok = actionLocked(actions[p]);
      const tag = hostId===p ? ' · HOST' : '';
      return `<div class="wait-row">${whoHTML(p)}${tag}
        <span class="st ${ok?'in':'thinking'}">${ok?'LOCKED':'…'}</span></div>`;
    }).join('')}
  </div>`;
}

/* ================= VERDICT ================= */
function playerReviewCardHTML(pid, res){
  const rolls = (res.rolls && res.rolls[pid]) || [];
  const br = (res.breakdown && res.breakdown[pid]) || null;
  // Fallback recompute from stored actions if older results lack breakdown
  let attack = br ? br.attack : rolls.reduce((s,d)=>s+(d.v||0),0);
  let total = br ? br.total : (res.totals && res.totals[pid] != null ? res.totals[pid] : attack);
  let modLabel = br ? br.modLabel : 'mod ?';
  let modAdd = br ? br.modAdd : 0;
  let pending = br ? br.pendingEnergy : 0;
  let scarLab = '';
  if (br){
    if (br.scarRolls && br.scarRolls.length) scarLab = br.scarRolls.filter(s=>s&&s.id!=='blank').map(s=>{
      const face = scarFaceById(s.id);
      return face ? scarFacePlain(face) : (s.label||'');
    }).join(' · ');
    else if (br.scarRoll){
      const face = scarFaceById(br.scarRoll.id);
      scarLab = face ? scarFacePlain(face) : (br.scarRoll.label || '');
    }
    if (br.scars) scarLab = (scarLab ? scarLab+' · ' : '') + br.scars + ' in pool';
  }
  const isHost = res.hostId === pid;
  let hostExtra = '';
  if (isHost && res.parPart){
    const p = res.parPart;
    const aRolls = (br && br.aRolls) || res.aRolls || [];
    const aDice = aRolls.map(d=>parasiteAttackDieHTML(d, '')).join('');
    const pMod = (br && br.pModRoll) || res.pModRoll;
    const inst = (br && br.instinctRoll) || res.instinctRoll;
    const instId = inst && inst.id ? inst.id : inst;
    const extraRoll = res.instinctExtraRoll || null;
    hostExtra = `<div class="lane-label" style="color:var(--bio)">Parasite</div>
      <div class="dice-row par-row" style="margin:4px 0">${aDice}
        ${pMod?`<div class="die-wrap">${dieHTML('mod', pModLabel(pMod))}<div class="die-label" style="color:var(--bio)">Mod</div></div>`:''}
        ${inst!=null?`<div class="die-wrap">${dieHTML('instinct', instinctShortLabel(instId))}<div class="die-label" style="color:var(--energy)">Specialty</div></div>`:''}
        ${instId==='explode'?parasiteExtraRollHTML(extraRoll,''):''}
      </div>
      ${parasiteReceiptHTML(p,aRolls,instId,extraRoll,{pathLabel:resultPathTitle(res)})}
      <div class="small">Human ${Math.round(res.hostHuman)} + Parasite ${Math.round(p.total)} = <b style="color:var(--bio)">${Math.round(res.hostTotal)}</b></div>`;
  }
  return `<div class="panel" style="padding:10px;margin-bottom:8px">
    <div class="award-row" style="border:none;padding:0 0 6px">
      <span class="who">${whoHTML(pid)}${isHost?' <span class="badge" style="background:#8dff6a33;color:var(--bio)">HOST</span>':''}</span>
      <span class="total-big crew" style="font-size:22px;margin:0">${Math.round(total)}</span>
    </div>
    ${diceRowMiniHTML(rolls)}
    <div class="small">Dice <b>${attack}</b>${(br && br.permBase)?` + ${tip('baseAtkHuman','Base')} <b>+${br.permBase}</b>`:''}${modAdd?` + Mod <b>+${modAdd}</b>`:''} (${esc(modLabel)})${(br && br.scorePts)?` · ${tip('modPoints','score')} +${br.scorePts}`:''}${pending?` · +${pending}⚡ next`:''}${scarLab?` · Wound ${esc(scarLab)}`:''}</div>
    ${hostExtra}
  </div>`;
}

function verdictHTML(r){
  const res = G.rounds[r].result;
  if (!res) return '';
  let banner = '';
  let body = '';
  if (res.kind==='training'){
    banner = `<div class="result-banner h">TRAINING COMPLETE</div>`;
  } else if (res.kind==='skirmish'){
    banner = `<div class="result-banner h">CREW SKIRMISH</div>`;
  } else if (res.kind==='infection'){
    banner = `<div class="result-banner ${res.hostWins?'p':'h'}">${res.hostWins ? 'THE HOST FEASTS' : 'THE CREW HOLDS'}</div>`;
    const crewN = res.crewSize != null ? res.crewSize : Math.max(1, rosterOf(G).length-1);
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew (${crewN})</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">${whoHTML(res.hostId,{short:true})}+bug</div><div class="val">${Math.round(res.hostTotal)}</div></div>
    </div>
    ${res.channel?`<div class="small center" style="margin:6px 0">Path: <b>${esc(resultPathTitle(res))}</b> · Feeding Time Wounds +${res.scarsCreated||0}${res.finalTarget!=null?` · final target <b>${res.finalTarget}</b>`:''}</div>`:''}
    ${(res.woundTargets||[]).length?`<div class="warn-box center">${whoHTML(res.hostId,{short:true})} Wounded ${(res.woundTargets||[]).map(pid=>whoHTML(pid,{short:true})).join(', ')} for <b>+${(res.woundTargets||[]).length*CFG.woundAttack} parasite attack</b>.</div>`:''}
    ${res.severSub?`<div class="small center" style="margin:6px 0;color:#9aefc8">${(res.pathVersion|0)>=2?'Green canceled the crew’s highest die':'Cancel top 2 dropped the crew’s highest dice'} — <b>−${res.severSub}</b> from the crew total</div>`:''}
    ${(!res.hostWins && res.baseAttackBump)?`<div class="small center" style="margin:6px 0;color:var(--bio)">Crew held — the parasite hardens <b>+${res.baseAttackBump}</b> forever</div>`:''}`;
  } else if (res.kind==='boss'){
    banner = `<div class="result-banner ${res.cleared?'h':'p'}">${res.cleared ? 'THE CREW SLAYS THE BEAST' : 'THE PARASITE ESCAPES'}</div>`;
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">Boss HP</div><div class="val">${res.hp}</div></div>
    </div>
    ${res.hpParts?`<div class="small center" style="margin-bottom:8px">Boss build: crew mirror <b>${res.hpParts.crewMirror}</b> + parasite dice <b>${res.hpParts.builtParasite}</b> + danger <b>${res.hpParts.danger}</b></div>`:''}
    <div class="small center">${res.cleared ? `Hero: ${whoHTML(res.hero)}` : 'It slips into the vents. Hollow victory on points.'}</div>`;
  }

  // Order: host first if infection, else by total desc
  let order = rosterOf(G).slice();
  if (res.kind==='infection' && res.hostId){
    order = [res.hostId, ...order.filter(p=>p!==res.hostId)];
  } else {
    order.sort((a,b)=>{
      const ta = (res.breakdown && res.breakdown[a] ? res.breakdown[a].total : (res.totals&&res.totals[a])||0);
      const tb = (res.breakdown && res.breakdown[b] ? res.breakdown[b].total : (res.totals&&res.totals[b])||0);
      return tb-ta;
    });
  }
  const review = `<div class="lane-label">Dice review</div>${order.map(p=>playerReviewCardHTML(p, res)).join('')}`;
  const awardRows = roundScoreCardsHTML(res, r);

  return `<div class="panel">${banner}${body}</div>
    ${review}
    <div class="panel"><div class="lane-label" style="margin-top:0">Round scores · highest to lowest</div>${awardRows}
    <button class="btn" style="margin-top:12px" onclick="dismissVerdict(${r})">Continue</button>
  </div>`;
}
function dismissVerdict(r){
  markSeen(r);
  animating = false;
  render();
}

function finalScreen(){
  const escaped = !!G.escaped;
  return `<div style="padding-top:5vh">
    <div class="center">${escaped ? parasiteArtHTML(120,4) : '<div style="font-size:48px;font-family:Orbitron">HERO</div>'}</div>
    <h1 class="center brand-hero" style="font-size:22px">${escaped ? 'ESCAPED' : 'FINAL SCORES'}</h1>
    <p class="center small">${escaped ? 'The parasite got away. Rank the survivors anyway.' : `${infectionSlots(G)} infection rounds + boss. ${tableSize(G)} players. Everyone hosted twice. One hero.`}</p>
    <div id="revealZone" style="margin-top:18px"></div>
    <div id="newGameZone" class="hidden" style="margin-top:20px">
      <button class="btn" onclick="confirmResetGame()">Play again</button>
    </div>
  </div>`;
}
function runFinalReveal(){
  const ranked = rosterOf(G).map(p=>({p, pts:G.players[p].pts})).sort((a,b)=>a.pts-b.pts);
  const zone = $('#revealZone');
  if (!zone || zone.dataset.ran) return;
  zone.dataset.ran = '1';
  const n = ranked.length;
  ranked.forEach((e,i)=>{
    setTimeout(()=>{
      const isWin = i===ranked.length-1;
      const place = n - i; // 1 = winner
      const row = document.createElement('div');
      row.className = 'reveal-row'+(isWin?' winner':'');
      row.innerHTML = `<span class="place">${ordinalPlace(place)}</span>
        ${whoHTML(e.p)}${isWin?' <span class="badge mvp">HERO</span>':''}
        <span class="pts-final">0</span>`;
      zone.prepend(row);
      requestAnimationFrame(()=>row.classList.add('show'));
      countUp(row.querySelector('.pts-final'), e.pts);
      if (isWin){ confettiBurst(); $('#newGameZone').classList.remove('hidden'); }
    }, 900*i + 400);
  });
}
function countUp(el, target){
  const t0 = performance.now();
  const dur = 900;
  function frame(t){
    const k = Math.min(1, (t-t0)/dur);
    el.textContent = Math.round(target * (0.5-Math.cos(Math.PI*k)/2));
    if (k<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function confettiBurst(){
  const glyphs = ['*','+','✦','·'];
  for (let i=0;i<40;i++){
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (2+Math.random()*2.5)+'s';
    s.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 6000);
  }
}

/* ================= BOOT ================= */
(function boot(){
  const sf = $('#starfield');
  for (let i=0;i<60;i++){
    const s = document.createElement('i');
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = Math.random()*3+'s';
    sf.appendChild(s);
  }
  if (configOK()) initFirebase();
  render();
})();
</script></body></html>
