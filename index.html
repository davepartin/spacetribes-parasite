<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#081018">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="stp-build" content="v4.3.9">
<title>Space Tribes: Parasite</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#081018; --panel:#101c28; --panel2:#162636; --line:#2a4050;
  --text:#eef3f6; --dim:#8aa0ae; --energy:#f5c042; --danger:#ff5a4e;
  --good:#3ecf8e; --red:#e85a5a; --blue:#4da3ff; --green:#2db88a;
  --bio:#8dff6a; --ink:#071018; --die:#f4f1ea; --die-ink:#1a1a1a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif; min-height:100%; overscroll-behavior-y:contain;
  line-height:1.35; letter-spacing:0;}
body{background:
  radial-gradient(700px 420px at 50% -5%, #1a3a2a66, transparent),
  radial-gradient(600px 400px at 100% 40%, #3a152055, transparent),
  var(--bg);}
#app{max-width:520px;margin:0 auto;padding:10px 12px 150px;position:relative;min-height:100vh;z-index:1;}
h1,h2,h3{margin:0 0 6px;font-family:'Orbitron',sans-serif;letter-spacing:.03em;line-height:1.2;}
h3{font-size:15px;}
button{font-family:inherit;border:none;cursor:pointer;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#1a8a6e,#d4a82a);color:var(--ink);box-shadow:0 3px 12px #1a8a6e33;}
.btn:active{transform:scale(.98);}
.btn:disabled,.btn.disabled{background:#243444;color:#6a7a88;box-shadow:none;pointer-events:none;}
.btn.danger{background:linear-gradient(135deg,#e04840,#a83228);color:#fff;}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--dim);box-shadow:none;font-weight:600;}
.btn.reroll{background:linear-gradient(135deg,#2a6a9a,#f5c042);margin-top:10px;}
.small{font-size:13px;color:var(--dim);line-height:1.4;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}
.starfield i{position:absolute;width:2px;height:2px;border-radius:50%;background:#c8ffe8;opacity:.4;animation:tw 3s infinite;}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.6}}
.grid-scan{display:none;}

.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.char-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:16px 8px;
  text-align:center;color:inherit;}
.char-card:active{transform:scale(.96);}
.char-card .avatar{font-size:44px;display:block;}
.seat-mark{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;flex:0 0 auto;line-height:0;vertical-align:middle;}
.seat-mark svg{width:100%;height:100%;display:block;filter:drop-shadow(0 2px 4px #0008);}
.char-card .seat-mark,.roster-name-row .seat-mark{width:44px;height:44px;}
.me-chip .seat-mark{width:26px;height:26px;}
.standings-bar .seat-mark{width:16px;height:16px;}
.wait-row .seat-mark,.reveal-row .seat-mark{width:26px;height:26px;}
.award-row .seat-mark{width:18px;height:18px;margin-right:2px;}
.rnode .seat-mark{display:inline-flex;width:18px;height:18px;margin:0 auto;}
.who-chip{display:inline-flex;align-items:center;gap:6px;min-width:0;vertical-align:middle;}
.standings-bar .sb-name{display:flex;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:700;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parasite-art{display:inline-block;filter:drop-shadow(0 0 18px #8dff6a55);animation:pulse 2.8s infinite;line-height:0;}
.parasite-art img{display:block;border-radius:18px;width:100%;height:auto;max-width:160px;margin:0 auto;
  box-shadow:0 0 0 2px #8dff6a33, 0 8px 24px #0009;}
.char-card .cname{font-size:18px;font-weight:800;margin-top:4px;font-family:'Orbitron',sans-serif;}
.char-card .ctitle{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.roster-card{background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:12px 8px;text-align:center;color:inherit;}
.roster-card.on{border-color:var(--energy);box-shadow:0 0 0 1px #f5c04255;}
.roster-card .rname{font-weight:800;font-family:'Orbitron',sans-serif;margin-top:4px;}
.roster-meta{text-align:center;margin:8px 0;color:var(--dim);font-size:13px;}
.roster-meta b{color:var(--energy);}
.roster-count{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.roster-count button{min-width:48px;padding:10px 0;border-radius:12px;border:2px solid var(--line);background:var(--panel2);color:inherit;font-family:'Orbitron',sans-serif;font-weight:800;}
.roster-count button.on{border-color:var(--energy);background:#f5c04222;color:var(--energy);}
.roster-names{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px;}
.roster-name-row{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 10px;}
.roster-name-row .seat-label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);min-width:52px;}
.roster-name-row input,.claim-name{flex:1;min-width:0;background:#0a1018;border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px 12px;font-size:16px;font-family:'Rajdhani',sans-serif;font-weight:700;}
.roster-name-row input:focus,.claim-name:focus{outline:none;border-color:var(--energy);}
.char-card.claim{cursor:default;text-align:left;padding:12px;}
.char-card.claim .claim-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.char-card.claim .claim-row .btn{margin:0;padding:10px 12px;font-size:13px;width:auto;}
.char-card .cname.empty{color:var(--dim);font-style:italic;font-weight:600;}

.chrome-sticky{position:sticky;top:0;z-index:22;background:linear-gradient(#081018fc,#081018f5);
  backdrop-filter:blur(10px);padding:4px 0 5px;margin:0 0 8px;border-bottom:1px solid #2a405055;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:5px;margin:0;padding:0;min-height:0;}
.standings-bar{border:1px solid var(--line);border-radius:12px;padding:8px 8px 6px;margin:0 0 10px;
  background:var(--panel);box-shadow:0 4px 14px #0005;}
.standings-bar .sb-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.standings-bar .sb-row{display:flex;gap:4px;justify-content:space-between;flex-wrap:wrap;}
.standings-bar .sb-chip{flex:1;min-width:0;text-align:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:5px 2px 4px;font-family:'IBM Plex Mono',monospace;}
.standings-bar .sb-chip.me{border-color:var(--energy);box-shadow:0 0 0 1px #f5c04233;}
.standings-bar .sb-chip.lead{border-color:#f5c04266;}
.standings-bar .sb-pts{font-size:14px;font-weight:800;color:var(--energy);line-height:1.1;margin-top:1px;}
.standings-bar .sb-meta{font-size:9px;color:var(--dim);margin-top:3px;font-family:'IBM Plex Sans',sans-serif;}
.mod-status-line{font-size:12px;color:var(--dim);margin:0 0 10px;line-height:1.35;}
.me-chip{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);
  border-radius:999px;padding:3px 8px 3px 4px;font-weight:700;font-size:12px;color:inherit;line-height:1.1;min-width:0;}
.me-chip .seat-mark{width:18px;height:18px;}
.me-chip .who{gap:5px;font-size:12px;}
.me-chip .em{font-size:14px;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px 8px;
  font-weight:700;font-size:12px;display:flex;align-items:center;gap:3px;font-family:'IBM Plex Mono',monospace;
  line-height:1.1;white-space:nowrap;}
.stat-chip.energy{color:var(--energy);border-color:#f5c04255;}
.stat-chip.base{color:var(--good);border-color:#3ecf8e55;}
.stat-chip.pts{color:var(--energy);}
.round-strip{display:flex;gap:4px;margin:0 0 10px;overflow-x:auto;padding-bottom:2px;}
.rnode{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;width:58px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel);
  text-align:center;padding:4px 2px 5px;position:relative;}
.rnode .rn{font-size:9px;color:var(--dim);font-weight:700;}
.rnode .re{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;line-height:1.15;font-weight:800;margin-top:2px;font-family:'IBM Plex Sans',sans-serif;}
.rnode.now{border-color:var(--energy);box-shadow:0 0 10px #f5c04233;}
.rnode.done{opacity:.4;}
.rnode.late{background:#1a1810;}
.rnode .rw{position:absolute;top:-5px;right:-3px;font-size:10px;}
.strip-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:0 0 4px;}

.turn-coach{border-radius:12px;padding:12px;margin-bottom:10px;border:1.5px solid var(--line);
  background:linear-gradient(135deg,#122030,#0e2818);}
.turn-coach.parasite{background:linear-gradient(135deg,#2a1218,#142018);border-color:#8dff6a44;}
.turn-coach .step{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--energy);margin-bottom:4px;}
.turn-coach .title{font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;line-height:1.15;}
.turn-coach .how{font-size:14px;color:var(--text);margin-top:6px;line-height:1.4;}
.turn-coach .how b{color:var(--energy);}

.role-banner{display:none;}

.dice-row{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap;}
.die-wrap{text-align:center;}
.die-wrap.selected .die{box-shadow:0 0 0 3px var(--energy), 0 6px 16px #0008;}
.die-wrap.can-pick{cursor:pointer;}
.die{width:68px;height:68px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  position:relative;margin:0 auto;background:var(--die);color:var(--die-ink);font-weight:800;
  font-family:'IBM Plex Mono',monospace;
  box-shadow:inset 0 2px 0 #fff8, inset 0 -6px 0 #0002, 0 6px 14px #0007;
  border:1px solid #0002;}
/* Solid color dice: white pips + white number (starter + bought extras) */
.die.red{background:linear-gradient(160deg,#ef5a5a,#c22e3e);color:#fff;border:1px solid #8a1a28;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #e85a5a44;}
.die.blue{background:linear-gradient(160deg,#4da3ff,#216fbf);color:#fff;border:1px solid #154a86;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #4da3ff44;}
.die.green{background:linear-gradient(160deg,#35c894,#1a8f68);color:#fff;border:1px solid #0f5c42;
  box-shadow:inset 0 2px 0 #ffffff40, inset 0 -5px 0 #00000040, 0 6px 14px #2db88a44;}
.die.attack{background:linear-gradient(160deg,#3a2218,#1e100c);color:#ffd2b0;border:1px solid #ff8a5544;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die.mod{background:linear-gradient(160deg,#1a2e1c,#0e1a10);color:var(--bio);border:1px solid #8dff6a44;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die .num{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.die.red .num,.die.blue .num,.die.green .num{color:#fff;}
.die.attack .num,.die.mod .num{font-size:22px;}
.die .pips{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:84%;height:84%;gap:0;}
.die .pips i{border-radius:50%;background:#1c2430;place-self:center;width:62%;height:62%;box-shadow:inset 0 1px 2px #0005;}
.die.red .pips i,.die.blue .pips i,.die.green .pips i{background:#fff;box-shadow:0 1px 1px #0005;}
.die.attack .pips i{background:#ffd2b0;}
.die.mod .pips i{background:var(--bio);}
.die .face-num{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;z-index:2;
  color:var(--die-ink);background:var(--die);box-shadow:none;}
.die.red .face-num{color:#fff;background:#c22e3e;}
.die.blue .face-num{color:#fff;background:#216fbf;}
.die.green .face-num{color:#fff;background:#1a8f68;}
.die.attack .face-num{color:#ffd2b0;background:#1e100c;}
.die.mod .face-num{color:var(--bio);background:#0e1a10;}
/* Bought bonus die: light diagonal hatch + corner + (same color family as starter) */
.die.bonus::before{content:'';position:absolute;inset:2px;border-radius:12px;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(-38deg,transparent 0 4px,rgba(255,255,255,.3) 4px 6px);}
.die.bonus .pips,.die.bonus .num{position:relative;z-index:2;}
.die.bonus .face-num{z-index:3;}
.die.bonus .die-bonus-mark{position:absolute;top:2px;right:4px;z-index:4;font-size:11px;font-weight:800;
  line-height:1;color:#fff;text-shadow:0 1px 2px #000a;pointer-events:none;}
.die .corner-num{display:none;}
.die.rolling{animation:shake .5s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) translateY(-5px)}
  50%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
.die-label{font-size:11px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.die-label.red{color:var(--red);} .die-label.blue{color:var(--blue);} .die-label.green{color:var(--green);}
.die-sub{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;line-height:1.2;}
.reroll-flash{animation:flashy .45s;}
@keyframes flashy{0%{box-shadow:0 0 0 4px var(--energy)}100%{}}

.face-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.face-chip{width:36px;height:36px;border-radius:8px;border:1.5px solid #0003;background:var(--die);
  color:var(--die-ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;
  box-shadow:inset 0 -3px 0 #0002, 0 2px 6px #0004;}
.face-chip.hot{background:linear-gradient(160deg,#fff8e0,#f5c042);border-color:#c49020;}
.face-chip.blank{background:var(--panel2);color:var(--dim);border-color:var(--line);box-shadow:none;}
.face-chip.pct{background:#142818;color:var(--bio);border-color:#8dff6a55;}
.face-chip.flat{background:#2a2010;color:var(--energy);border-color:#f5c04255;}
.face-chip.picked{outline:2px solid var(--energy);outline-offset:2px;}
.face-chip.forged{box-shadow:0 0 0 2px var(--energy), inset 0 -3px 0 #0002;}

.shop-item{display:flex;flex-direction:column;align-items:stretch;gap:10px;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.shop-item .si-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.shop-item .si-name{font-weight:700;font-size:14px;}
.shop-item .si-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}
.shop-item .si-cost{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  color:var(--energy);background:#f5c04218;border:1px solid #f5c04244;border-radius:8px;padding:5px 8px;}
.buy-btn{background:transparent;color:var(--text);font-weight:700;border-radius:10px;padding:10px 12px;font-size:13px;
  white-space:nowrap;border:1.5px solid var(--line);box-shadow:none;font-family:'IBM Plex Sans',sans-serif;}
.buy-btn:active{transform:scale(.98);}
.buy-btn.primary{background:linear-gradient(135deg,#1a6a58,#c49a28);color:var(--ink);border-color:transparent;font-weight:800;}
.buy-btn:disabled{background:#1a2834;color:#5a6a78;border-color:#2a4050;}
.buy-btn.owned{background:transparent;border:1.5px solid var(--good);color:var(--good);}
.cat-picks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.cat-pick{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border-radius:10px;
  border:1.5px solid var(--line);background:#0c1822;color:var(--text);font-weight:700;font-size:12px;cursor:pointer;}
.cat-pick .cp-name{letter-spacing:.02em;}
.cat-pick .cp-meta{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;}
.cat-pick.red{border-color:#e85a5a55;color:#ffb0b0;}
.cat-pick.blue{border-color:#4da3ff55;color:#a8d4ff;}
.cat-pick.green{border-color:#2db88a55;color:#9aefc8;}
.cat-pick:disabled{opacity:.35;cursor:default;}
.cat-pick.picked{box-shadow:0 0 0 2px var(--energy);background:#1a2810;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper .buy-btn{min-width:40px;padding:8px 0;text-align:center;}
.stepper .step-val{min-width:28px;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:16px;}
.growth-grid{display:grid;gap:7px;margin:8px 0;}
.growth-opt{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:10px;text-align:left;
  color:inherit;width:100%;cursor:pointer;}
.growth-opt.contain{border-color:#3ecf8e55;}
.growth-opt.unleash{border-color:#ff5a4e66;}
.growth-opt.unleash.picked{border-color:var(--danger);}
.growth-opt.contain.picked{border-color:var(--good);}
.growth-opt .go-title{font-weight:700;font-size:13px;}
.growth-opt .go-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}

.parasite-stage{text-align:center;padding:4px 0 2px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.p-name{font-size:14px;font-weight:800;color:var(--bio);letter-spacing:.06em;font-family:'Orbitron',sans-serif;margin-top:6px;}
.p-tagline{font-size:12px;color:var(--dim);margin-top:2px;}
.p-base{font-size:13px;color:var(--dim);margin-top:6px;}
.p-base b{color:var(--text);font-size:15px;font-family:'IBM Plex Mono',monospace;}
.lane-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:8px 0 4px;}
.evo-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
.evo-tag{font-size:11px;background:#1a2a1055;border:1px solid #8dff6a44;color:var(--bio);
  padding:3px 9px;border-radius:99px;font-weight:700;}

.wait-row{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);}
.wait-row:last-child{border-bottom:none;}
.wait-row .em{font-size:20px;}
.wait-row .st{margin-left:auto;font-size:12px;font-weight:800;}
.st.in{color:var(--good);} .st.thinking{color:var(--dim);animation:tw 1.6s infinite;}

.vs-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:12px 0 6px;}
.vs-side{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px;}
.vs-side .lbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;}
.vs-side .val{font-size:28px;font-weight:800;font-family:'IBM Plex Mono',monospace;}
.vs-side.h .val{color:var(--blue);} .vs-side.p .val{color:var(--danger);}
.vs-x{font-weight:800;color:var(--dim);}
.result-banner{text-align:center;border-radius:12px;padding:14px;margin:10px 0;font-weight:800;font-size:16px;font-family:'Orbitron',sans-serif;}
.result-banner.h{background:#0e3a2455;border:1.5px solid var(--good);color:var(--good);}
.result-banner.p{background:#3a120855;border:1.5px solid var(--danger);color:var(--danger);}
.award-row{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px dashed var(--line);font-size:13px;}
.award-row:last-child{border-bottom:none;}

<body>

<script>
/* ============================================================
   SPACE TRIBES: PARASITE — Schema v4
   10 rounds · Training → Infection → Boss
   Host = human dice + parasite package (Instinct die)
   ============================================================ */

const firebaseConfig = {
  apiKey: "AIzaSyDpR3PEAEskSCZ7fpvuEi6EBFMoB0UZ6Yw",

/** Seat cosmetics — color + shape icons (names are typed by players). */
const SEAT_META = {
  p1: { color:'#f0b429', shape:'circle',   title:'Seat 1' },
  p2: { color:'#4db8ff', shape:'triangle', title:'Seat 2' },
  p3: { color:'#3ecf8e', shape:'square',   title:'Seat 3' },
  p4: { color:'#ff8a3d', shape:'diamond',  title:'Seat 4' },
  p5: { color:'#ff7eb6', shape:'star',     title:'Seat 5' },
  p6: { color:'#a78bfa', shape:'hex',      title:'Seat 6' },
};
/** Legacy fixed names (older games) */
const LEGACY_NAMES = {
  dave:'Dave', brian:'Brian', joel:'Joel', chris:'Chris', sam:'Sam', riley:'Riley',
};
const LEGACY_META = {
  dave:  { color:'#f0b429', shape:'circle',   title:'Captain' },
  brian: { color:'#4db8ff', shape:'triangle', title:'Gunner' },
  joel:  { color:'#3ecf8e', shape:'square',   title:'Engineer' },
  chris: { color:'#ff8a3d', shape:'diamond',  title:'Scout' },
  sam:   { color:'#ff7eb6', shape:'star',     title:'Medic' },
  riley: { color:'#a78bfa', shape:'hex',      title:'Pilot' },
};
const ALL_PIDS = ['p1','p2','p3','p4','p5','p6'];
const MIN_PLAYERS = 3;
const MAX_PLAYERS = 6;
const DEFAULT_ROSTER = ['p1','p2','p3','p4'];
const INFECTION_SLOTS = 8; // rounds 2–9
function seatMeta(id){
  return SEAT_META[id] || LEGACY_META[id] || { color:'#4db8ff', shape:'circle', title:'Seat' };
}
function knownSeat(id){ return !!(SEAT_META[id] || LEGACY_META[id]); }
function rosterOf(g){
  const r = g && (g.roster || g.playerIds);
  if (Array.isArray(r) && r.length >= MIN_PLAYERS){
    return r.filter(p => knownSeat(p));
  }
  return DEFAULT_ROSTER.slice();
}
function tableSize(g){ return rosterOf(g).length; }
function cleanPlayerName(s){
  return String(s||'').replace(/\s+/g,' ').trim().slice(0, 16);
}
function playerName(pid, g){
  g = g || (typeof G !== 'undefined' ? G : null);
  const pl = g && g.players && g.players[pid];
  if (pl && cleanPlayerName(pl.name)) return cleanPlayerName(pl.name);
  if (LEGACY_NAMES[pid]) return LEGACY_NAMES[pid];
  const m = seatMeta(pid);
  return m.title || 'Player';
}
function playerShort(pid, g){
  const n = playerName(pid, g);
  return n.length <= 8 ? n : (n.slice(0,7) + '…');
}
function playerInitial(pid, g){
  const n = playerName(pid, g);
  return (n && n[0] ? n[0] : '?').toUpperCase();
}
function shapeSVG(shape, color){
  const c = color || '#4db8ff';
  const stroke = '#0a1018';
  // Distinct filled shapes — readable even at 16px
  if (shape === 'triangle'){
    return `<svg viewBox="0 0 40 40" aria-hidden="true"><polygon points="20,4 36,34 4,34" fill="${c}" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
  }
  if (shape === 'square'){
    return `<svg viewBox="0 0 40 40" aria-hidden="true"><rect x="6" y="6" width="28" height="28" rx="3" fill="${c}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
  }
  if (shape === 'diamond'){
    return `<svg viewBox="0 0 40 40" aria-hidden="true"><polygon points="20,3 37,20 20,37 3,20" fill="${c}" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
  }
  if (shape === 'star'){
    return `<svg viewBox="0 0 40 40" aria-hidden="true"><polygon points="20,3 24.5,14.5 36.5,15 27,23 30.5,35 20,28.5 9.5,35 13,23 3.5,15 15.5,14.5" fill="${c}" stroke="${stroke}" stroke-width="2" stroke-linejoin="round"/></svg>`;
  }
  if (shape === 'hex'){
    return `<svg viewBox="0 0 40 40" aria-hidden="true"><polygon points="20,3 35,11.5 35,28.5 20,37 5,28.5 5,11.5" fill="${c}" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
  }
  // circle default
  return `<svg viewBox="0 0 40 40" aria-hidden="true"><circle cx="20" cy="20" r="15" fill="${c}" stroke="${stroke}" stroke-width="2.5"/></svg>`;
}
function crewImg(id, cls=''){
  const c = seatMeta(id);
  const label = playerName(id);
  return `<span class="seat-mark ${cls}" style="color:${c.color}" title="${escName(label)}" aria-label="${escName(label)}">${shapeSVG(c.shape, c.color)}</span>`;
}
/** Symbol + name — use anywhere a player identity is shown. */
function whoHTML(pid, opts){
  opts = opts || {};
  const name = opts.short ? playerShort(pid) : playerName(pid);
  const bold = opts.bold !== false;
  const nm = bold ? `<b>${esc(name)}</b>` : esc(name);
  return `<span class="who-chip">${crewImg(pid)}${nm}</span>`;
}
function escName(s){ return String(s).replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function parasiteArtHTML(size, stage){
  const s = Math.max(0, Math.min(4, stage|0));
  const img = s >= 3 ? 'assets/parasite-devourer.png' : 'assets/parasite-spore.png';
  const px = Math.round(size);
  return `<span class="parasite-art" aria-hidden="true"><img src="${img}" alt="The parasite" width="${px}" height="${px}" style="max-width:${px}px"></span>`;
}
const PIDS = ALL_PIDS;
/** Compat shim — old code read PLAYERS[id].name */
const PLAYERS = new Proxy({}, {
  get(_t, id){
    if (typeof id !== 'string') return undefined;
    if (!knownSeat(id)) return undefined;
    const m = seatMeta(id);
    const name = playerName(id);
    return { name, short: playerShort(id), shape: m.shape, color: m.color, title: m.title, initial: playerInitial(id) };
  },
  has(_t, id){ return knownSeat(id); },
});
const COLORS = ['red','blue','green'];
const COLOR_META = {
  red:   { name:'Weapons',  icon:'W' },
  blue:  { name:'Strength', icon:'S' },
  green: { name:'Agility',  icon:'A' },
};

const TOTAL_ROUNDS = 10;
const SCHEMA = 6;

const CFG = {
  roundStipend: 5,
  forgeCost: 1,
  forgeBump: 2,
  addDieCost: 3,
  rerollCost: 1,
  freeRerollPerkCost: 0, // removed — everyone gets 1 free reroll each round
  freeRerollsPerRound: 1,
  modUpgradeCost: 2,
  faceCap: 0,
  maxDicePerColor: 2,
  maxParAttack: 4,
  // points
  trainRankPts: [6,4,2,1],
  humanWinPts: r => r >= 6 ? 12 : 8,
  hostWinPts:  r => r >= 6 ? 10 : 8,
  mvpPts:      r => r >= 6 ? 5 : 3,
  catPts:      r => r >= 6 ? 3 : 2,
  heroBonus:   [12, 8, 5, 3],
  heroFailBonus:[4, 3, 2, 1],
  killBlowPts: 5,
  winEn: 2,
  catEn: 1,
  lossEn: 0,
  // parasite middle-balance
  startFusion: 0.60,
  fusionCap: 0.85,
  fusionStep: 0.10,
  startAura: 3,
  auraGain: 4,
  softMeter: 1,
  heavyMeter: 3,
  winMeter: 1,
  hpBase: 100,
  hpPerMeter: 3,
};

/** Scale parasite + boss to table size. Baseline is 4 players (3 crew). */
function parasiteTuning(n){
  n = Math.max(MIN_PLAYERS, Math.min(MAX_PLAYERS, n|0 || 4));
  const crew = n - 1;
  const k = crew / 3;
  return {
    n, crew, k,
    startFusion: Math.min(0.75, Math.round((0.45 + 0.05 * crew)*100)/100), // 3p .55 · 4p .60 · 5p .65 · 6p .70
    fusionCap: Math.min(0.92, Math.round((0.70 + 0.05 * crew)*100)/100),   // 3p .80 · 4p .85 · 5p .90 · 6p .92
    fusionStep: CFG.fusionStep,
    startAura: Math.max(2, Math.round(CFG.startAura * k)), // 2 / 3 / 4 / 5
    auraGain: Math.max(3, Math.round(CFG.auraGain * k)),   // 3 / 4 / 5 / 7
    atkDice: n >= 6 ? 3 : 2,
    faceBonus: n === 5 ? 1 : 0,                            // 5p: hotter starter faces
    hpBase: Math.round(CFG.hpBase * n / 4),                // 75 / 100 / 125 / 150
    hpPerMeter: Math.max(2, Math.round(CFG.hpPerMeter * n / 4)), // 2 / 3 / 4 / 5
  };
}
function rankPtsFor(n, high, low){
  n = Math.max(1, n|0);
  if (n === 1) return [high];
  const out = [];
  for (let i=0;i<n;i++) out.push(Math.max(low, Math.round(high - (high-low)*i/(n-1))));
  return out;
}
function ordinalPlace(place){
  const j = place % 10, k = place % 100;
  if (j===1 && k!==11) return place+'st';
  if (j===2 && k!==12) return place+'nd';
  if (j===3 && k!==13) return place+'rd';
  return place+'th';
}

const MOD_LEVELS = {
  energy: [2, 3, 4],
  pct:    [20, 30, 40],
  base:   [3, 5, 7],
};

const SCAR_FACES = {
  1: [
    { id:'drain',   label:'−2⚡',     desc:'Lose 2 Energy' },
    { id:'bleed',   label:'−10%',    desc:'−10% attack' },
    { id:'static',  label:'no mod',  desc:'Mod die ignored' },
    { id:'fumble',  label:'reroll↑', desc:'Reroll highest die' },
    { id:'penalty', label:'−5 pts',  desc:'Lose 5 points' },
    { id:'shatter', label:'−highest',desc:'Subtract strongest die value (die stays)' },
  ],
  2: [
    { id:'drain',   label:'−4⚡',      desc:'Lose 4 Energy' },
    { id:'bleed',   label:'−20%',     desc:'−20% attack' },
    { id:'static',  label:'no mod−1⚡',desc:'Mod ignored & −1⚡' },
    { id:'fumble',  label:'reroll↑↑', desc:'Reroll two highest' },
    { id:'penalty', label:'−10 pts',  desc:'Lose 10 points' },
    { id:'shatter', label:'−high −5pts', desc:'Subtract strongest die value & −5 pts' },
  ],
};

// Instinct die — the fun parasite specialty die (always rolled)
const INSTINCT_FACES = [
  { id:'gnash',  label:'+8',         desc:'Add +8 to parasite total' },
  { id:'fever',  label:'+25% atk',   desc:'Add 25% of parasite attack dice' },
  { id:'twin',   label:'+lowest',    desc:'Add your lowest parasite attack die again' },
  { id:'echo',   label:'+your high', desc:'Add your highest human die' },
  { id:'blank',  label:'—',          desc:'Nothing this roll' },
  { id:'explode',label:'+extra die', desc:'Roll one more exploding attack die and add it' },
];


const TIPS = {
  mod: { title:'Human mod die', body:'Always rolls with you. Faces: +2⚡ next (→3/4), +20% attack (→30/40), or Base +3 (→5/7). Upgrade a face for 2 Energy (max level 3).' },
  scar: { title:'Scar die', body:'You get this after a heavy parasite growth. All 6 faces hurt. Labels show the real effect. You can reroll it.' },
  fusion: { title:'Human share', body:'On host turns, part of your human attack is added into the parasite total. Soft growth raises this percent; heavy can make it 100% for one round.' },
  aura: { title:'Aura', body:'A permanent flat number added to the parasite total every host turn.' },
  boss: { title:'Boss meter / Round 10 HP', body:'Tracks how much the table fed the parasite. Round 10 HP = 100 + (3 x Boss Meter). Soft growth +1, heavy +3, host win +1.' },
  instinct: { title:'Specialty die', body:'Extra parasite die. Faces show the effect: +8, +25% atk, +lowest, +your high, blank, or +extra die.' },
  host: { title:'Host turn', body:'You still roll your human dice + mod, AND the parasite package. Your total = human + parasite vs the rest of the crew (balanced to table size).' },
  energy: { title:'Energy', body:'+5 each round (banks). Win +2. Category +1. Forge +2 costs 1. Mod upgrade 2. Extra die 3. 1 free reroll per round, then 1 each.' },
  explode: { title:'Explode', body:'If a parasite attack die hits its highest face, roll that die once more and add it.' },
};
function tip(key, label){
  return `<button type="button" class="tip-link" onclick="showTip('${key}')">${label}</button>`;
}
function showTip(key){ ui.tipKey = key; render(); }
function closeTip(){ ui.tipKey = null; render(); }
function tipModalHTML(){
  if (!ui.tipKey || !TIPS[ui.tipKey]) return '';

  return `<div class="modal-back" onclick="if(event.target===this)closeTip()">

}

const EVO_STAGES = [
  { min:0,  name:'THE SPORE',    size:108, stage:0, tag:'Nesting in the cortex' },
  { min:2,  name:'THE LARVA',    size:116, stage:1, tag:'Tunnels through memory' },

];
function evoStage(m){ let s=EVO_STAGES[0]; for(const e of EVO_STAGES) if(m>=e.min) s=e; return s; }

/* ================= UTIL ================= */
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const deep = o => JSON.parse(JSON.stringify(o));
const uid = (p) => p + '_' + Math.random().toString(36).slice(2,7);
function stdFaces(){ return [1,2,3,4,5,6]; }
function hotFaces(){ return [3,4,5,6,7,8]; } // middle-balance starter
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=randInt(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }

function starterDice(){
  return [
    { id:'w1', color:'red',   faces:stdFaces(), bonus:false },
    { id:'s1', color:'blue',  faces:stdFaces(), bonus:false },
    { id:'a1', color:'green', faces:stdFaces(), bonus:false },

}

/** Build up to 8 infection hosts. Max 2 each. Leftover slots (3p) are skirmish (null). */
function buildHostSchedule(roster){
  const ids = roster.slice();
  const N = ids.length;
  const hostSlots = Math.min(INFECTION_SLOTS, N * 2);
  const counts = {};
  ids.forEach(p => counts[p] = 0);
  // Give everyone one host when possible
  let left = hostSlots;
  const bag = [];
  if (hostSlots >= N){
    ids.forEach(p => { counts[p] = 1; bag.push(p); });
    left -= N;
  }
  // Second hosts to a random subset — never a third
  const seconds = shuffle(ids);
  for (let i=0;i<left;i++){
    counts[seconds[i]] = 2;
    bag.push(seconds[i]);
  }
  // Arrange with no adjacent duplicate hosts when possible
  let order = arrangeHosts(bag);
  while (order.length < INFECTION_SLOTS) order.push(null); // skirmish slots (3-player tables)
  return order;
}
function arrangeHosts(bag){
  const items = bag.slice();
  for (let attempt=0; attempt<80; attempt++){
    const s = shuffle(items);
    let ok = true;
    for (let i=1;i<s.length;i++) if (s[i] && s[i]===s[i-1]){ ok=false; break; }
    if (ok) return s;
  }
  // greedy fallback
  const byCount = {};
  items.forEach(p => { byCount[p]=(byCount[p]||0)+1; });
  const out = [];
  while (out.length < items.length){
    const choices = Object.keys(byCount).filter(p => byCount[p]>0).sort((a,b)=>byCount[b]-byCount[a]);
    let pick = choices.find(p => p !== out[out.length-1]) || choices[0];
    if (!pick) break;
    out.push(pick);
    byCount[pick]--;
  }
  return out;
}

/** Unbiased integer in [0, maxExclusive). Uses crypto when available (fair across all faces). */
function randInt(maxExclusive){
  const n = maxExclusive|0;
  if (n <= 0) return 0;
  const cryptoObj = (typeof crypto !== 'undefined' && crypto.getRandomValues) ? crypto : null;
  if (cryptoObj){
    // Rejection sampling — avoids Math.random modulo bias
    const maxUint = 0x100000000;
    const limit = maxUint - (maxUint % n);
    const buf = new Uint32Array(1);
    let x;
    do {
      cryptoObj.getRandomValues(buf);
      x = buf[0];
    } while (x >= limit);
    return x % n;
  }
  return Math.floor(Math.random() * n);
}

/** Pick one of the die's face slots uniformly (all 6 sides equal chance). */
function rollFace(faces){
  const list = faces || [];
  if (!list.length) return { index:0, value:0 };
  const i = randInt(list.length);
  return { index:i, value:list[i] };
}
function rollIndex(n){ return randInt(n); }

/** Exploding attack die — on max face, roll once more and add (classic dice fun). */
function rollExplodingAttack(faces){
  const first = rollFace(faces);
  const max = Math.max(...faces);
  let total = first.value;
  let bonus = null;
  if (first.value === max){
    const extra = rollFace(faces);
    total += extra.value;
    bonus = extra;
  }
  return { index:first.index, value:total, shown:first.value, exploded:!!bonus, bonus };
}

function softGrowthOptions(p){

function heavyGrowthOptions(p){

    { key:'new_die', lane:'heavy', title:'+1 attack die', desc:'Strong now. Add exploding attack die (3–8). You get a Scar die. Round-10 boss +3.' },
    { key:'ribcage', lane:'heavy', title:'+2 all attack faces', desc:'Strong now. +2 on every face of all parasite attack dice. Scar die. Round-10 boss +3.' },
    { key:'full_fusion', lane:'heavy', title:'100% human share tonight', desc:'Strong now. This round only: add 100% of your human attack again. Scar die. Round-10 boss +3.' },
    { key:'instinct_up', lane:'heavy', title:'Blank → +25% atk', desc:'Strong now. Replace a blank specialty face with +25% atk. Scar die. Round-10 boss +3.' },
  ];
}
function applySoftGrowth(parasite, key){
  parasite.bossMeter = (parasite.bossMeter||0) + CFG.softMeter;
  parasite.mutations = (parasite.mutations||0) + 1;
  if (key==='surge'){
    const d = (parasite.attack||[])[0];
    if (d) d.faces = d.faces.map(v=>v+1);
    return { key, lane:'soft' };
  }
  if (key==='push_mod'){
    const faces = parasite.mod.faces;
    const rank = f => {
      if (!f || f.type==='blank') return 0;
      if (f.type==='flat') return 1 + (f.n>=8?1:0);
      if (f.type==='pct') return 3 + (f.n>=25?1:0) + (f.n>=35?1:0);
      return 5;
    };
    let bi = 0;
    for (let i=1;i<faces.length;i++) if (rank(faces[i]) < rank(faces[bi])) bi = i;
    const r = rank(faces[bi]);
    const ladder = [
      { type:'flat', n:5 }, { type:'flat', n:8 },
      { type:'pct', n:15 }, { type:'pct', n:25 }, { type:'pct', n:35 },
    ];
    faces[bi] = deep(ladder[Math.min(r, ladder.length-1)]);
    return { key, lane:'soft' };
  }
  if (key==='fusion'){
    parasite.fusionPct = Math.min((parasite.fusionCap!=null?parasite.fusionCap:CFG.fusionCap), (parasite.fusionPct||CFG.startFusion) + (parasite.fusionStep!=null?parasite.fusionStep:CFG.fusionStep));
    return { key, lane:'soft' };
  }
  if (key==='aura'){
    parasite.auraFlat = (parasite.auraFlat||0) + (parasite.auraGain!=null?parasite.auraGain:CFG.auraGain);
    return { key, lane:'soft' };
  }
  return null;
}
function applyHeavyGrowth(parasite, key, hostPl){
  parasite.bossMeter = (parasite.bossMeter||0) + CFG.heavyMeter;
  parasite.mutations = (parasite.mutations||0) + 1;
  if (hostPl && (hostPl.scarLv||0) < 2) hostPl.scarLv = (hostPl.scarLv||0) + 1;
  let fusionOverride = null;
  if (key==='new_die'){
    if ((parasite.attack||[]).length < CFG.maxParAttack){
      parasite.attack.push({ id: uid('atk'), faces: hotFaces() });
    }
  } else if (key==='ribcage'){
    (parasite.attack||[]).forEach(d=>{ d.faces = d.faces.map(v=>v+2); });
  } else if (key==='full_fusion'){
    fusionOverride = 1.0;
  } else if (key==='instinct_up'){
    const inst = parasite.instinct || INSTINCT_FACES.map(f=>f.id);
    const bi = inst.indexOf('blank');
    if (bi>=0) inst[bi] = 'fever';
    else {
      const gi = inst.indexOf('gnash');
      // mark empowered gnash by duplicating fever if needed
      if (gi>=0) inst[gi] = 'fever';
    }
    parasite.instinct = inst;
  }
  return { key, lane:'heavy', fusionOverride, scarLv: hostPl ? hostPl.scarLv : 0 };
}

function normalizeModRoll(modRoll){
  if (!modRoll || !modRoll.kind) return modRoll;
  if (modRoll.value == null){

  }
  return modRoll;
}

function computeHumanTotal(rolls, modRoll, scarRoll, scarLv){
  // rolls should already include scar combat effects (bleed / −highest / fumble).
  // modRoll null means scar blocked mod (no mod).
  modRoll = normalizeModRoll(modRoll);
  let attack = (rolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  let total = attack;
  let pendingEnergy = 0;
  let modAdd = 0;
  let modLabel = 'no mod';
  if (modRoll && modRoll.kind==='energy'){
    pendingEnergy = modRoll.value|0;
    modLabel = '+'+pendingEnergy+'⚡ next';
  } else if (modRoll && modRoll.kind==='pct'){
    modAdd = Math.floor(attack * (modRoll.value|0) / 100);
    total += modAdd;
    modLabel = '+'+modRoll.value+'% → +'+modAdd;
  } else if (modRoll && modRoll.kind==='base'){
    modAdd = modRoll.value|0;
    total += modAdd;
    modLabel = 'Base +'+modAdd;
  }
  let scarLabel = '';
  if (scarRoll && scarRoll.label) scarLabel = scarRoll.label;
  return { attack, total, pendingEnergy, modAdd, modLabel, scarLabel };
}

function computeParasitePortion(parasite, aRolls, modRoll, instinctRoll, humanAttack, highestHumanDie, fusionOverride){
  let atk = (aRolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  let flat = 0, pctAdd = 0;
  if (modRoll){
    if (modRoll.type==='flat') flat += modRoll.n;
    if (modRoll.type==='pct') pctAdd += Math.floor(atk * modRoll.n / 100);
  }
  const fusionPct = fusionOverride != null ? fusionOverride : (parasite.fusionPct||CFG.startFusion);
  const fusion = Math.floor(humanAttack * fusionPct);
  let instinctAdd = 0;
  let instinctNote = instinctRoll;
  if (instinctRoll === 'gnash') instinctAdd = 8;
  else if (instinctRoll === 'fever') instinctAdd = Math.floor(atk * 0.25);
  else if (instinctRoll === 'twin'){
    const vals = (aRolls||[]).map(d=>d.v||0);
    instinctAdd = vals.length ? Math.min(...vals) : 0;
  } else if (instinctRoll === 'echo'){
    instinctAdd = highestHumanDie || 0;
  } else if (instinctRoll === 'explode'){
    // already may include exploded die in aRolls via session — add one more hot die here if not present
    // resolve uses instinctExplodeV if provided on roll payload
  } else if (instinctRoll && typeof instinctRoll === 'object' && instinctRoll.id==='explode'){
    instinctAdd = instinctRoll.extra || 0;
    instinctNote = 'explode';
  }
  const aura = parasite.auraFlat || 0;
  const total = atk + flat + pctAdd + fusion + instinctAdd + aura;
  return { atk, flat, pctAdd, fusion, fusionPct, instinctAdd, aura, total, instinctNote };
}

function expectedParThreat(p){
  const atk = (p.attack||[]).reduce((s,d)=>s+faceAvg(d.faces),0);
  let flatExp=0, pctExp=0;
  (p.mod && p.mod.faces || []).forEach(f=>{
    const n = (p.mod.faces||[]).length || 1;
    if (f.type==='flat') flatExp += f.n / n;
    if (f.type==='pct') pctExp += (atk * f.n / 100) / n;
  });
  // instinct rough +4 EV, fusion uses ~20 human attack estimate
  const fusion = Math.floor(22 * (p.fusionPct||CFG.startFusion));
  return Math.round(atk + flatExp + pctExp + fusion + (p.auraFlat||0) + 5);
}

/* ================= ROUND RESOLUTION ================= */
function resolveRound(g){
  const r = g.round;
  const roster = rosterOf(g);
  const actions = (g.rounds && g.rounds[r] && g.rounds[r].actions) || {};
  if (roster.some(p=>!actionLocked(actions[p]))) return g;
  if (g.rounds[r].result) return g;

  const kind = roundKind(r, g);
  const hostId = hostIdForRound(g, r);

  // Apply human spends for everyone
  roster.forEach(pid=>{
    const a = actions[pid], pl = g.players[pid];
    let spent = 0;
    const forges = a.forges || [];
    spent += forges.length * CFG.forgeCost;
    forges.forEach(f=>{
      const d = findDie(pl.dice, f.dieId);
      applyForge(d, f.faceIndex, CFG.forgeBump);
    });
    // mod upgrades
    (a.modUps||[]).forEach(idx=>{
      const face = pl.modDie[idx];
      if (face && face.level < 2){
        face.level += 1;
        spent += CFG.modUpgradeCost;
      }
    });
    if (a.addDie && canAddColor(pl, a.addDie, null)){
      spent += CFG.addDieCost;
      const fromRoll = (a.rolls||[]).find(d=>d.tempNew);
      pl.dice.push({ id: fromRoll ? fromRoll.dieId : uid(a.addDie[0]), color: a.addDie, faces: stdFaces(), bonus: true });
    }
    spent += Math.max(0, a.rerollBuys||0) * CFG.rerollCost;
    // free-reroll perk purchase removed — everyone gets CFG.freeRerollsPerRound each round
    pl.energy = Math.max(0, (pl.energy||0) - spent);
  });

  // Host growth
  let growthResult = null;
  let fusionOverride = null;
  if (kind==='infection' && hostId){
    const a = actions[hostId];
    const growth = a.growth;
    if (growth && growth.key){
      if (growth.lane==='heavy'){
        growthResult = applyHeavyGrowth(g.parasite, growth.key, g.players[hostId]);
        fusionOverride = growthResult.fusionOverride;
      } else {
        growthResult = applySoftGrowth(g.parasite, growth.key);
      }
    }
  }

  const awards = {};
  roster.forEach(p=> awards[p]={pts:0, energy:0, tags:[], pendingEnergy:0});

  // --- TRAINING / SKIRMISH (no host) ---
  if (kind==='training' || kind==='skirmish'){
    const totals = {};
    const rolls = {};
    const breakdown = {};
    roster.forEach(pid=>{
      const a = actions[pid];
      rolls[pid] = deep(a.rolls||[]);
      const mod = a.modRoll || null;
      const scar = a.scarRoll || null;
      const br = computeHumanTotal(a.rolls, mod, scar, g.players[pid].scarLv);
      totals[pid] = br.total;
      breakdown[pid] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(mod), scarRoll: deep(scar),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      awards[pid].pendingEnergy = breakdown[pid].pendingEnergy;
      if (a.ptsDelta) awards[pid].pts += a.ptsDelta;
    });
    const order = roster.slice().sort((a,b)=> totals[b]-totals[a]);
    const trainPts = rankPtsFor(roster.length, 6, 1);
    order.forEach((pid,i)=>{ awards[pid].pts += trainPts[i]||1; awards[pid].tags.push(kind==='skirmish'?'skirmish':'train'); });
    // categories
    const cats = {};
    COLORS.forEach(c=>{
      const best = roster.map(h=>{
        const vals = (rolls[h]||[]).filter(d=>d.color===c).map(d=>d.v);
        return { h, v: vals.length ? Math.max(...vals) : -1 };
      }).sort((a,b)=>b.v-a.v);
      if (best.length>=2 && best[0].v > best[1].v && best[0].v >= 0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else cats[c] = null;
    });
    roster.forEach(p=>{
      awards[p].energy += CFG.roundStipend;
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += awards[p].energy + (awards[p].pendingEnergy||0);
    });
    g.rounds[r].result = {
      kind, rolls, totals, breakdown, cats, awards,
      growth: null, hostId: null,
      resolvedAt: Date.now(),
    };
  }

  // --- INFECTION ---
  else if (kind==='infection'){
    const humans = roster.filter(p=>p!==hostId);
    const rolls = {};
    const humanTotals = {};
    const breakdown = {};
    let crewTotal = 0;
    humans.forEach(h=>{
      const a = actions[h];
      rolls[h] = deep(a.rolls||[]);
      const br = computeHumanTotal(a.rolls, a.modRoll, a.scarRoll, g.players[h].scarLv);
      humanTotals[h] = { attack: br.attack, total: br.total };
      breakdown[h] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(a.modRoll||null), scarRoll: deep(a.scarRoll||null),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      crewTotal += br.total;
      awards[h].pendingEnergy = breakdown[h].pendingEnergy;
      if (a.ptsDelta) awards[h].pts += a.ptsDelta;
    });

    const hAct = actions[hostId];
    rolls[hostId] = deep(hAct.rolls||[]);
    const hostHuman = computeHumanTotal(hAct.rolls, hAct.modRoll, hAct.scarRoll, g.players[hostId].scarLv);
    breakdown[hostId] = {
      attack: hostHuman.attack, total: hostHuman.total, modAdd: hostHuman.modAdd, modLabel: hostHuman.modLabel,
      modRoll: deep(hAct.modRoll||null), scarRoll: deep(hAct.scarRoll||null),
      pendingEnergy: Math.max(0, hostHuman.pendingEnergy - (hAct.scarEnergyLoss||0)),
      ptsDelta: hAct.ptsDelta||0,
      aRolls: deep(hAct.aRolls||[]), pModRoll: deep(hAct.pModRoll||null),
      instinctRoll: hAct.instinctRoll, instinctExtra: hAct.instinctExtra||0,
    };
    awards[hostId].pendingEnergy = breakdown[hostId].pendingEnergy;
    if (hAct.ptsDelta) awards[hostId].pts += hAct.ptsDelta;

    const highestHumanDie = Math.max(0, ...(hAct.rolls||[]).map(d=>d.v||0));
    let instinctPayload = hAct.instinctRoll;
    if (instinctPayload === 'explode' || (instinctPayload && instinctPayload.id==='explode')){
      // use extra from action
      instinctPayload = { id:'explode', extra: (hAct.instinctExtra||0) };
    }
    const parPart = computeParasitePortion(
      g.parasite,
      hAct.aRolls || [],
      hAct.pModRoll || null,
      instinctPayload,
      hostHuman.attack,
      highestHumanDie,
      fusionOverride
    );
    // if explode was rolled in session with extra already in instinctExtra
    if (hAct.instinctRoll==='explode' && hAct.instinctExtra){
      parPart.instinctAdd = hAct.instinctExtra;
      parPart.total = parPart.atk + parPart.flat + parPart.pctAdd + parPart.fusion + parPart.instinctAdd + parPart.aura;
    }

    const hostTotal = hostHuman.total + parPart.total;
    const hostWins = hostTotal > crewTotal; // ties → crew

    let mvp = null;
    if (!hostWins){
      humans.forEach(h=>{
        awards[h].pts += CFG.humanWinPts(r);
        awards[h].energy += CFG.winEn;
      });
      mvp = humans.reduce((a,b)=> (humanTotals[b].total > humanTotals[a].total ? b : a));
      awards[mvp].pts += CFG.mvpPts(r);
      awards[mvp].tags.push('mvp');
    } else {
      awards[hostId].pts += CFG.hostWinPts(r);
      awards[hostId].energy += CFG.winEn;
      g.parasite.bossMeter = (g.parasite.bossMeter||0) + CFG.winMeter;
    }

    const cats = {};
    COLORS.forEach(c=>{
      const pool = humans; // categories among crew only
      const best = pool.map(h=>{
        const vals = (rolls[h]||[]).filter(d=>d.color===c).map(d=>d.v);
        return { h, v: vals.length ? Math.max(...vals) : -1 };
      }).sort((a,b)=>b.v-a.v);
      if (best.length>=2 && best[0].v > best[1].v && best[0].v >= 0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else if (best.length===1 && best[0].v>=0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else cats[c] = null;
    });

    roster.forEach(p=>{
      awards[p].energy += CFG.roundStipend;
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += awards[p].energy + (awards[p].pendingEnergy||0);
    });

    g.rounds[r].result = {
      kind, hostId, hostWins, crewSize: humans.length,
      crewTotal, hostTotal,
      hostHuman: hostHuman.total, hostAttack: hostHuman.attack,
      parPart, growth: growthResult,
      rolls, humanTotals, breakdown, cats, mvp, awards,
      aRolls: hAct.aRolls||[], pModRoll: hAct.pModRoll||null,
      instinctRoll: hAct.instinctRoll, instinctExtra: hAct.instinctExtra||0,
      bossMeter: g.parasite.bossMeter,
      parasiteAfter: deep(g.parasite),
      resolvedAt: Date.now(),
    };
  }

  // --- BOSS ---
  else if (kind==='boss'){
    const rolls = {};
    const totals = {};
    const breakdown = {};
    let crewTotal = 0;
    roster.forEach(pid=>{
      const a = actions[pid];
      rolls[pid] = deep(a.rolls||[]);
      const br = computeHumanTotal(a.rolls, a.modRoll, a.scarRoll, g.players[pid].scarLv);
      totals[pid] = br.total;
      breakdown[pid] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(a.modRoll||null), scarRoll: deep(a.scarRoll||null),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      crewTotal += br.total;
      awards[pid].pendingEnergy = breakdown[pid].pendingEnergy;
      if (a.ptsDelta) awards[pid].pts += a.ptsDelta;
    });
    const hp = bossHP(g);
    const cleared = crewTotal >= hp;
    g.escaped = !cleared;
    const order = roster.slice().sort((a,b)=> totals[b]-totals[a]);
    const bonus = rankPtsFor(roster.length, cleared ? 12 : 4, cleared ? 3 : 1);
    order.forEach((pid,i)=>{
      awards[pid].pts += bonus[i]||1;
      awards[pid].tags.push(cleared ? 'hero' : 'escape');
    });
    if (cleared){
      awards[order[0]].pts += CFG.killBlowPts;
      awards[order[0]].tags.push('kill');
    }
    roster.forEach(p=>{
      // no next-round stipend
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += (awards[p].pendingEnergy||0);
    });
    g.rounds[r].result = {
      kind, rolls, totals, breakdown, crewTotal, hp, cleared, escaped: !cleared,
      awards, hero: order[0], bossMeter: g.parasite.bossMeter,
      resolvedAt: Date.now(),
    };
  }

  if (r >= TOTAL_ROUNDS) g.status = 'over';
  else g.round = r + 1;
  return g;
}

/* ================= FIREBASE ================= */
const APP_BUILD = 'v4.3.9';
let connectTimer = null;
let restPollTimer = null;
let usingRest = false;
let fbReady = false;

function configOK(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('PASTE'); }
function dbRoot(){ return String(firebaseConfig.databaseURL||'').replace(/\/$/,''); }

function normalizeGame(v){
  if (!v || typeof v !== 'object') return v;
  const g = v;
  if (!g.rounds) g.rounds = {};
  if (!g.players) g.players = {};
  if (!Array.isArray(g.roster) || g.roster.length < MIN_PLAYERS){
    // legacy 4-seat games
    const legacy = DEFAULT_ROSTER.filter(p => g.players && g.players[p]);
    g.roster = legacy.length >= MIN_PLAYERS ? legacy : DEFAULT_ROSTER.slice();
  }
  g.roster = g.roster.filter(p => knownSeat(p));
  g.playerIds = g.roster.slice();
  if (!Array.isArray(g.schedule) || g.schedule.length !== INFECTION_SLOTS){
    // keep existing if plausible; otherwise rebuild from roster
    if (!Array.isArray(g.schedule) || !g.schedule.length) g.schedule = buildHostSchedule(g.roster);
  }
  if (!g.parasite) g.parasite = starterParasite(g.roster.length);
  else {
    const t = parasiteTuning(g.roster.length);
    if (g.parasite.fusionCap == null) g.parasite.fusionCap = t.fusionCap;
    if (g.parasite.fusionStep == null) g.parasite.fusionStep = t.fusionStep;
    if (g.parasite.auraGain == null) g.parasite.auraGain = t.auraGain;
    if (g.parasite.hpBase == null) g.parasite.hpBase = t.hpBase;
    if (g.parasite.hpPerMeter == null) g.parasite.hpPerMeter = t.hpPerMeter;
    if (g.parasite.balanceN == null) g.parasite.balanceN = t.n;
  }
  rosterOf(g).forEach(pid=>{
    let pl = g.players[pid];
    if (!pl){
      pl = g.players[pid] = {
        name:'', isBot:false, pts:0, energy:CFG.roundStipend, dice:starterDice(), modDie:starterModDie(),
        scarLv:0, perks:{ freeReroll:false },
      };
    }
    pl.isBot = !!pl.isBot;
    if (pl.name == null || pl.name === ''){
      if (pl.isBot) pl.name = 'Comp';
      else if (LEGACY_NAMES[pid]) pl.name = LEGACY_NAMES[pid];
      else pl.name = pl.name || '';
    } else {
      pl.name = cleanPlayerName(pl.name);
    }
    if (pl.isBot && /^comp\b/i.test(pl.name) === false && !cleanPlayerName(pl.name)) pl.name = 'Comp';
    if (!pl.dice) pl.dice = starterDice();
    (pl.dice||[]).forEach(d=>{
      if (d && d.bonus == null) d.bonus = !isStarterDieId(d.id);
    });
    if (!pl.modDie) pl.modDie = starterModDie();
    if (!pl.perks) pl.perks = { freeReroll:false };
    if (pl.scarLv == null) pl.scarLv = 0;
    if (pl.energy == null) pl.energy = CFG.roundStipend;
    if (pl.pts == null) pl.pts = 0;
  });
  if (g.parasite && g.parasite.bossMeter == null) g.parasite.bossMeter = 0;
  return g;
}

function applyRemoteGame(v){
  try{
    if (!v){ startNewGame(); return; }
    if ((v.schema||1) < SCHEMA){
      G = normalizeGame({ ...v, status:'need_reset' });
      render();
      return;
    }
    G = normalizeGame(v);
    fbReady = true;
    if (connectTimer){ clearTimeout(connectTimer); connectTimer=null; }
    maybeResolve();
    render();
    setTimeout(kickBots, 120);
  }catch(err){
    console.error(err);
    showConnectError(err && err.message ? err.message : String(err));
  }
}

function showConnectError(msg){
  const app = $('#app');
  if (!app) return;
  app.innerHTML = `<div class="panel center">
    <h2>Can't reach the ship</h2>
    <p class="small">${esc(msg||'Connection stalled.')}</p>
    <p class="small">Build ${APP_BUILD}. Check signal, then retry.</p>
    <button class="btn" onclick="retryConnect()">Retry connection</button>
    <button class="btn ghost" style="margin-top:8px" onclick="confirmResetGame()">Force new game</button>
  </div>${bottomDockHTML()}`;
}

function restGetGame(){
  return fetch(dbRoot()+'/games/current.json', { cache:'no-store' })
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
function restPut(path, data){
  return fetch(dbRoot()+'/'+path+'.json', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data), cache:'no-store'
  }).then(r=>{ if(!r.ok) throw new Error('Write failed HTTP '+r.status); return r.json(); });
}

function startRestPolling(){
  if (restPollTimer) return;
  usingRest = true;
  const tick = ()=> restGetGame().then(applyRemoteGame).catch(err=> console.warn('rest poll', err));
  tick();
  restPollTimer = setInterval(tick, 2000);
}

function initFirebase(){
  connectTimer = setTimeout(()=>{
    if (fbReady || G) return;
    // Mobile WebSocket stall → REST fallback
    console.warn('Firebase SDK slow; switching to REST');
    startRestPolling();
  }, 2500);

  try{
    if (!window.firebase){
      showConnectError('Firebase failed to load. Hard-refresh the page.');
      startRestPolling();
      return;
    }
    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    gameRef = db.ref('games/current');
    gameRef.on('value', snap=> applyRemoteGame(snap.val()), err=>{
      console.error(err);
      showConnectError(err.message||'Database permission/network error');
      startRestPolling();
    });
    // connected probe
    db.ref('.info/connected').on('value', s=>{
      if (s.val() === true) fbReady = true;
    });
  }catch(err){
    console.error(err);
    showConnectError(err.message||String(err));
    startRestPolling();
  }
}

function retryConnect(){
  G = null; fbReady = false;
  if (restPollTimer){ clearInterval(restPollTimer); restPollTimer=null; }
  usingRest = false;
  render();
  initFirebase();
}

function maybeResolve(retry){
  if (!G || G.status!=='active' || animating) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (!G.rounds) G.rounds = {};
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  if (rosterOf(G).some(p=>!actionLocked(actions[p]))) return;
  if (G.rounds[r] && G.rounds[r].result) return;

  if (usingRest || !gameRef){
    // REST read-modify-write
    restGetGame().then(cur=>{
      cur = normalizeGame(cur || G);
      if (!cur || cur.status!=='active') return;
      if ((cur.schema||1) < SCHEMA) return;
      const rr = cur.round;
      const acts = (cur.rounds[rr] && cur.rounds[rr].actions) || {};
      if (rosterOf(cur).some(p=>!actionLocked(acts[p]))) return;
      if (cur.rounds[rr] && cur.rounds[rr].result) return;
      const next = resolveRound(cur);
      return restPut('games/current', next).then(()=>applyRemoteGame(next));
    }).catch(err=> console.warn('resolve rest', err));
    return;
  }

  gameRef.transaction(g=>{
    if (!g || g.status!=='active') return;
    if ((g.schema||1) < SCHEMA) return g;
    g = normalizeGame(g);
    return resolveRound(g);
  }).then(res=>{
    if (!res.committed && !retry) setTimeout(()=>maybeResolve(true), 400);
  }).catch(err=>{
    console.warn('transaction failed, REST fallback', err);
    usingRest = true;
    maybeResolve(true);
  });
}
function submitAction(action){
  if (!me || !G) return;
  submitActionFor(me, action);
}
function submitActionFor(pid, action){
  if (!pid || !G || !action) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (!G.rounds[r]) G.rounds[r] = { actions:{} };
  if (!G.rounds[r].actions) G.rounds[r].actions = {};
  if (actionLocked(G.rounds[r].actions[pid])) return;
  G.rounds[r].actions[pid] = action;
  render();
  maybeResolve();
  const path = 'games/current/rounds/'+r+'/actions/'+pid;
  if (usingRest || !gameRef){
    restPut(path, action)
      .then(()=> restGetGame().then(applyRemoteGame))
      .catch(err=>{
        if (pid === me) showConnectError(err.message||'Could not save your turn');
        else console.warn('bot save', err);
      });
    return;
  }
  gameRef.child('rounds/'+r+'/actions/'+pid).set(action).catch(err=>{
    console.warn(err);
    usingRest = true;
    submitActionFor(pid, action);
  });
}

/** Apply scar effects to a roll bundle (used by bots; mirrors applyScarToSession). */
function applyScarToBundle(rollsIn, modRollIn, scarRoll){
  const rolls = deep(rollsIn||[]);
  let modRoll = modRollIn ? deep(modRollIn) : null;
  let ptsDelta = 0, scarEnergyLoss = 0;
  if (!scarRoll) return { rolls, modRoll, ptsDelta, scarEnergyLoss };
  const lv = scarRoll.level;
  if (scarRoll.id==='drain'){
    scarEnergyLoss = lv===1 ? 2 : 4;
  } else if (scarRoll.id==='bleed'){
    const mult = lv===1 ? 0.9 : 0.8;
    rolls.forEach(d=>{ d.v = Math.max(0, Math.round(d.v * mult)); });
  } else if (scarRoll.id==='static'){
    modRoll = null;
    if (lv===2) scarEnergyLoss += 1;
  } else if (scarRoll.id==='fumble'){
    const n = lv===1 ? 1 : 2;
    for (let k=0;k<n;k++){
      if (!rolls.length) break;
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const rf = rollFace(rolls[hi].faces);
      rolls[hi].v = rf.value; rolls[hi].index = rf.index; rolls[hi].rerolled = true;
    }
  } else if (scarRoll.id==='penalty'){
    ptsDelta = -(lv===1 ? 5 : 10);
  } else if (scarRoll.id==='shatter'){
    if (rolls.length){
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const lost = rolls[hi].v||0;
      rolls[hi].scarNote = '−'+lost;
      rolls[hi].scarZeroed = true;
      rolls[hi].v = 0;
    }
    if (lv===2) ptsDelta -= 5;
  }
  return { rolls, modRoll, ptsDelta, scarEnergyLoss };
}

function buildBotAction(pid){
  const pl = G.players[pid];
  const r = G.round;
  const kind = roundKind(r, G);
  const isHost = kind==='infection' && hostIdForRound(G, r)===pid;

  // Light shop: sometimes forge one face if they can afford it
  const forges = [];
  if ((pl.energy||0) >= CFG.forgeCost && randInt(100) < 45){
    const d = pl.dice[randInt(pl.dice.length)];
    if (d) forges.push({ dieId:d.id, faceIndex: randInt(d.faces.length) });
  }

  let growth = null;
  if (isHost){
    const soft = softGrowthOptions(G.parasite);
    const heavy = heavyGrowthOptions(G.parasite);
    if (soft.length && (randInt(100) < 70 || !heavy.length)){
      const o = soft[randInt(soft.length)];
      growth = { key:o.key, lane:'soft' };
    } else if (heavy.length){
      const o = heavy[randInt(heavy.length)];
      growth = { key:o.key, lane:'heavy' };
    } else if (soft.length){
      const o = soft[0];
      growth = { key:o.key, lane:'soft' };
    }
  }

  const dice = deep(pl.dice);
  forges.forEach(f=>{
    const d = findDie(dice, f.dieId);
    applyForge(d, f.faceIndex, CFG.forgeBump);
  });
  let rolls = dice.map(d=>{
    const rf = rollFace(d.faces);
    return { dieId:d.id, color:d.color, faces:d.faces, index:rf.index, v:rf.value, first:rf.value, rerolled:false, bonus:!!d.bonus };
  });
  const modDie = deep(pl.modDie);
  const mi = rollIndex(modDie.length);
  let modRoll = { index:mi, kind:modDie[mi].kind, level:modDie[mi].level, value:modFaceValue(modDie[mi]) };
  let scarRoll = null;
  const scarLv = pl.scarLv||0;
  if (scarLv > 0){
    const faces = SCAR_FACES[scarLv];
    const si = rollIndex(faces.length);
    scarRoll = { index:si, id:faces[si].id, label:faces[si].label, level:scarLv };
  }
  const scarred = applyScarToBundle(rolls, modRoll, scarRoll);
  rolls = scarred.rolls;
  modRoll = scarred.modRoll;

  const action = {
    phase:'locked',
    role: isHost ? 'host' : 'human',
    at: Date.now(),
    forges,
    modUps: [],
    addDie: null,
    buyFreeReroll: false,
    rerollBuys: 0,
    rolls,
    modRoll,
    scarRoll,
    ptsDelta: scarred.ptsDelta||0,
    scarEnergyLoss: scarred.scarEnergyLoss||0,
    bot: true,
  };
  if (isHost && growth){
    action.growth = growth;
    const fake = deep(G.parasite);
    if (growth.lane==='soft') applySoftGrowth(fake, growth.key);
    else applyHeavyGrowth(fake, growth.key, { scarLv: pl.scarLv||0 });
    action.aRolls = (fake.attack||[]).map(d=>{
      const er = rollExplodingAttack(d.faces);
      return { dieId:d.id, faces:d.faces, index:er.index, v:er.value, shown:er.shown, exploded:er.exploded, first:er.value, rerolled:false };
    });
    const pMod = (fake.mod && fake.mod.faces) || [];
    const pi = rollIndex(Math.max(1, pMod.length));
    action.pModRoll = deep(pMod[pi] || { type:'flat', n:5 });
    action.pModRoll.index = pi;
    const inst = fake.instinct || INSTINCT_FACES.map(f=>f.id);
    const ii = rollIndex(inst.length);
    action.instinctRoll = inst[ii];
    action.instinctExtra = 0;
    if (action.instinctRoll==='explode'){
      action.instinctExtra = rollExplodingAttack(hotFaces()).value;
    }
  }
  return action;
}

/** Only the "driver" human phone runs bots (lowest seat id among humans). */
function botDriverId(){
  if (!G) return null;
  const humans = rosterOf(G).filter(p => G.players[p] && !G.players[p].isBot);
  if (!humans.length) return null;
  return humans.slice().sort()[0];
}
function kickBots(){
  if (!G || G.status !== 'active') return;
  if (!me || me !== botDriverId()) return;
  const r = G.round;
  if (G.rounds[r] && G.rounds[r].result) return;
  if (!G.rounds[r]) G.rounds[r] = { actions:{} };
  if (!G.rounds[r].actions) G.rounds[r].actions = {};
  if (!ui._botBusy) ui._botBusy = {};
  let any = false;
  rosterOf(G).forEach(pid=>{
    const pl = G.players[pid];
    if (!pl || !pl.isBot) return;
    if (actionLocked(G.rounds[r].actions[pid])) return;
    const key = pid+':'+r+':'+(G.createdAt||0);
    if (ui._botBusy[key]) return;
    ui._botBusy[key] = true;
    try{
      const action = buildBotAction(pid);
      submitActionFor(pid, action);
      any = true;
    }catch(err){
      console.warn('bot failed', pid, err);
      ui._botBusy[key] = false;
    }
  });
  if (any) setTimeout(()=>{ maybeResolve(); render(); }, 50);
}
function isComputer(pid){
  return !!(G && G.players && G.players[pid] && G.players[pid].isBot);
}
function loadSavedCount(){
  try{
    const n = parseInt(localStorage.getItem('stp_table_n')||'4', 10);
    if (n >= MIN_PLAYERS && n <= MAX_PLAYERS) return n;
  }catch(e){}
  return 4;
}
function startNewGame(roster, names, botFlags){
  const count = typeof roster === 'number' ? roster : (Array.isArray(roster) ? roster.length : (ui.pendingCount || loadSavedCount()));
  const ids = Array.isArray(roster) ? roster.filter(knownSeat) : ALL_PIDS.slice(0, count);
  let data;
  try{
    data = normalizeGame(newGameData(ids, names, botFlags));
  }catch(err){
    alert(err.message || 'Bad table');
    ui.showRosterPick = true;
    render();
    return;
  }
  localStorage.setItem('stp_table_n', String(ids.length));
  if (me && !ids.includes(me)){ me = null; localStorage.removeItem('stp_me'); }
  // Solo test: if exactly one human seat, claim it automatically
  const humans = ids.filter(p => data.players[p] && !data.players[p].isBot);
  if (humans.length === 1){
    me = humans[0];
    localStorage.setItem('stp_me', me);
    localStorage.setItem('stp_myname', data.players[me].name || '');
  }
  session = null; cart = null;
  try{ localStorage.removeItem('stp_seen_'+(G && G.createdAt)); }catch(e){}
  ui.showRosterPick = false;
  ui._botBusy = {};
  G = data;
  render();
  setTimeout(kickBots, 200);
  const save = ()=> {
    if (gameRef && !usingRest){
      return gameRef.set(data).catch(()=> restPut('games/current', data));
    }
    return restPut('games/current', data);
  };
  save().then(()=> applyRemoteGame(data)).catch(err=> showConnectError(err.message||'Could not create game'));
}
function confirmResetGame(){
  ui.pendingCount = (G && G.roster && G.roster.length) ? G.roster.length : loadSavedCount();
  if (G && G.players){
    ui.pendingNames = rosterOf(G).map(pid => cleanPlayerName((G.players[pid]&&G.players[pid].name)||''));
  } else {
    ui.pendingNames = Array(ui.pendingCount).fill('');
  }
  while (ui.pendingNames.length < ui.pendingCount) ui.pendingNames.push('');
  ui.pendingNames = ui.pendingNames.slice(0, ui.pendingCount);
  ui.showRosterPick = true;
  render();
}
function setPendingCount(n){
  n = Math.max(MIN_PLAYERS, Math.min(MAX_PLAYERS, n|0));
  // preserve typed names from DOM before re-render
  const keep = [];
  for (let i=0;i<MAX_PLAYERS;i++){
    const el = document.getElementById('roster-name-'+i);
    keep[i] = el ? el.value : ((ui.pendingNames&&ui.pendingNames[i])||'');
  }
  ui.pendingCount = n;
  ui.pendingNames = keep.slice(0, n);
  render();
  // restore values after render
  setTimeout(()=>{
    for (let i=0;i<n;i++){
      const el = document.getElementById('roster-name-'+i);
      if (el) el.value = ui.pendingNames[i] || '';
    }
  }, 0);
}
function confirmRosterAndStart(){
  const n = ui.pendingCount || loadSavedCount();
  if (n < MIN_PLAYERS || n > MAX_PLAYERS){
    alert('Pick '+MIN_PLAYERS+' to '+MAX_PLAYERS+' players.');
    return;
  }
  const names = [];
  const botFlags = [];
  let botN = 0;
  for (let i=0;i<n;i++){
    const el = document.getElementById('roster-name-'+i);
    const typed = cleanPlayerName(el && el.value);
    if (typed){
      names.push(typed);
      botFlags.push(false);
    } else {
      botN++;
      names.push('Comp '+botN);
      botFlags.push(true);
    }
  }
  // Solo-friendly: if every seat is blank, seat 1 is you and the rest are computers
  if (!botFlags.some(x => !x)){
    names[0] = 'You';
    botFlags[0] = false;
    botN = 0;
    for (let i=1;i<n;i++){
      botN++;
      names[i] = 'Comp '+botN;
      botFlags[i] = true;
    }
  }
  const humanNames = names.filter((_,i)=>!botFlags[i]).map(x=>x.toLowerCase());
  if (new Set(humanNames).size !== humanNames.length){
    alert('Each human player needs a different name.');
    return;
  }
  const bots = botFlags.filter(Boolean).length;
  const msg = bots
    ? 'Start with you + '+bots+' computer(s)? This wipes the current run.'
    : 'Start a fresh Schema v'+SCHEMA+' game with '+n+' players? This wipes the current run.';
  if (!confirm(msg)) return;
  startNewGame(ALL_PIDS.slice(0, n), names, botFlags);
}

function logModalHTML(){
  if (!ui.showLog || !G) return '';
  const rounds = G.rounds || {};
  const keys = Object.keys(rounds).map(Number).filter(n=>rounds[n]&&rounds[n].result).sort((a,b)=>b-a);
  let body = '';
  if (!keys.length) body = `<p class="small">No finished rounds yet.</p>`;
  else {
    body = keys.map(r=>{
      const res = rounds[r].result;
      const head = res.kind==='infection'
        ? `R${r} · ${res.hostWins?'Host won':'Crew won'} · ${playerName(res.hostId)}`
        : res.kind==='boss'
          ? `R${r} · Boss ${res.cleared?'cleared':'escaped'} · HP ${res.hp}`
          : res.kind==='skirmish' ? `R${r} · Skirmish` : `R${r} · Training`;
      const ids = rosterOf(G);
      const order = res.kind==='infection' && res.hostId
        ? [res.hostId, ...ids.filter(p=>p!==res.hostId)]
        : ids.slice().sort((a,b)=>{
            const ta=(res.breakdown&&res.breakdown[a]?res.breakdown[a].total:(res.totals&&res.totals[a])||0);
            const tb=(res.breakdown&&res.breakdown[b]?res.breakdown[b].total:(res.totals&&res.totals[b])||0);
            return tb-ta;
          });
      const cards = order.map(pid=>playerReviewCardHTML(pid, res)).join('');
      return `<div class="log-round"><h4>${esc(head)}</h4>${cards}</div>`;
    }).join('');
  }
  return `<div class="modal-back" onclick="if(event.target===this)closeLog()">
    <div class="modal-sheet" role="dialog" aria-label="Round log">
      <h2>Round log</h2>
      <p class="small">Dice, mod, scar, and totals for every finished round.</p>
      ${body}
      <button class="btn modal-close" onclick="closeLog()">Close</button>
    </div>
  </div>`;
}

function freshCart(isHost){
  return {
    forges: [], modUps: [], addDie: null, buyFreeReroll: false,
    growth: null, // host only {key, lane}
  };
}
function cartCost(){
  let c = 0;
  c += (cart.forges||[]).length * CFG.forgeCost;
  c += (cart.modUps||[]).length * CFG.modUpgradeCost;
  if (cart.addDie) c += CFG.addDieCost;
  return c;
}
function myBudget(){ return (G.players[me].energy||0); }
function energyLeft(){ return myBudget() - cartCost() - ((session && session.paidRerolls)||0)*CFG.rerollCost; }
function forgedSetFromCart(){
  const s = new Set();
  (cart.forges||[]).forEach(f=> s.add(f.dieId+':'+f.faceIndex));
  return s;
}
function freeRerollThisRound(){
  return CFG.freeRerollsPerRound || 1;
}
function canAffordReroll(){
  if (session.freeLeft > 0) return true;
  return energyLeft() >= CFG.rerollCost;
}
function spendRerollCharge(){
  if (session.freeLeft > 0){ session.freeLeft--; return true; }
  if (energyLeft() >= CFG.rerollCost){ session.paidRerolls++; return true; }
  return false;
}
function resetSessionForRound(r){
  if (!session || session.round !== r){
    session = { round:r, phase:'upgrade', rolls:null, modRoll:null, scarRoll:null,
      aRolls:null, pModRoll:null, instinctRoll:null, instinctExtra:0,
      paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null, ptsDelta:0 };
  }
  if (cartRound !== r || !cart){ cart = freshCart(); cartRound = r; }
}

function previewHumanDice(pl){
  const dice = deep(pl.dice);
  (cart.forges||[]).forEach(f=>{
    const d = findDie(dice, f.dieId);
    applyForge(d, f.faceIndex, CFG.forgeBump);
  });
  if (cart.addDie) dice.push({ id:'preview', color: cart.addDie, faces:stdFaces(), bonus:true });
  return dice;
}
function previewModDie(pl){
  const m = deep(pl.modDie);
  (cart.modUps||[]).forEach(idx=>{ if (m[idx] && m[idx].level<2) m[idx].level++; });
  return m;
}

function render(){
  const app = $('#app');
  try{
  if (!configOK()){ app.innerHTML = setupScreen(); return; }
  if (!G){
    app.innerHTML = `<div class="panel center"><h2 class="brand-hero" style="font-size:18px">SPACE TRIBES</h2><p>Connecting…</p><p class="small">Build ${APP_BUILD}. If this hangs, wait 3s for backup link.</p><button class="btn ghost" onclick="retryConnect()">Retry now</button><button class="btn" style="margin-top:8px" onclick="confirmResetGame()">New game</button></div>${bottomDockHTML()}`;
    return;
  }
  if (G.status==='need_reset'){
    app.innerHTML = `<div class="panel center">
      <h2>Schema v${SCHEMA}</h2>
      <p class="small">3–6 players. Training → Infection → Boss. Host = you + the monster. Start a fresh game.</p>
      <button class="btn" onclick="confirmResetGame()">Start new game</button>
    </div>${bottomDockHTML()}${rosterPickModalHTML()}`;
    return;
  }
  if (me && G && !rosterOf(G).includes(me)){
    me = null; localStorage.removeItem('stp_me');
  }
  if (!me){ app.innerHTML = charSelectScreen() + rosterPickModalHTML(); return; }
  if (G.status==='over'){
    // show final if R10 resolved
    const res = G.rounds[10] && G.rounds[10].result;
    if (res && lastSeen() < 10){
      app.innerHTML = chromeHTML() + verdictHTML(10) + bottomDockHTML() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
      return;
    }
    app.innerHTML = chromeHTML() + finalScreen() + bottomDockHTML();
    setTimeout(runFinalReveal, 50);
    return;
  }
  // auto-show last result if unseen
  const prev = G.round - 1;
  if (prev >= 1 && G.rounds[prev] && G.rounds[prev].result && lastSeen() < prev && !animating){
    app.innerHTML = chromeHTML() + verdictHTML(prev) + bottomDockHTML() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
    return;
  }
  app.innerHTML = gameScreen() + instructionsModalHTML() + tipModalHTML() + logModalHTML();
  }catch(err){
    console.error(err);
    showConnectError('Render error: '+(err && err.message ? err.message : String(err)));
  }
}

function claimSeat(pid){
  if (!G || !rosterOf(G).includes(pid)) return;
  if (G.players[pid] && G.players[pid].isBot){ alert('That seat is a computer player.'); return; }
  const el = document.getElementById('claim-'+pid);
  const name = cleanPlayerName(el && el.value);
  if (!name){ alert('Type your name first.'); return; }
  // block duplicate names on other seats
  const clash = rosterOf(G).find(p => p!==pid && cleanPlayerName((G.players[p]&&G.players[p].name)||'').toLowerCase()===name.toLowerCase());
  if (clash){ alert('That name is already taken.'); return; }
  const prev = cleanPlayerName((G.players[pid]&&G.players[pid].name)||'');
  if (prev && prev.toLowerCase() !== name.toLowerCase()){
    if (!confirm('Replace "'+prev+'" with "'+name+'" on this seat?')) return;
  }
  G.players[pid].name = name;
  me = pid;
  localStorage.setItem('stp_me', pid);
  localStorage.setItem('stp_myname', name);
  render();
  // persist name to shared game
  const path = 'games/current/players/'+pid+'/name';
  const save = ()=> {
    if (gameRef && !usingRest){
      return gameRef.child('players/'+pid+'/name').set(name).catch(()=> restPut(path, name));
    }
    return restPut(path, JSON.parse(JSON.stringify(name)));
  };
  save().catch(err => console.warn('name save', err));
}

  let nodes = '';
  for (let r=1;r<=TOTAL_ROUNDS;r++){
    const kind = roundKind(r);
    const now = r===G.round;
    const done = r < G.round || (G.status==='over' && r<=TOTAL_ROUNDS);
    let label = '';
    let cls = '';
    if (kind==='training'){ label = 'Train'; cls='train'; }
    else if (kind==='boss'){ label = 'Boss'; cls='boss'; }
    else if (kind==='skirmish'){ label = 'All'; cls='train'; }
    else {
      const hid = hostIdForRound(G, r);
      if (r === G.round || (G.rounds[r] && G.rounds[r].result)){
        label = `${crewImg(hid)}<span>${esc(playerShort(hid).slice(0,6))}</span>`;
      } else {
        label = '???'; cls+=' fog';
      }
    }
    const res = G.rounds[r] && G.rounds[r].result;
    let mark = '';
    if (res){
      if (res.kind==='infection') mark = res.hostWins ? '💀' : '🛡️';
      if (res.kind==='boss') mark = res.cleared ? '🏆' : '🛸';
      if (res.kind==='training' || res.kind==='skirmish') mark = '✨';
    }
    nodes += `<div class="rnode ${now?'now':''} ${done&&!now?'done':''} ${cls}"><div class="rn">R${r}</div><div class="re">${label}</div>${mark?`<div class="rw">${mark}</div>`:''}</div>`;
  }
  return `<div class="strip-label">Mission — fog of war</div><div class="round-strip">${nodes}</div>`;
}

function resetChoices(){
  if (session && session.phase === 'roll'){
    if (!confirm('Go back and clear this round’s upgrades? Your current roll will be discarded.')) return;
    session.phase = 'upgrade';
    session.rolls = null;
    session.baseRolls = null;
    session.baseModRoll = null;
    session.modRoll = null;
    session.scarRoll = null;
    session.aRolls = null;
    session.pModRoll = null;
    session.instinctRoll = null;
    session.paidRerolls = 0;
    session.freeLeft = 0;
    session.selectedRoll = null;
    session.ptsDelta = 0;
    session.scarEnergyLoss = 0;
  }
  cart = freshCart();
  ui.selectedDie = null;
  ui.selectedFace = null;
  ui.selectedModFace = null;
  render();
}

function selectDie(id){ ui.selectedDie=id; ui.selectedFace=null; render(); }
function pickFace(dieId, faceIndex){ ui.selectedDie=dieId; ui.selectedFace={dieId,faceIndex}; render(); }
function queueForge(){
  if (!ui.selectedFace || energyLeft() < CFG.forgeCost) return;
  cart.forges.push({ ...ui.selectedFace });
  render();
}
function undoForge(){ cart.forges.pop(); render(); }
function pickModFace(i){ ui.selectedModFace=i; render(); }
function queueModUp(){
  if (ui.selectedModFace==null || energyLeft() < CFG.modUpgradeCost) return;
  const pl = G.players[me];
  const preview = previewModDie(pl);
  if (!preview[ui.selectedModFace] || preview[ui.selectedModFace].level>=2) return;
  cart.modUps.push(ui.selectedModFace);
