<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#081018">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Space Tribes: Parasite</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#081018; --panel:#101c28; --panel2:#162636; --line:#2a4050;
  --text:#eef3f6; --dim:#8aa0ae; --energy:#f5c042; --danger:#ff5a4e;
  --good:#3ecf8e; --red:#e85a5a; --blue:#4da3ff; --green:#2db88a;
  --bio:#8dff6a; --ink:#071018; --die:#f4f1ea; --die-ink:#1a1a1a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif; min-height:100%; overscroll-behavior-y:contain;
  line-height:1.35; letter-spacing:0;}
body{background:
  radial-gradient(700px 420px at 50% -5%, #1a3a2a66, transparent),
  radial-gradient(600px 400px at 100% 40%, #3a152055, transparent),
  var(--bg);}
#app{max-width:520px;margin:0 auto;padding:10px 12px 108px;position:relative;min-height:100vh;z-index:1;}
h1,h2,h3{margin:0 0 6px;font-family:'Orbitron',sans-serif;letter-spacing:.03em;line-height:1.2;}
h3{font-size:15px;}
button{font-family:inherit;border:none;cursor:pointer;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#1a8a6e,#d4a82a);color:var(--ink);box-shadow:0 3px 12px #1a8a6e33;}
.btn:active{transform:scale(.98);}
.btn:disabled,.btn.disabled{background:#243444;color:#6a7a88;box-shadow:none;pointer-events:none;}
.btn.danger{background:linear-gradient(135deg,#e04840,#a83228);color:#fff;}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--dim);box-shadow:none;font-weight:600;}
.btn.reroll{background:linear-gradient(135deg,#2a6a9a,#f5c042);margin-top:10px;}
.small{font-size:13px;color:var(--dim);line-height:1.4;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}
.starfield i{position:absolute;width:2px;height:2px;border-radius:50%;background:#c8ffe8;opacity:.4;animation:tw 3s infinite;}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.6}}
.grid-scan{display:none;}

.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.char-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:16px 8px;
  text-align:center;color:inherit;}
.char-card:active{transform:scale(.96);}
.char-card .avatar{font-size:44px;display:block;}
.char-card .avatar-img,.avatar-img{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;
  border:2px solid var(--line);box-shadow:0 4px 14px #0008;}
.char-card .avatar-img{width:84px;height:84px;}
.me-chip .avatar-img{width:28px;height:28px;margin:0;border-width:1.5px;}
.rnode .avatar-img{width:24px;height:24px;margin:0 auto;border-width:1px;}
.wait-row .avatar-img,.reveal-row .avatar-img{width:28px;height:28px;margin:0;display:inline-block;vertical-align:middle;}
.award-row .avatar-img{width:20px;height:20px;display:inline-block;vertical-align:middle;margin:0 4px 0 0;border-width:1px;}
.parasite-art{display:inline-block;filter:drop-shadow(0 0 18px #8dff6a55);animation:pulse 2.8s infinite;line-height:0;}
.parasite-art img{display:block;border-radius:18px;width:100%;height:auto;max-width:160px;margin:0 auto;
  box-shadow:0 0 0 2px #8dff6a33, 0 8px 24px #0009;}
.char-card .cname{font-size:18px;font-weight:800;margin-top:4px;font-family:'Orbitron',sans-serif;}
.char-card .ctitle{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;position:sticky;top:0;
  background:linear-gradient(#081018f5,#081018e8);backdrop-filter:blur(8px);z-index:20;padding:6px 0;}
.me-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:99px;padding:6px 12px 6px 8px;font-weight:700;font-size:14px;color:inherit;}
.me-chip .em{font-size:18px;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:6px 11px;
  font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;}
.stat-chip.energy{color:var(--energy);border-color:#f5c04255;}
.stat-chip.pts{color:var(--energy);}
.round-strip{display:flex;gap:4px;margin:0 0 10px;overflow-x:auto;padding-bottom:2px;}
.rnode{flex:0 0 auto;width:42px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel);
  text-align:center;padding:3px 0 4px;position:relative;}
.rnode .rn{font-size:9px;color:var(--dim);font-weight:700;}
.rnode .re{font-size:15px;line-height:1.15;}
.rnode.now{border-color:var(--energy);box-shadow:0 0 10px #f5c04233;}
.rnode.done{opacity:.4;}
.rnode.late{background:#1a1810;}
.rnode .rw{position:absolute;top:-5px;right:-3px;font-size:10px;}

.turn-coach{border-radius:12px;padding:12px;margin-bottom:10px;border:1.5px solid var(--line);
  background:linear-gradient(135deg,#122030,#0e2818);}
.turn-coach.parasite{background:linear-gradient(135deg,#2a1218,#142018);border-color:#8dff6a44;}
.turn-coach .step{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--energy);margin-bottom:4px;}
.turn-coach .title{font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;line-height:1.15;}
.turn-coach .how{font-size:14px;color:var(--text);margin-top:6px;line-height:1.4;}
.turn-coach .how b{color:var(--energy);}

.role-banner{display:none;}

.dice-row{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap;}
.die-wrap{text-align:center;}
.die-wrap.selected .die{box-shadow:0 0 0 3px var(--energy), 0 6px 16px #0008;}
.die-wrap.can-pick{cursor:pointer;}
.die{width:68px;height:68px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  position:relative;margin:0 auto;background:var(--die);color:var(--die-ink);font-weight:800;
  font-family:'IBM Plex Mono',monospace;
  box-shadow:inset 0 2px 0 #fff8, inset 0 -6px 0 #0002, 0 6px 14px #0007;
  border:1px solid #0002;}
.die.red{background:linear-gradient(160deg,#fff,#ffd6db); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #c2334a33, 0 6px 14px #ff5a4e22;}
.die.blue{background:linear-gradient(160deg,#fff,#d6eaff); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #2a67b733, 0 6px 14px #4da3ff22;}
.die.green{background:linear-gradient(160deg,#fff,#d6ffe8); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #1e9e6a33, 0 6px 14px #2db88a22;}
.die.attack{background:linear-gradient(160deg,#3a2218,#1e100c);color:#ffd2b0;border:1px solid #ff8a5544;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die.mod{background:linear-gradient(160deg,#1a2e1c,#0e1a10);color:var(--bio);border:1px solid #8dff6a44;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die .num{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.die.attack .num,.die.mod .num{font-size:22px;}
.die .pips{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:72%;height:72%;gap:0;}
.die .pips i{border-radius:50%;background:#1c2430;place-self:center;width:26%;height:26%;box-shadow:inset 0 1px 1px #0004;}
.die.attack .pips i{background:#ffd2b0;}
.die.mod .pips i{background:var(--bio);}
.die .corner-num{position:absolute;top:4px;right:6px;font-size:11px;font-weight:800;opacity:.55;line-height:1;}
.die.rolling{animation:shake .5s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) translateY(-5px)}
  50%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
.die-label{font-size:11px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.die-label.red{color:var(--red);} .die-label.blue{color:var(--blue);} .die-label.green{color:var(--green);}
.die-sub{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;line-height:1.2;}
.reroll-flash{animation:flashy .45s;}
@keyframes flashy{0%{box-shadow:0 0 0 4px var(--energy)}100%{}}

.face-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.face-chip{width:36px;height:36px;border-radius:8px;border:1.5px solid #0003;background:var(--die);
  color:var(--die-ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;
  box-shadow:inset 0 -3px 0 #0002, 0 2px 6px #0004;}
.face-chip.hot{background:linear-gradient(160deg,#fff8e0,#f5c042);border-color:#c49020;}
.face-chip.blank{background:var(--panel2);color:var(--dim);border-color:var(--line);box-shadow:none;}
.face-chip.pct{background:#142818;color:var(--bio);border-color:#8dff6a55;}
.face-chip.flat{background:#2a2010;color:var(--energy);border-color:#f5c04255;}
.face-chip.picked{outline:2px solid var(--energy);outline-offset:2px;}
.face-chip.forged{box-shadow:0 0 0 2px var(--energy), inset 0 -3px 0 #0002;}

.shop-item{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--panel2);
  border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;}
.shop-item .si-name{font-weight:700;font-size:14px;}
.shop-item .si-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}
.buy-btn{background:var(--energy);color:var(--ink);font-weight:800;border-radius:9px;padding:8px 11px;font-size:13px;
  white-space:nowrap;min-width:56px;font-family:'IBM Plex Mono',monospace;}
.buy-btn:disabled{background:#243444;color:#6a7a88;}
.buy-btn.owned{background:transparent;border:1.5px solid var(--good);color:var(--good);}
.growth-grid{display:grid;gap:7px;margin:8px 0;}
.growth-opt{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:10px;text-align:left;
  color:inherit;width:100%;cursor:pointer;}
.growth-opt.contain{border-color:#3ecf8e55;}
.growth-opt.unleash{border-color:#ff5a4e66;}
.growth-opt.unleash.picked{border-color:var(--danger);}
.growth-opt.contain.picked{border-color:var(--good);}
.growth-opt .go-title{font-weight:700;font-size:13px;}
.growth-opt .go-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}

.parasite-stage{text-align:center;padding:4px 0 2px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.p-name{font-size:14px;font-weight:800;color:var(--bio);letter-spacing:.06em;font-family:'Orbitron',sans-serif;margin-top:6px;}
.p-tagline{font-size:12px;color:var(--dim);margin-top:2px;}
.p-base{font-size:13px;color:var(--dim);margin-top:6px;}
.p-base b{color:var(--text);font-size:15px;font-family:'IBM Plex Mono',monospace;}
.lane-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:8px 0 4px;}
.evo-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
.evo-tag{font-size:11px;background:#1a2a1055;border:1px solid #8dff6a44;color:var(--bio);
  padding:3px 9px;border-radius:99px;font-weight:700;}

.wait-row{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);}
.wait-row:last-child{border-bottom:none;}
.wait-row .em{font-size:20px;}
.wait-row .st{margin-left:auto;font-size:12px;font-weight:800;}
.st.in{color:var(--good);} .st.thinking{color:var(--dim);animation:tw 1.6s infinite;}

.vs-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:12px 0 6px;}
.vs-side{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px;}
.vs-side .lbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;}
.vs-side .val{font-size:28px;font-weight:800;font-family:'IBM Plex Mono',monospace;}
.vs-side.h .val{color:var(--blue);} .vs-side.p .val{color:var(--danger);}
.vs-x{font-weight:800;color:var(--dim);}
.result-banner{text-align:center;border-radius:12px;padding:14px;margin:10px 0;font-weight:800;font-size:16px;font-family:'Orbitron',sans-serif;}
.result-banner.h{background:#0e3a2455;border:1.5px solid var(--good);color:var(--good);}
.result-banner.p{background:#3a120855;border:1.5px solid var(--danger);color:var(--danger);}
.award-row{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px dashed var(--line);font-size:13px;}
.award-row:last-child{border-bottom:none;}
.award-row .who{font-weight:600;}
.badge{font-size:10px;font-weight:800;padding:2px 6px;border-radius:99px;margin-left:4px;vertical-align:middle;}
.badge.mvp{background:var(--energy);color:var(--ink);}
.badge.cat-red{background:#ff5a4e33;color:var(--red);border:1px solid var(--red);}
.badge.cat-blue{background:#4da3ff33;color:var(--blue);border:1px solid var(--blue);}
.badge.cat-green{background:#3ecf8e33;color:var(--green);border:1px solid var(--green);}
.secret{color:var(--energy);font-weight:800;letter-spacing:1px;}
.mod-flip{min-height:28px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;margin-top:4px;}
.mod-flip .blank{color:var(--dim);} .mod-flip .flat{color:var(--energy);} .mod-flip .pct{color:var(--bio);}

.reveal-row{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:12px;margin-bottom:8px;opacity:0;transform:translateY(12px);transition:all .5s;}
.reveal-row.show{opacity:1;transform:none;}
.reveal-row .place{font-size:20px;font-weight:800;width:32px;}
.reveal-row .em{font-size:26px;}
.reveal-row .pts-final{margin-left:auto;font-size:22px;font-weight:800;color:var(--energy);font-family:'IBM Plex Mono',monospace;}
.reveal-row.winner{border-color:var(--energy);box-shadow:0 0 18px #f5c04233;}
.confetti{position:fixed;top:-10px;font-size:18px;animation:fall linear forwards;z-index:99;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.3;}}

.fixed-cta{position:fixed;bottom:0;left:0;right:0;z-index:30;padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,#081018 38%);max-width:520px;margin:0 auto;}
.log-entry{border-left:3px solid var(--line);padding:7px 9px;margin-bottom:6px;font-size:12px;background:var(--panel2);border-radius:0 8px 8px 0;}
.log-entry b{color:var(--energy);}
.center{text-align:center;}
.mt0{margin-top:0;} .hidden{display:none !important;}
.spent-preview{font-size:13px;color:var(--energy);font-weight:700;text-align:center;margin:8px 0 2px;font-family:'IBM Plex Mono',monospace;}
a{color:var(--blue);}
code{background:#00000055;padding:2px 5px;border-radius:5px;font-size:12px;word-break:break-all;font-family:'IBM Plex Mono',monospace;}
.setup-step{margin-bottom:12px;}
.setup-step .n{display:inline-block;width:20px;height:20px;background:var(--energy);color:var(--ink);border-radius:50%;
  text-align:center;font-weight:800;font-size:12px;line-height:20px;margin-right:6px;}
.brand-hero{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:800;letter-spacing:.04em;}
.brand-hero span{color:var(--bio);}
.warn-box{background:#2a141855;border:1px solid #ff5a4e44;border-radius:10px;padding:10px;font-size:13px;color:#ffc4bc;margin-bottom:8px;line-height:1.4;}
.total-big{font-size:32px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1;margin:8px 0;}
.total-big.crew{color:var(--blue);} .total-big.par{color:var(--danger);}
.hint{font-size:13px;color:var(--dim);text-align:center;margin:6px 0;line-height:1.4;}
</style>
</head>
<body>
<div class="starfield" id="starfield"></div>
<div class="grid-scan"></div>
<div id="app"></div>

<script>
/* ============================================================
   SPACE TRIBES: PARASITE — Energy / Face Forge / Modifiers
   4-player async dice battle for Dave, Brian, Joel & Chris
   Schema v2 — start a new game; old saves are incompatible.
   ============================================================ */

const firebaseConfig = {
  apiKey: "AIzaSyDpR3PEAEskSCZ7fpvuEi6EBFMoB0UZ6Yw",
  authDomain: "space-tribes.firebaseapp.com",
  databaseURL: "https://space-tribes-default-rtdb.firebaseio.com",
  projectId: "space-tribes",
  storageBucket: "space-tribes.firebasestorage.app",
  messagingSenderId: "259546833788",
  appId: "1:259546833788:web:22ae17ff32c2c60269baf9"
};

const PLAYERS = {
  dave:  { name:'Dave',  img:'assets/crew-dave.png',  color:'#f0b429', title:'Captain'  },
  brian: { name:'Brian', img:'assets/crew-brian.png', color:'#4db8ff', title:'Gunner'   },
  joel:  { name:'Joel',  img:'assets/crew-joel.png',  color:'#3ecf8e', title:'Engineer' },
  chris: { name:'Chris', img:'assets/crew-chris.png', color:'#9aff6b', title:'Scout'    },
};
function crewImg(id, cls=''){
  const c = PLAYERS[id];
  return `<img class="avatar-img ${cls}" src="${c.img}" alt="${c.name}" width="72" height="72">`;
}
function parasiteArtHTML(size, stage){
  const s = Math.max(0, Math.min(4, stage|0));
  const img = s >= 3 ? 'assets/parasite-devourer.png' : 'assets/parasite-spore.png';
  const px = Math.round(size);
  return `<span class="parasite-art" aria-hidden="true"><img src="${img}" alt="The parasite" width="${px}" height="${px}" style="max-width:${px}px"></span>`;
}
const PIDS = ['dave','brian','joel','chris'];
const COLORS = ['red','blue','green'];
const COLOR_META = {
  red:   { name:'Weapons',  icon:'🔫' },
  blue:  { name:'Strength', icon:'💪' },
  green: { name:'Agility',  icon:'⚡' },
};
const TOTAL_ROUNDS = 8;
const SCHEMA = 3; // upgrade → roll → lock-in turns

const CFG = {
  startEnergy: 5,
  forgeCost: 1,
  addDieCost: 3,
  rerollCost: 1,
  freeRerollPerkCost: 5,
  faceCap: 0,                        // 0 = no cap — forge as high as Energy allows
  maxDicePerColor: 2,                // starter + one extra per Weapons/Strength/Agility
  maxParAttack: 4,
  maxParMods: 2,
  parasiteStipend: 3,                // Energy lever so the infected can reroll / clutch
  unleashGrowthBonus: 1,             // Energy bribe for picking Unleash growth
  tempAttackCost: 2,
  tempAttackMax: 2,
  pushModCost: 3,
  // Playtested with unlimited human forges + Energy rerolls:
  // hot attack faces (2–7), stipend 3, Unleash die-surge → ~60% crew overall, late ~45%
  parasiteBase: r => 18 + r,
  // If crew stomps by more than 5, parasite base adapts permanently (auto-balance)
  adaptMargin: 5,
  adaptGain: margin => Math.min(5, 2 + Math.floor((margin - 6) / 4)), // 6–9:+2, 10–13:+3, 14–17:+4, 18+:+5
  humanWinPts:  r => r >= 5 ? 12 : 8,
  mvpPts:       r => r >= 5 ? 5 : 3,
  catPts:       r => r >= 5 ? 3 : 2,
  parasiteWinPts: r => 8,
  underdogEnergy: 1,                       // last place(s) bank +1 Energy each round
  humanWinEn: 2, humanLossEn: 1, parWinEn: 2, parLossEn: 1, catEn: 1,
  roundStipend: 1,
};

const EVO_STAGES = [
  { min:0,  name:'THE SPORE',    size:108, stage:0, tag:'Nesting in the cortex' },
  { min:2,  name:'THE LARVA',    size:116, stage:1, tag:'Tunnels through memory' },
  { min:4,  name:'THE CRAWLER',  size:124, stage:2, tag:'Wraps the brain stem' },
  { min:6,  name:'THE RAVAGER',  size:132, stage:3, tag:'Owns the infected mind' },
  { min:8,  name:'THE DEVOURER', size:140, stage:4, tag:'Hive consciousness' },
];

const deep = o => JSON.parse(JSON.stringify(o));
const uid = (p) => p + '_' + Math.random().toString(36).slice(2,7);

function parasiteBaseNow(r, parasite){

function rollFace(faces){
  const i = Math.floor(Math.random()*faces.length);
  return { index:i, value:faces[i] };
}
function rollModFace(faces){
  const i = Math.floor(Math.random()*faces.length);
  return { index:i, face: deep(faces[i]) };
}
function faceAvg(faces){
  return faces.reduce((s,v)=>s+v,0)/faces.length;
}
function modFaceLabel(f){
  if (!f || f.type==='blank') return '—';
  if (f.type==='flat') return '+'+f.n;
  if (f.type==='pct') return '+'+f.n+'%';
  return '?';
}
function modFaceClass(f){
  if (!f || f.type==='blank') return 'blank';
  return f.type;
}
function expectedParThreat(p, r){
  const base = parasiteBaseNow(r, p);
  const atk = (p.attack||[]).reduce((s,d)=>s+faceAvg(d.faces),0);
  let flatExp=0, pctExp=0;
  (p.modifiers||[]).forEach(d=>{
    d.faces.forEach(f=>{
      if (f.type==='flat') flatExp += f.n / d.faces.length;
      if (f.type==='pct') pctExp += (atk * f.n / 100) / d.faces.length;
    });
  });
  return Math.round(base + atk + flatExp + pctExp);
}

function pipHTML(v){

function newGameData(){

/* ================= GROWTH HELPERS ================= */
function findDie(list, id){ return (list||[]).find(d=>d.id===id); }
function applyForge(die, faceIndex, amount=1){
  if (!die || faceIndex<0 || faceIndex>=die.faces.length) return false;
  const next = die.faces[faceIndex] + amount;
  if (CFG.faceCap && next > CFG.faceCap) return false;
  die.faces[faceIndex] = next;
  return true;
}
function countColor(dice, color){
  return (dice||[]).filter(d=>d.color===color).length;
}
function canAddColor(pl, color, pendingColor){
  const n = countColor(pl.dice, color) + (pendingColor===color ? 1 : 0);
  return n < CFG.maxDicePerColor;
}
function applyForcedGrowth(parasite, growth){
  if (!growth || !growth.kind) return false;
  if (growth.kind==='attack'){
    const d = findDie(parasite.attack, growth.dieId);
    return applyForge(d, growth.faceIndex, growth.amount || 2);
  }
  if (growth.kind==='modBlank'){
    const d = findDie(parasite.modifiers, growth.dieId);
    if (!d || growth.faceIndex==null) return false;
    const f = d.faces[growth.faceIndex];
    if (!f || f.type!=='blank') return false;
    d.faces[growth.faceIndex] = deep(growth.newFace);
    return true;
  }
  if (growth.kind==='modExpand'){
    const d = findDie(parasite.modifiers, growth.dieId);
    if (!d || d.faces.length >= 8) return false;
    const room = 8 - d.faces.length;
    if (room >= 1) d.faces.push({ type:'blank' });
    if (room >= 2) d.faces.push(deep(growth.newFace || { type:'pct', n:25 }));
    else if (room === 1) d.faces[d.faces.length-1] = deep(growth.newFace || { type:'pct', n:25 });
    return true;
  }
  if (growth.kind==='newMod'){
    if ((parasite.modifiers||[]).length >= CFG.maxParMods) return false;
    parasite.modifiers.push({
      id: uid('mod'),
      faces: [
        { type:'blank' }, { type:'blank' }, { type:'blank' },
        { type:'flat', n:5 }, { type:'pct', n:15 }, { type:'pct', n:25 },
      ],
    });
    return true;
  }
  if (growth.kind==='atkDie'){
    if ((parasite.attack||[]).length >= CFG.maxParAttack) return false;
    parasite.attack.push({ id: uid('atk'), faces: hotFaces() });
    return true;
  }
  if (growth.kind==='atkSurge'){
    // Unleash: +1 to every face on one attack die (parasite "larger dice")
    const d = findDie(parasite.attack, growth.dieId) || (parasite.attack||[])[0];
    if (!d) return false;
    d.faces = d.faces.map(v=>v+1);
    return true;
  }
  return false;
}
function winMutate(parasite){
  // Infection spreads: a blank becomes +10% — future infected inherit the fever
    for (const d of parasite.modifiers||[]){
    const bi = d.faces.findIndex(f=>f.type==='blank');
    if (bi>=0){
      d.faces[bi] = { type:'pct', n:10 };
      parasite.mutations = (parasite.mutations||0)+1;
      return { kind:'blankToPct', dieId:d.id, faceIndex:bi };
    }
  }
  const atks = parasite.attack||[];
  if (atks.length){
    const d = atks[Math.floor(Math.random()*atks.length)];
    d.faces = d.faces.map(v=>v+1);
    parasite.mutations = (parasite.mutations||0)+1;
    return { kind:'atkSurge', dieId:d.id, bumped:true };
  }
  parasite.mutations = (parasite.mutations||0)+1;
  return { kind:'mutationTick' };
}

function applyHumanForges(pl, forges){
  let n = 0;
  (forges||[]).forEach(f=>{
    const d = findDie(pl.dice, f.dieId);
    if (applyForge(d, f.faceIndex)) n++;
  });
  return n;
}

function previewHumanDice(pl, cartObj){
  const dice = deep(pl.dice);
  (cartObj.forges||[]).forEach(f=>{
    const d = findDie(dice, f.dieId);
    applyForge(d, f.faceIndex);
  });
  if (cartObj.addDie){
    dice.push({ id:'preview', color: cartObj.addDie, faces:stdFaces() });
  }
  return dice;
}

function actionLocked(a){ return a && a.phase === 'locked'; }
function enrichModRolls(mRolls, attackSum){
  let flatMods = 0, pctMods = 0;
  const modBreakdown = (mRolls||[]).map(m=>{
    const face = m.face || { type:'blank' };
    if (face.type==='blank') return { ...m, face, applied:0, label:'blank' };
    if (face.type==='flat'){ flatMods += face.n; return { ...m, face, applied:face.n, label:'+'+face.n }; }
    if (face.type==='pct'){
      const add = Math.floor(attackSum * face.n / 100);
      pctMods += add;
      return { ...m, face, applied:add, label:'+'+face.n+'% → +'+add };
    }
    return { ...m, face, applied:0, label:'?' };
  });
  return { flatMods, pctMods, modBreakdown };
}

/* ================= ROUND RESOLUTION ================= */
function resolveRound(g){
  const r = g.round;
  const actions = (g.rounds && g.rounds[r] && g.rounds[r].actions) || {};
  if (PIDS.some(p=>!actionLocked(actions[p]))) return g;
  if (g.rounds[r].result) return g;
  const parId = g.schedule[r-1];
  const humans = PIDS.filter(p=>p!==parId);
  const pAct = actions[parId];

  // --- humans: energy spends (dice already rolled by each player) ---
  humans.forEach(h=>{
    const a = actions[h], pl = g.players[h];
    let spent = 0;
    const forges = a.forges || [];
    spent += forges.length * CFG.forgeCost;
    applyHumanForges(pl, forges);
    if (a.addDie && canAddColor(pl, a.addDie, null)){
      spent += CFG.addDieCost;
      const fromRoll = (a.rolls||[]).find(d=>d.tempNew);
      const newId = fromRoll ? fromRoll.dieId : uid(a.addDie[0]);
      pl.dice.push({ id: newId, color: a.addDie, faces: stdFaces() });
    }
    const rerolls = Math.max(0, a.rerollBuys||0);
    spent += rerolls * CFG.rerollCost;
    if (a.buyFreeReroll && !pl.perks.freeReroll){
      spent += CFG.freeRerollPerkCost;
      pl.perks.freeReroll = true;
    }
    pl.energy = Math.max(0, (pl.energy||0) - spent);
  });

  // --- parasite: stipend, forced growth, optional spends ---
  {
    const pl = g.players[parId];
    pl.energy = (pl.energy||0) + CFG.parasiteStipend;
    let spent = 0;
    const growth = pAct.growth;
    if (growth){
      applyForcedGrowth(g.parasite, growth);
      g.parasite.mutations = (g.parasite.mutations||0) + 1;
      if (growth.unleash || growth.spicy) pl.energy += CFG.unleashGrowthBonus;
    }
    const rerolls = Math.max(0, pAct.rerollBuys||0);
    spent += rerolls * CFG.rerollCost;
    const temp = Math.max(0, Math.min(pAct.tempAttack||0, CFG.tempAttackMax));
    spent += temp * CFG.tempAttackCost;
    if (pAct.pushMod && pAct.pushMod.dieId!=null){
      const d = findDie(g.parasite.modifiers, pAct.pushMod.dieId);
      if (d){
        const bi = d.faces.findIndex(f=>f.type==='blank');
        if (bi>=0){
          d.faces[bi] = deep(pAct.pushMod.newFace || { type:'pct', n:25 });
          spent += CFG.pushModCost;
          g.parasite.mutations = (g.parasite.mutations||0) + 1;
        }
      }
    }
    pl.energy = Math.max(0, pl.energy - spent);
    pAct._tempAttack = temp;
  }

  // --- use each player's locked-in rolls ---
  const rolls = {}; let humanTotal = 0;
  humans.forEach(h=>{
    const dieRolls = deep(actions[h].rolls || []);
    rolls[h] = dieRolls;
    humanTotal += dieRolls.reduce((s,d)=>s+(d.v||0), 0);
  });

  const base = parasiteBaseNow(r, g.parasite);
  let aRolls = deep(pAct.aRolls || []);
  let mRolls = deep(pAct.mRolls || []);
  const attackSum = aRolls.reduce((s,d)=>s+(d.v||0), 0);
  const { flatMods, pctMods, modBreakdown } = enrichModRolls(mRolls, attackSum);
  const parTotal = base + attackSum + flatMods + pctMods;

  // --- outcome & awards ---
  const humansWin = humanTotal >= parTotal;
  const awards = {}; PIDS.forEach(p=>awards[p]={pts:0, energy:0, tags:[]});
  let mvp = null;
  let winMutation = null;
  let adaptGain = 0;
  if (humansWin){
    humans.forEach(h=>{ awards[h].pts += CFG.humanWinPts(r); awards[h].energy += CFG.humanWinEn; });
    mvp = humans.reduce((a,b)=>{
      const ta = rolls[a].reduce((s,d)=>s+d.v,0), tb = rolls[b].reduce((s,d)=>s+d.v,0);
      return tb>ta ? b : a;
    });
    awards[mvp].pts += CFG.mvpPts(r); awards[mvp].tags.push('mvp');
    awards[parId].energy += CFG.parLossEn;
    // Auto-balance: crew stomps feed the next infected base
    const margin = humanTotal - parTotal;
    if (margin > CFG.adaptMargin){
      adaptGain = CFG.adaptGain(margin);
      g.parasite.adaptBase = (g.parasite.adaptBase||0) + adaptGain;
    }
  } else {
    awards[parId].pts += CFG.parasiteWinPts(r);
    awards[parId].energy += CFG.parWinEn;
    humans.forEach(h=>{ awards[h].energy += CFG.humanLossEn; });
    winMutation = winMutate(g.parasite);
  }
  // category winners: highest single die per color among humans
  const cats = {};
  COLORS.forEach(c=>{
    const best = humans.map(h=>{
      const vals = rolls[h].filter(d=>d.color===c).map(d=>d.v);
      return { h, v: vals.length ? Math.max(...vals) : -1 };
    }).sort((a,b)=>b.v-a.v);
    if (best[0].v > best[1].v && best[0].v >= 0){
      cats[c] = best[0].h;
      awards[best[0].h].pts += CFG.catPts(r);
      awards[best[0].h].energy += CFG.catEn;
      awards[best[0].h].tags.push('cat-'+c);
    } else cats[c] = null;
  });
  // round stipend + underdog Energy (last place stays in the fight)
  const minPts = Math.min(...PIDS.map(p=>g.players[p].pts + awards[p].pts));
  PIDS.forEach(p=>{
    awards[p].energy += CFG.roundStipend;
    if ((g.players[p].pts + awards[p].pts) === minPts){
      awards[p].energy += CFG.underdogEnergy;
      awards[p].tags.push('underdog');
    }
    g.players[p].pts += awards[p].pts;
    g.players[p].energy += awards[p].energy;
  });

  g.rounds[r].result = {
    parId, base, attackSum, flatMods, pctMods,
    humanTotal, parTotal, humansWin, late: r>=5,
    rolls, aRolls, mRolls: modBreakdown, cats, mvp, awards,
    growth: pAct.growth || null,
    tempAttack: pAct._tempAttack||0,
    winMutation,
    adaptGain,
    adaptBaseAfter: g.parasite.adaptBase||0,
    parasiteAfter: deep(g.parasite),
    resolvedAt: Date.now(),
  };
  if (r >= TOTAL_ROUNDS) g.status = 'over';
  else g.round = r + 1;
  return g;
}

/* ================= FIREBASE ================= */
function configOK(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('PASTE'); }
function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  gameRef = db.ref('games/current');
  gameRef.on('value', snap=>{
    const v = snap.val();
    if (!v){ gameRef.set(newGameData()); return; }
    v.rounds = v.rounds || {};
    for (const k in v.rounds){ v.rounds[k].actions = v.rounds[k].actions || {}; }
    // old schema — force reset prompt via flag
    if ((v.schema||1) < SCHEMA){
      G = { ...newGameData(), status:'need_reset', legacy:true };
      render();
      return;
    }
    v.parasite = v.parasite || starterParasite();
    v.parasite.adaptBase = v.parasite.adaptBase || 0;
    PIDS.forEach(p=>{
      if (!v.players[p]) return;
      v.players[p].energy = v.players[p].energy ?? v.players[p].tokens ?? CFG.startEnergy;
      v.players[p].perks = v.players[p].perks || { freeReroll:false };
      if (!Array.isArray(v.players[p].dice)) v.players[p].dice = starterDice();
    });
    G = v;
    if (G.round !== cartRound){ cart = null; session = null; ui = { selectedDie:null, selectedFace:null, selectedModFace:null }; }
    maybeResolve();
    render();
  });
}
function maybeResolve(retry){
  if (!G || G.status!=='active') return;
  const rd = G.rounds[G.round];
  if (!rd || rd.result) return;
  if (PIDS.some(p=>!actionLocked(rd.actions&&rd.actions[p]))) return;
  gameRef.transaction(g=>{
    if (!g) return g;
    if ((g.schema||1) < SCHEMA) return g;
    g.rounds = g.rounds || {};
    if (!g.rounds[g.round] || g.rounds[g.round].result) return g;
    const acts = g.rounds[g.round].actions || {};
    if (PIDS.some(p=>!actionLocked(acts[p]))) return g;
    return resolveRound(g);
  }, (err)=>{
    if (err && !retry) setTimeout(()=>maybeResolve(true), 1500);
  });
}
function submitAction(action){
  const r = G.round;
  db.ref(`games/current/rounds/${r}/actions/${me}`).set(action);
}
function startNewGame(){
  if (confirm('Start a brand new game? The current one will be wiped for everyone.'))
    gameRef.set(newGameData());
}

/* ================= CART ================= */
function freshCart(isParasite){
  return isParasite
    ? { growth:null, tempAttack:0, pushMod:false }
    : { forges:[], addDie:null, buyFreeReroll:false };
}
function cartCost(isParasite){
  if (!cart) return 0;
  if (isParasite){
    let c = (cart.tempAttack||0) * CFG.tempAttackCost;
    if (cart.pushMod) c += CFG.pushModCost;
    if (session && session.paidRerolls) c += session.paidRerolls * CFG.rerollCost;
    return c;
  }
  let c = (cart.forges||[]).length * CFG.forgeCost;
  if (cart.addDie) c += CFG.addDieCost;
  if (cart.buyFreeReroll) c += CFG.freeRerollPerkCost;
  if (session && session.paidRerolls) c += session.paidRerolls * CFG.rerollCost;
  return c;
}
function myBudget(isParasite){ return (G.players[me].energy||0) + (isParasite?CFG.parasiteStipend:0); }
function forgedSetFromCart(){
  const s = new Set();
  (cart.forges||[]).forEach(f=>s.add(f.dieId+':'+f.faceIndex));
  return s;
}
function freeRerollThisRound(isParasite){
  const pl = G.players[me];
  return !!(pl.perks && pl.perks.freeReroll) || (!isParasite && cart && cart.buyFreeReroll);
}
function energyLeft(isParasite){ return myBudget(isParasite) - cartCost(isParasite); }
function canAffordReroll(isParasite){
  if (!session) return false;
  if ((session.freeLeft||0) > 0) return true;
  return energyLeft(isParasite) >= CFG.rerollCost;
}
function spendRerollCharge(isParasite){
  if (!session) return false;
  if ((session.freeLeft||0) > 0){ session.freeLeft--; return true; }
  if (energyLeft(isParasite) >= CFG.rerollCost){
    session.paidRerolls = (session.paidRerolls||0) + 1;
    return true;
  }
  return false;
}
function resetSessionForRound(r, isPar){
  if (!cart || cartRound!==r){ cart = freshCart(isPar); cartRound = r; }
  if (!session || session.round!==r){
    session = { round:r, phase:'upgrade', rolls:null, aRolls:null, mRolls:null, paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null };
    ui = { selectedDie:null, selectedFace:null, selectedModFace:null };
  }
}

function render(){
  if (animating) return;
  const app = $('#app');
  if (!configOK()){ app.innerHTML = setupScreen(); return; }
  if (!me){ app.innerHTML = charSelectScreen(); return; }
  if (!G){ app.innerHTML = `<div class="center" style="padding-top:40vh"><h2>Contacting the ship…</h2><div class="small">connecting to Firebase</div></div>`; return; }
  if (G.status==='need_reset'){
    app.innerHTML = `<div style="padding-top:12vh" class="center">
      <div class="brand-hero">Space Tribes: <span>Parasite</span></div>
      <div class="panel" style="margin-top:18px;text-align:left">
        <h3>Game update ready</h3>
        <p class="small">Turns are now Upgrade → Roll → Lock in. Start a fresh game so everyone is on the new rules.</p>
        <button class="btn" onclick="startNewGame()">🚀 Start new game</button>
      </div>
    </div>`;
    return;
  }

  const lastResolved = Object.keys(G.rounds).map(Number).filter(r=>G.rounds[r].result).sort((a,b)=>b-a)[0] || 0;
  if (lastResolved > lastSeen()){
    playReplay(lastResolved);
    return;
  }
  if (G.status==='over'){ app.innerHTML = finalScreen(); runFinalReveal(); return; }
  app.innerHTML = gameScreen();
}

function selectDie(id){

function pickFace(dieId, faceIndex){

function queueForge(){
  if (!ui.selectedFace) return;
  const next = { ...ui.selectedFace };
  cart.forges = cart.forges || [];
  // allow multiple forges on same face
  cart.forges.push(next);
  if (cartCost(false) > myBudget(false)){ cart.forges.pop(); return; }
  // bump preview selection value mentally — re-render handles preview
  render();
}
function undoForge(){
  if (cart.forges && cart.forges.length) cart.forges.pop();

}
function setAddDie(c){
  if (!canAddColor(G.players[me], c, null)) return;

  render();
}
function clearAddDie(){ cart.addDie = null; render(); }
function toggleFreeReroll(){

function beginHumanRoll(){

    const rolled = rollFace(d.faces);
    return { dieId:d.id, color:d.color, faces:deep(d.faces), index:rolled.index, v:rolled.value, first:rolled.value, rerolled:false, tempNew:!!d.tempNew };

  session.phase = 'roll';

  session.paidRerolls = 0;
  session.freeLeft = freeRerollThisRound(false) ? 1 : 0;

function pickHumanRoll(i){
  if (!session || session.phase!=='roll' || session.shake) return;
  session.selectedRoll = { type:'human', index:i };
  render();
}
function confirmRerollHuman(){
  if (!session || !session.selectedRoll || session.selectedRoll.type!=='human') return;
  rerollHumanDie(session.selectedRoll.index);
}
function rerollHumanDie(i){
  if (!session || session.phase!=='roll') return;
  if (!canAffordReroll(false)) return;
  const d = session.rolls[i];
  if (!d) return;
  if (!spendRerollCharge(false)) return;
  const again = rollFace(d.faces);
  d.first = d.v;
  d.v = again.value;
  d.index = again.index;
  d.rerolled = true;
  session.shake = false;
  session.selectedRoll = { type:'human', index:i };
  render();
}
function lockHumanRoll(){
  submitAction({
    role:'human',
    phase:'locked',
    forges: cart.forges||[],
    addDie: cart.addDie||null,
    rerollBuys: session.paidRerolls||0,
    buyFreeReroll: !!cart.buyFreeReroll,
    rolls: session.rolls,
    at: Date.now(),
  });
  session = { round:G.round, phase:'upgrade', rolls:null, aRolls:null, mRolls:null, paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null };
}

      key: `atk-${d.id}-${fi}`,

      disabled: false,

    };
  });

        key: `blank5-${d.id}`,

        desc: `Swingy. Hot attack rolls feast — and the next infected inherits it.`,
        tag:'unleash',
      },
    ];
  });

  const expandOpts = (p.modifiers||[]).filter(d=>d.faces.length < 8).map((d, di)=>({
    key: `exp-${d.id}`,
    growth: { kind:'modExpand', dieId:d.id, newFace:{ type:'pct', n:25 }, unleash:true },
    title: `UNLEASH · Expand mod ${di+1}  (+⚡${CFG.unleashGrowthBonus})`,
    desc: `Add a blank and a +25% face. Ceiling goes up; so does future pain.`,
    tag:'unleash',
  }));

  const specialOpts = [];
  (p.attack||[]).forEach((d, di)=>{
    specialOpts.push({
      key: `surge-${d.id}`,
      growth: { kind:'atkSurge', dieId:d.id, unleash:true },

      key: 'newmod',
      growth: { kind:'newMod', unleash:true },

      growth: { kind:'atkDie', unleash:true },

function pickGrowthIdx(idx){

function parTemp(delta){
  cart.tempAttack = Math.max(0, Math.min(CFG.tempAttackMax, cart.tempAttack+delta));

function previewParasiteDice(){
  const p = deep(G.parasite);
  if (cart.growth) applyForcedGrowth(p, cart.growth);
  if (cart.pushMod){
    const d = (p.modifiers||[]).find(x=>x.faces.some(f=>f.type==='blank'));
    if (d){
      const bi = d.faces.findIndex(f=>f.type==='blank');
      if (bi>=0) d.faces[bi] = { type:'pct', n:25 };
    }
  }
  const attack = deep(p.attack||[]);
  for (let i=0;i<(cart.tempAttack||0);i++) attack.push({ id:'temp'+i, faces:stdFaces(), temp:true });
  return { attack, modifiers: deep(p.modifiers||[]) };
}
function beginParasiteRoll(){
  if (!cart.growth) return;
  const { attack, modifiers } = previewParasiteDice();
  session.aRolls = attack.map(d=>{
    const rolled = rollFace(d.faces);
    return { dieId:d.id, faces:deep(d.faces), index:rolled.index, v:rolled.value, first:rolled.value, rerolled:false, temp:!!d.temp };
  });
  session.mRolls = modifiers.map(d=>{
    const rolled = rollModFace(d.faces);
    return { dieId:d.id, faces:deep(d.faces), index:rolled.index, face:rolled.face, first:deep(rolled.face), rerolled:false };
  });
  session.phase = 'roll';
  session.paidRerolls = 0;
  session.freeLeft = freeRerollThisRound(true) ? 1 : 0;
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if (session) session.shake = false; render(); }, 700);
}
function parasiteRollHTML(r){
  const cost = cartCost(true), budget = myBudget(true), left = budget - cost;
  const aRolls = session.aRolls || [];
  const mRolls = session.mRolls || [];
  const attackSum = aRolls.reduce((s,d)=>s+d.v,0);
  const { flatMods, pctMods, modBreakdown } = enrichModRolls(mRolls, attackSum);
  const base = parasiteBaseNow(r, G.parasite);
  const total = base + attackSum + flatMods + pctMods;
  const free = session.freeLeft||0;
  const sel = session.selectedRoll;
  const canReroll = canAffordReroll(true) && sel && (sel.type==='atk' || sel.type==='mod');
  const rerollLabel = free ? `Re-roll selected (free)` : `Re-roll selected ⚡${CFG.rerollCost}`;
  return `<div class="panel">
    <h3 class="mt0">Parasite roll</h3>
    <p class="hint">Tap a die to select it, then press Re-roll.${free?` You have <b style="color:var(--energy)">1 free</b>.`:''}</p>
    <div class="lane-label">Attack</div>
    <div class="dice-row">
      ${aRolls.map((d,i)=>{
        const picked = sel && sel.type==='atk' && sel.index===i;
        return `<div class="die-wrap can-pick ${picked?'selected':''}" onclick="pickParRoll('atk',${i})">
          ${dieHTML('attack', session.shake?null:d.v, session.shake?'rolling':'')}
          <div class="die-sub">${d.rerolled?`${d.first}→${d.v}`:''}${d.temp?' · temp':''}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="lane-label">Modifiers</div>
    <div class="dice-row">
      ${mRolls.map((d,i)=>{
        const picked = sel && sel.type==='mod' && sel.index===i;
        return `<div class="die-wrap can-pick ${picked?'selected':''}" onclick="pickParRoll('mod',${i})">
          ${dieHTML('mod', session.shake?'?':modFaceLabel(d.face), session.shake?'rolling':'')}
          <div class="die-sub ${modFaceClass(d.face)}">${modBreakdown[i]?modBreakdown[i].label:modFaceLabel(d.face)}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn reroll" onclick="confirmRerollPar()" ${canReroll?'':'disabled'}>${rerollLabel}</button>
    <div class="small center" style="margin-top:8px">base ${base} + atk ${attackSum} + flat ${flatMods} + % ${pctMods}</div>
    <div class="center total-big par">${total}</div>
    <div class="spent-preview">⚡${left} left · paid rerolls ${session.paidRerolls||0}${free?` · free ${free}`:''}</div>
  </div>
  <div class="fixed-cta"><button class="btn danger" onclick="lockParasiteRoll()">Lock in final roll</button></div>`;
}
function pickParRoll(type, i){
  if (!session || session.phase!=='roll' || session.shake) return;
  session.selectedRoll = { type, index:i };
  render();
}
function confirmRerollPar(){
  if (!session || !session.selectedRoll) return;
  if (session.selectedRoll.type==='atk') rerollParAtk(session.selectedRoll.index);
  else if (session.selectedRoll.type==='mod') rerollParMod(session.selectedRoll.index);
}
function rerollParAtk(i){
  if (!session || session.phase!=='roll') return;
  if (!canAffordReroll(true)) return;
  const d = session.aRolls[i]; if (!d) return;
  if (!spendRerollCharge(true)) return;
  const again = rollFace(d.faces);
  d.first = d.v; d.v = again.value; d.index = again.index; d.rerolled = true;
  session.selectedRoll = { type:'atk', index:i };
  render();
}
function rerollParMod(i){
  if (!session || session.phase!=='roll') return;
  if (!canAffordReroll(true)) return;
  const d = session.mRolls[i]; if (!d) return;
  if (!spendRerollCharge(true)) return;
  const again = rollModFace(d.faces);
  d.first = deep(d.face); d.face = again.face; d.index = again.index; d.rerolled = true;
  session.selectedRoll = { type:'mod', index:i };
  render();
}
function lockParasiteRoll(){
  if (!cart.growth) return;
  const push = cart.pushMod ? {
    dieId: (G.parasite.modifiers.find(d=>d.faces.some(f=>f.type==='blank'))||{}).id,
    newFace: { type:'pct', n:25 },
  } : null;
  const attackSum = (session.aRolls||[]).reduce((s,d)=>s+d.v,0);
  const { modBreakdown } = enrichModRolls(session.mRolls, attackSum);
  submitAction({
    role:'parasite',
    phase:'locked',
    growth: cart.growth,
    rerollBuys: session.paidRerolls||0,
    tempAttack: cart.tempAttack||0,
    pushMod: push,
    aRolls: session.aRolls,
    mRolls: modBreakdown,
    at: Date.now(),
  });
  session = { round:G.round, phase:'upgrade', rolls:null, aRolls:null, mRolls:null, paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null };
}

/* ---------- waiting ---------- */
function waitingHTML(r){
  const acts = (G.rounds[r]&&G.rounds[r].actions)||{};
  return `<div class="panel">
    <h3 class="mt0 center">Final roll locked in</h3>
    <p class="small center">Battle erupts when everyone locks their roll.</p>
    ${PIDS.map(p=>{
      const a = acts[p];
      let st = 'plotting…', cls = 'thinking';
      if (actionLocked(a)){ st = 'READY'; cls = 'in'; }
      return `<div class="wait-row">
        ${crewImg(p)} <b>${PLAYERS[p].name}</b>
        ${G.schedule[r-1]===p?'<span class="small" style="color:var(--bio)">infected</span>':''}
        <span class="st ${cls}">${st}</span>
      </div>`;
    }).join('')}
  </div>`;
}

/* ---------- history ---------- */
function historyHTML(){
  const done = Object.keys(G.rounds).map(Number).filter(r=>G.rounds[r].result).sort((a,b)=>b-a);
  if (!done.length) return '';
  return `<div class="panel">
    <h3 class="mt0">Battle log</h3>
    ${done.map(r=>{
      const res = G.rounds[r].result;
      return `<div class="log-entry">
        <b>R${r}</b> ${res.humansWin?'Crew won':'Parasite ('+PLAYERS[res.parId].name+') won'}
        — ${res.humanTotal} vs ${res.parTotal}
        ${res.mvp?` · MVP ${PLAYERS[res.mvp].name}`:''}
        <button class="buy-btn" style="float:right;padding:4px 10px;font-size:11px" onclick="playReplay(${r},true)">▶︎</button>
      </div>`;
    }).join('')}
  </div>`;
}

/* ---------- battle replay ---------- */
function playReplay(r, manual){
  const res = G.rounds[r] && G.rounds[r].result;
  if (!res){ return; }
  animating = true;
  const humans = PIDS.filter(p=>p!==res.parId);
  const evo = evoStage((res.parasiteAfter&&res.parasiteAfter.mutations)||0);
  const app = $('#app');
  app.innerHTML = `
    <div class="center" style="padding-top:12px">
      <h2 style="margin-bottom:2px;font-size:18px">Round ${r} — BATTLE ${res.late?'<span style="color:var(--energy)">CRITICAL</span>':''}</h2>
      <div class="small">${PLAYERS[res.parId].name} is infected — ${evo.name}</div>
    </div>
    ${humans.map(h=>`
      <div class="panel" style="padding:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          ${crewImg(h)} <b>${PLAYERS[h].name}</b>
          <span id="ht-${h}" style="margin-left:auto;font-weight:900;font-size:20px;color:var(--blue);font-family:'IBM Plex Mono',monospace"></span>
        </div>
        <div class="dice-row" style="margin:6px 0" id="hd-${h}">
          ${(res.rolls[h]||[]).map((d,i)=>`<div class="die-wrap">${dieHTML(d.color,null,'rolling')}<div class="die-sub" id="note-${h}-${i}"></div></div>`).join('')}
        </div>
      </div>`).join('')}
    <div class="panel center" style="border-color:#9aff6b44">
      ${brainParasiteSVG(Math.round(evo.size*0.85), evo.stage)}
      <div class="p-name">${evo.name}</div>
      <div class="p-tagline">${evo.tag}</div>
      <div class="lane-label">Attack</div>
      <div class="dice-row" style="margin:6px 0" id="pd-atk">
        ${(res.aRolls||[]).map(()=>`<div class="die-wrap">${dieHTML('attack',null,'rolling')}</div>`).join('')}
      </div>
      <div id="atkSum" class="small"></div>
      <div class="lane-label">Modifiers</div>
      <div class="dice-row" style="margin:6px 0" id="pd-mod">
        ${(res.mRolls||[]).map(()=>`<div class="die-wrap">${dieHTML('mod','?','rolling')}</div>`).join('')}
      </div>
      <div id="modFlips" class="mod-flip"></div>
      <div id="pt" style="font-weight:900;font-size:24px;color:var(--danger);font-family:'IBM Plex Mono',monospace;margin-top:8px"></div>
    </div>
    <div id="verdict"></div>
    <div class="fixed-cta"><button class="btn ghost" id="skipBtn" onclick="finishReplay(${r})">skip ⏭</button></div>`;
  window.scrollTo(0,0);

  const settleJobs = [];
  humans.forEach((h,hi)=>(res.rolls[h]||[]).forEach((d,ci)=>{
    const el = app.querySelectorAll(`#hd-${h} .die`)[ci];
    settleJobs.push({ el, delay: 500 + (hi*4+ci)*220, final:d.v, info:d, noteId:`note-${h}-${ci}`, human:true });
  }));
  (res.aRolls||[]).forEach((d,i)=>{
    const el = app.querySelectorAll('#pd-atk .die')[i];
    settleJobs.push({ el, delay: 500 + 14*220 + i*280, final:d.v, info:d, parasiteAtk:true });
  });
  const modStart = 500 + 14*220 + (res.aRolls||[]).length*280 + 400;
  (res.mRolls||[]).forEach((d,i)=>{
    const el = app.querySelectorAll('#pd-mod .die')[i];
    settleJobs.push({ el, delay: modStart + i*500, final: modFaceLabel(d.face), info:d, parasiteMod:true, modIndex:i });
  });

  const cycler = setInterval(()=>{
    settleJobs.forEach(j=>{
      if (!j.el || !j.el.classList.contains('rolling')) return;
      if (j.parasiteMod) j.el.innerHTML = `<span class="num">${['—','+2','+10%','+5'][Math.floor(Math.random()*4)]}</span>`;
      else j.el.innerHTML = pipHTML(1+Math.floor(Math.random()*6));
    });
  }, 90);
  window._replayTimers = [cycler];

  settleJobs.forEach(j=>{
    window._replayTimers.push(setTimeout(()=>{
      if (!j.el) return;
      j.el.classList.remove('rolling');
      if (j.parasiteMod){
        j.el.innerHTML = `<span class="num">${esc(j.final)}</span>`;
        const box = $('#modFlips');
        if (box){
          const cls = modFaceClass(j.info.face);
          box.innerHTML += `<div class="${cls}">${esc(j.info.label||j.final)}${j.info.rerolled?' ♻️':''}</div>`;
        }
      } else {
        j.el.innerHTML = typeof j.final==='number' ? pipHTML(j.final) : `<span class="num">${esc(j.final)}</span>`;
      }
      if (j.info && j.info.rerolled) j.el.classList.add('reroll-flash');
      if (j.noteId && j.info && j.info.rerolled){
        const ne = document.getElementById(j.noteId);
        if (ne) ne.textContent = `♻️${j.info.first}→${j.info.v}`;
      }
    }, j.delay));
  });

  const afterAtk = 500 + 14*220 + (res.aRolls||[]).length*280 + 200;
  window._replayTimers.push(setTimeout(()=>{
    const el = $('#atkSum');
    if (el) el.innerHTML = `Attack sum <b style="color:var(--text)">${res.attackSum}</b> · base <b>${res.base}</b>`;
  }, afterAtk));

  const totalDelay = modStart + (res.mRolls||[]).length*500 + 500;
  window._replayTimers.push(setTimeout(()=>{
    humans.forEach(h=> countUp($('#ht-'+h), (res.rolls[h]||[]).reduce((s,d)=>s+d.v,0)));
    countUp($('#pt'), res.parTotal, '');
  }, totalDelay));
  window._replayTimers.push(setTimeout(()=> showVerdict(r, res), totalDelay + 800));
}
function countUp(el, target, prefix=''){
  if (!el) return;
  const t0 = performance.now(), dur = 700;
  const tick = now=>{
    const k = Math.min(1,(now-t0)/dur);
    el.textContent = prefix + Math.round(target*(1-Math.pow(1-k,3)));
    if (k<1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}
function showVerdict(r, res){
  const v = $('#verdict'); if (!v) return;
  const badges = p => (res.awards[p].tags||[]).map(t=>{
    if (t==='mvp') return '<span class="badge mvp">MVP</span>';
    if (t==='underdog') return '<span class="badge" style="background:#3a2a1055;color:var(--energy)">underdog ⚡</span>';
    const c = t.replace('cat-','');
    return `<span class="badge cat-${c}">${COLOR_META[c].icon} ${COLOR_META[c].name}</span>`;
  }).join('');
  const mutNote = (()=>{
    const m = res.winMutation;
    if (!m) return '';
    if (m.kind==='blankToPct') return 'Infection spread: a blank mutated into +10%.';
    if (m.kind==='atkSurge') return 'The parasite’s attack faces surged upward.';
    if (m.kind==='blankToFlat') return 'A blank mutated into +1 base damage.';
    if (m.kind==='atkBump') return 'An attack face mutated upward.';
    return 'The parasite mutated.';
  })();
  const mut = mutNote ? `<div class="small center" style="color:var(--bio);margin-top:6px">${mutNote}</div>` : '';
  const adaptNote = res.adaptGain
    ? `<div class="small center" style="color:var(--danger);margin-top:6px">Crew stomped by ${res.humanTotal - res.parTotal}. Parasite base adapts <b>+${res.adaptGain}</b> (now +${res.adaptBaseAfter} total).</div>`
    : '';
  v.innerHTML = `
    <div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew</div><div class="val">${res.humanTotal}</div></div>
      <div class="vs-x">VS</div>
      <div class="vs-side p"><div class="lbl">Parasite</div><div class="val">${res.parTotal}</div></div>
    </div>
    <div class="small center">base ${res.base} + attack ${res.attackSum} + flat ${res.flatMods||0} + % ${res.pctMods||0}</div>
    <div class="result-banner ${res.humansWin?'h':'p'}">
      ${res.humansWin ? 'THE CREW HOLDS THE SHIP' : 'THE PARASITE FEASTS'}
    </div>
    ${mut}${adaptNote}
    <div class="panel">
      ${PIDS.map(p=>{
        const a = res.awards[p];
        const after = (G.players[p] && G.players[p].pts) || 0;
        return `<div class="award-row">
          <span class="who">${crewImg(p)} ${PLAYERS[p].name}${p===res.parId?' <span class="small" style="color:var(--bio)">infected</span>':''}${badges(p)}</span>
          <span>+${a.pts} pts → <b>${after}</b> · ⚡+${a.energy}</span>
        </div>`;
      }).join('')}
      <div class="small center" style="margin-top:8px">Scores are open — plan who you can’t afford to feed.</div>
    </div>`;
  const btn = $('#skipBtn');
  if (btn){ btn.textContent = 'Continue ➜'; btn.className = 'btn'; }
  if (v.scrollIntoView) v.scrollIntoView({behavior:'smooth'});
}
function finishReplay(r){
  (window._replayTimers||[]).forEach(t=>{clearTimeout(t);clearInterval(t);});
  markSeen(Math.max(lastSeen(), r));
  animating = false;
  render();
}

/* ---------- final reveal ---------- */
function finalScreen(){
  return `<div style="padding-top:5vh">
    <div class="center"><span style="font-size:60px">🏆</span></div>
    <h1 class="center brand-hero" style="font-size:22px">FINAL SCORES</h1>
    <p class="center small">8 rounds. 2 possessions each. Only one legend.</p>
    <div id="revealZone" style="margin-top:18px"></div>
    <div id="newGameZone" class="hidden" style="margin-top:20px">
      <button class="btn" onclick="startNewGame()">Play again</button>
    </div>
  </div>`;
}
function runFinalReveal(){
  const ranked = PIDS.map(p=>({p, pts:G.players[p].pts})).sort((a,b)=>a.pts-b.pts);
  const zone = $('#revealZone');
  if (!zone || zone.dataset.ran) return;
  zone.dataset.ran = '1';
  const medals = ['','🥉','🥈','🥇'];
  ranked.forEach((e,i)=>{
    setTimeout(()=>{
      const isWin = i===ranked.length-1;
      const row = document.createElement('div');
      row.className = 'reveal-row'+(isWin?' winner':'');
      row.innerHTML = `<span class="place">${medals[i]||'4th'}</span>
        ${crewImg(e.p)}
        <b>${PLAYERS[e.p].name}</b>${isWin?' <span class="badge mvp">CHAMPION</span>':''}
        <span class="pts-final">0</span>`;
      zone.prepend(row);
      requestAnimationFrame(()=>row.classList.add('show'));
      countUp(row.querySelector('.pts-final'), e.pts);
      if (isWin){ confettiBurst(); $('#newGameZone').classList.remove('hidden'); }
    }, 900*i + 400);
  });
}
function confettiBurst(){
  const glyphs = ['🎉','⭐','🛸','🎲','💥','🦠'];
  for (let i=0;i<40;i++){
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (2+Math.random()*2.5)+'s';
    s.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 6000);
  }
}

/* ================= BOOT ================= */
(function boot(){
  const sf = $('#starfield');
  for (let i=0;i<60;i++){
    const s = document.createElement('i');
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = Math.random()*3+'s';
    sf.appendChild(s);
  }
  window._showPts = true;
  if (configOK()) initFirebase();
  render();
})();
</script>
