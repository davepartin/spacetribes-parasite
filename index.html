<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#081018">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="stp-build" content="v4.1">
<title>Space Tribes: Parasite</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=IBM+Plex+Sans:wght@500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#081018; --panel:#101c28; --panel2:#162636; --line:#2a4050;
  --text:#eef3f6; --dim:#8aa0ae; --energy:#f5c042; --danger:#ff5a4e;
  --good:#3ecf8e; --red:#e85a5a; --blue:#4da3ff; --green:#2db88a;
  --bio:#8dff6a; --ink:#071018; --die:#f4f1ea; --die-ink:#1a1a1a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'IBM Plex Sans',sans-serif; min-height:100%; overscroll-behavior-y:contain;
  line-height:1.35; letter-spacing:0;}
body{background:
  radial-gradient(700px 420px at 50% -5%, #1a3a2a66, transparent),
  radial-gradient(600px 400px at 100% 40%, #3a152055, transparent),
  var(--bg);}
#app{max-width:520px;margin:0 auto;padding:10px 12px 150px;position:relative;min-height:100vh;z-index:1;}
h1,h2,h3{margin:0 0 6px;font-family:'Orbitron',sans-serif;letter-spacing:.03em;line-height:1.2;}
h3{font-size:15px;}
button{font-family:inherit;border:none;cursor:pointer;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#1a8a6e,#d4a82a);color:var(--ink);box-shadow:0 3px 12px #1a8a6e33;}
.btn:active{transform:scale(.98);}
.btn:disabled,.btn.disabled{background:#243444;color:#6a7a88;box-shadow:none;pointer-events:none;}
.btn.danger{background:linear-gradient(135deg,#e04840,#a83228);color:#fff;}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--dim);box-shadow:none;font-weight:600;}
.btn.reroll{background:linear-gradient(135deg,#2a6a9a,#f5c042);margin-top:10px;}
.small{font-size:13px;color:var(--dim);line-height:1.4;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.starfield{position:fixed;inset:0;pointer-events:none;z-index:0;}
.starfield i{position:absolute;width:2px;height:2px;border-radius:50%;background:#c8ffe8;opacity:.4;animation:tw 3s infinite;}
@keyframes tw{0%,100%{opacity:.12}50%{opacity:.6}}
.grid-scan{display:none;}

.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.char-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:16px 8px;
  text-align:center;color:inherit;}
.char-card:active{transform:scale(.96);}
.char-card .avatar{font-size:44px;display:block;}
.char-card .avatar-img,.avatar-img{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;
  border:2px solid var(--line);box-shadow:0 4px 14px #0008;}
.char-card .avatar-img{width:84px;height:84px;}
.me-chip .avatar-img{width:28px;height:28px;margin:0;border-width:1.5px;}
.rnode .avatar-img{width:24px;height:24px;margin:0 auto;border-width:1px;}
.wait-row .avatar-img,.reveal-row .avatar-img{width:28px;height:28px;margin:0;display:inline-block;vertical-align:middle;}
.award-row .avatar-img{width:20px;height:20px;display:inline-block;vertical-align:middle;margin:0 4px 0 0;border-width:1px;}
.parasite-art{display:inline-block;filter:drop-shadow(0 0 18px #8dff6a55);animation:pulse 2.8s infinite;line-height:0;}
.parasite-art img{display:block;border-radius:18px;width:100%;height:auto;max-width:160px;margin:0 auto;
  box-shadow:0 0 0 2px #8dff6a33, 0 8px 24px #0009;}
.char-card .cname{font-size:18px;font-weight:800;margin-top:4px;font-family:'Orbitron',sans-serif;}
.char-card .ctitle{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}

.chrome-sticky{position:sticky;top:0;z-index:22;background:linear-gradient(#081018fb,#081018f0);
  backdrop-filter:blur(10px);padding:6px 0 8px;margin:0 0 10px;border-bottom:1px solid #2a405066;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:0;padding:0;}
.standings-bar{border:1px solid var(--line);border-radius:12px;padding:8px 8px 6px;margin:6px 0 0;
  background:var(--panel);box-shadow:0 4px 14px #0005;}
.standings-bar .sb-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;}
.standings-bar .sb-row{display:flex;gap:4px;justify-content:space-between;}
.standings-bar .sb-chip{flex:1;min-width:0;text-align:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:5px 2px 4px;font-family:'IBM Plex Mono',monospace;}
.standings-bar .sb-chip.me{border-color:var(--energy);box-shadow:0 0 0 1px #f5c04233;}
.standings-bar .sb-chip.lead{border-color:#f5c04266;}
.standings-bar .sb-name{font-size:10px;font-weight:700;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.standings-bar .sb-pts{font-size:14px;font-weight:800;color:var(--energy);line-height:1.1;margin-top:1px;}
.standings-bar .sb-meta{font-size:9px;color:var(--dim);margin-top:3px;font-family:'IBM Plex Sans',sans-serif;}
.me-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
  border-radius:99px;padding:6px 12px 6px 8px;font-weight:700;font-size:14px;color:inherit;}
.me-chip .em{font-size:18px;}
.stat-chip{background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:6px 11px;
  font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;}
.stat-chip.energy{color:var(--energy);border-color:#f5c04255;}
.stat-chip.pts{color:var(--energy);}
.round-strip{display:flex;gap:4px;margin:0 0 10px;overflow-x:auto;padding-bottom:2px;}
.rnode{flex:0 0 auto;width:52px;border-radius:9px;border:1.5px solid var(--line);background:var(--panel);
  text-align:center;padding:4px 2px 5px;position:relative;}
.rnode .rn{font-size:9px;color:var(--dim);font-weight:700;}
.rnode .re{font-size:11px;line-height:1.2;font-weight:800;margin-top:2px;font-family:'IBM Plex Sans',sans-serif;}
.rnode.now{border-color:var(--energy);box-shadow:0 0 10px #f5c04233;}
.rnode.done{opacity:.4;}
.rnode.late{background:#1a1810;}
.rnode .rw{position:absolute;top:-5px;right:-3px;font-size:10px;}
.rnode .avatar-img{display:none;}
.strip-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin:0 0 4px;}

.turn-coach{border-radius:12px;padding:12px;margin-bottom:10px;border:1.5px solid var(--line);
  background:linear-gradient(135deg,#122030,#0e2818);}
.turn-coach.parasite{background:linear-gradient(135deg,#2a1218,#142018);border-color:#8dff6a44;}
.turn-coach .step{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--energy);margin-bottom:4px;}
.turn-coach .title{font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;line-height:1.15;}
.turn-coach .how{font-size:14px;color:var(--text);margin-top:6px;line-height:1.4;}
.turn-coach .how b{color:var(--energy);}

.role-banner{display:none;}

.dice-row{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap;}
.die-wrap{text-align:center;}
.die-wrap.selected .die{box-shadow:0 0 0 3px var(--energy), 0 6px 16px #0008;}
.die-wrap.can-pick{cursor:pointer;}
.die{width:68px;height:68px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  position:relative;margin:0 auto;background:var(--die);color:var(--die-ink);font-weight:800;
  font-family:'IBM Plex Mono',monospace;
  box-shadow:inset 0 2px 0 #fff8, inset 0 -6px 0 #0002, 0 6px 14px #0007;
  border:1px solid #0002;}
.die.red{background:linear-gradient(160deg,#fff,#ffd6db); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #c2334a33, 0 6px 14px #ff5a4e22;}
.die.blue{background:linear-gradient(160deg,#fff,#d6eaff); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #2a67b733, 0 6px 14px #4da3ff22;}
.die.green{background:linear-gradient(160deg,#fff,#d6ffe8); box-shadow:inset 0 2px 0 #fff9, inset 0 -6px 0 #1e9e6a33, 0 6px 14px #2db88a22;}
.die.attack{background:linear-gradient(160deg,#3a2218,#1e100c);color:#ffd2b0;border:1px solid #ff8a5544;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die.mod{background:linear-gradient(160deg,#1a2e1c,#0e1a10);color:var(--bio);border:1px solid #8dff6a44;
  box-shadow:inset 0 2px 0 #fff1, inset 0 -6px 0 #0006, 0 6px 14px #0008;}
.die .num{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.die.attack .num,.die.mod .num{font-size:22px;}
.die .pips{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:84%;height:84%;gap:0;}
.die .pips i{border-radius:50%;background:#1c2430;place-self:center;width:62%;height:62%;box-shadow:inset 0 1px 2px #0005;}
.die.attack .pips i{background:#ffd2b0;}
.die.mod .pips i{background:var(--bio);}
.die .face-num{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;z-index:2;
  color:var(--die-ink);background:var(--die);box-shadow:none;}
.die.attack .face-num{color:#ffd2b0;background:#1e100c;}
.die.mod .face-num{color:var(--bio);background:#0e1a10;}
.die .corner-num{display:none;}
.die.rolling{animation:shake .5s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg) translateY(-5px)}
  50%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
.die-label{font-size:11px;font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.04em;}
.die-label.red{color:var(--red);} .die-label.blue{color:var(--blue);} .die-label.green{color:var(--green);}
.die-sub{font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;line-height:1.2;}
.reroll-flash{animation:flashy .45s;}
@keyframes flashy{0%{box-shadow:0 0 0 4px var(--energy)}100%{}}

.face-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.face-chip{width:36px;height:36px;border-radius:8px;border:1.5px solid #0003;background:var(--die);
  color:var(--die-ink);font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;
  box-shadow:inset 0 -3px 0 #0002, 0 2px 6px #0004;}
.face-chip.hot{background:linear-gradient(160deg,#fff8e0,#f5c042);border-color:#c49020;}
.face-chip.blank{background:var(--panel2);color:var(--dim);border-color:var(--line);box-shadow:none;}
.face-chip.pct{background:#142818;color:var(--bio);border-color:#8dff6a55;}
.face-chip.flat{background:#2a2010;color:var(--energy);border-color:#f5c04255;}
.face-chip.picked{outline:2px solid var(--energy);outline-offset:2px;}
.face-chip.forged{box-shadow:0 0 0 2px var(--energy), inset 0 -3px 0 #0002;}

.shop-item{display:flex;flex-direction:column;align-items:stretch;gap:10px;background:var(--panel2);
  border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;}
.shop-item .si-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.shop-item .si-name{font-weight:700;font-size:14px;}
.shop-item .si-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}
.shop-item .si-cost{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  color:var(--energy);background:#f5c04218;border:1px solid #f5c04244;border-radius:8px;padding:5px 8px;}
.buy-btn{background:transparent;color:var(--text);font-weight:700;border-radius:10px;padding:10px 12px;font-size:13px;
  white-space:nowrap;border:1.5px solid var(--line);box-shadow:none;font-family:'IBM Plex Sans',sans-serif;}
.buy-btn:active{transform:scale(.98);}
.buy-btn.primary{background:linear-gradient(135deg,#1a6a58,#c49a28);color:var(--ink);border-color:transparent;font-weight:800;}
.buy-btn:disabled{background:#1a2834;color:#5a6a78;border-color:#2a4050;}
.buy-btn.owned{background:transparent;border:1.5px solid var(--good);color:var(--good);}
.cat-picks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.cat-pick{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border-radius:10px;
  border:1.5px solid var(--line);background:#0c1822;color:var(--text);font-weight:700;font-size:12px;cursor:pointer;}
.cat-pick .cp-name{letter-spacing:.02em;}
.cat-pick .cp-meta{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace;}
.cat-pick.red{border-color:#e85a5a55;color:#ffb0b0;}
.cat-pick.blue{border-color:#4da3ff55;color:#a8d4ff;}
.cat-pick.green{border-color:#2db88a55;color:#9aefc8;}
.cat-pick:disabled{opacity:.35;cursor:default;}
.cat-pick.picked{box-shadow:0 0 0 2px var(--energy);background:#1a2810;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper .buy-btn{min-width:40px;padding:8px 0;text-align:center;}
.stepper .step-val{min-width:28px;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:800;font-size:16px;}
.growth-grid{display:grid;gap:7px;margin:8px 0;}
.growth-opt{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:10px;text-align:left;
  color:inherit;width:100%;cursor:pointer;}
.growth-opt.contain{border-color:#3ecf8e55;}
.growth-opt.unleash{border-color:#ff5a4e66;}
.growth-opt.unleash.picked{border-color:var(--danger);}
.growth-opt.contain.picked{border-color:var(--good);}
.growth-opt .go-title{font-weight:700;font-size:13px;}
.growth-opt .go-desc{font-size:12px;color:var(--dim);margin-top:2px;line-height:1.35;}

.parasite-stage{text-align:center;padding:4px 0 2px;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.p-name{font-size:14px;font-weight:800;color:var(--bio);letter-spacing:.06em;font-family:'Orbitron',sans-serif;margin-top:6px;}
.p-tagline{font-size:12px;color:var(--dim);margin-top:2px;}
.p-base{font-size:13px;color:var(--dim);margin-top:6px;}
.p-base b{color:var(--text);font-size:15px;font-family:'IBM Plex Mono',monospace;}
.lane-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:8px 0 4px;}
.evo-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
.evo-tag{font-size:11px;background:#1a2a1055;border:1px solid #8dff6a44;color:var(--bio);
  padding:3px 9px;border-radius:99px;font-weight:700;}

.wait-row{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);}
.wait-row:last-child{border-bottom:none;}
.wait-row .em{font-size:20px;}
.wait-row .st{margin-left:auto;font-size:12px;font-weight:800;}
.st.in{color:var(--good);} .st.thinking{color:var(--dim);animation:tw 1.6s infinite;}

.vs-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:12px 0 6px;}
.vs-side{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px;}
.vs-side .lbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;}
.vs-side .val{font-size:28px;font-weight:800;font-family:'IBM Plex Mono',monospace;}
.vs-side.h .val{color:var(--blue);} .vs-side.p .val{color:var(--danger);}
.vs-x{font-weight:800;color:var(--dim);}
.result-banner{text-align:center;border-radius:12px;padding:14px;margin:10px 0;font-weight:800;font-size:16px;font-family:'Orbitron',sans-serif;}
.result-banner.h{background:#0e3a2455;border:1.5px solid var(--good);color:var(--good);}
.result-banner.p{background:#3a120855;border:1.5px solid var(--danger);color:var(--danger);}
.award-row{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px dashed var(--line);font-size:13px;}
.award-row:last-child{border-bottom:none;}
.award-row .who{font-weight:600;}
.badge{font-size:10px;font-weight:800;padding:2px 6px;border-radius:99px;margin-left:4px;vertical-align:middle;}
.badge.mvp{background:var(--energy);color:var(--ink);}
.badge.cat-red{background:#ff5a4e33;color:var(--red);border:1px solid var(--red);}
.badge.cat-blue{background:#4da3ff33;color:var(--blue);border:1px solid var(--blue);}
.badge.cat-green{background:#3ecf8e33;color:var(--green);border:1px solid var(--green);}
.secret{color:var(--energy);font-weight:800;letter-spacing:1px;}
.mod-flip{min-height:28px;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;margin-top:4px;}
.mod-flip .blank{color:var(--dim);} .mod-flip .flat{color:var(--energy);} .mod-flip .pct{color:var(--bio);}

.reveal-row{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:12px;margin-bottom:8px;opacity:0;transform:translateY(12px);transition:all .5s;}
.reveal-row.show{opacity:1;transform:none;}
.reveal-row .place{font-size:20px;font-weight:800;width:32px;}
.reveal-row .em{font-size:26px;}
.reveal-row .pts-final{margin-left:auto;font-size:22px;font-weight:800;color:var(--energy);font-family:'IBM Plex Mono',monospace;}
.reveal-row.winner{border-color:var(--energy);box-shadow:0 0 18px #f5c04233;}
.confetti{position:fixed;top:-10px;font-size:18px;animation:fall linear forwards;z-index:99;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.3;}}

.fixed-cta{position:fixed;bottom:calc(52px + env(safe-area-inset-bottom));left:0;right:0;z-index:30;padding:10px 12px 8px;
  background:linear-gradient(transparent,#081018 38%);max-width:520px;margin:0 auto;}
.bottom-dock{position:fixed;bottom:0;left:0;right:0;z-index:32;max-width:520px;margin:0 auto;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,#081018 55%);}
.dock-btn{width:auto;min-width:96px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;
  background:var(--panel);border:1.5px solid var(--line);color:var(--text);box-shadow:0 2px 10px #0006;}
.dock-btn:active{transform:scale(.97);}
.dock-btn.reset{border-color:#ff5a4e55;color:#ffb0a8;}
.dock-btn.help{border-color:#4da3ff55;color:#a8d4ff;}
.modal-back{position:fixed;inset:0;z-index:80;background:#041018cc;display:flex;align-items:flex-end;justify-content:center;
  padding:12px;backdrop-filter:blur(4px);}
.modal-sheet{width:100%;max-width:520px;max-height:min(78vh,640px);overflow:auto;background:var(--panel);
  border:1px solid var(--line);border-radius:16px 16px 12px 12px;padding:16px 14px 18px;
  box-shadow:0 -8px 40px #000a;}
.modal-sheet h2{margin:0 0 8px;font-size:18px;}
.modal-sheet h3{margin:14px 0 6px;font-size:13px;color:var(--energy);}
.modal-sheet p,.modal-sheet li{font-size:13px;line-height:1.45;color:var(--text);margin:0 0 6px;}
.modal-sheet ul{margin:0 0 8px;padding-left:18px;color:var(--dim);}
.modal-sheet li{color:var(--dim);}
.modal-close{margin-top:12px;}
.log-entry{border-left:3px solid var(--line);padding:7px 9px;margin-bottom:6px;font-size:12px;background:var(--panel2);border-radius:0 8px 8px 0;}
.log-entry b{color:var(--energy);}
.center{text-align:center;}
.mt0{margin-top:0;} .hidden{display:none !important;}

const CFG = {

const MOD_LEVELS = {

const SCAR_FACES = {

    { id:'drain',   label:'−2⚡',     desc:'Lose 2 Energy' },
    { id:'bleed',   label:'−10%',    desc:'−10% attack' },
    { id:'static',  label:'no mod',  desc:'Mod die ignored' },
    { id:'fumble',  label:'reroll↑', desc:'Reroll highest die' },
    { id:'penalty', label:'−5 pts',  desc:'Lose 5 points' },
    { id:'shatter', label:'−highest',desc:'Subtract strongest die value (die stays)' },
  ],
  2: [
    { id:'drain',   label:'−4⚡',      desc:'Lose 4 Energy' },
    { id:'bleed',   label:'−20%',     desc:'−20% attack' },
    { id:'static',  label:'no mod−1⚡',desc:'Mod ignored & −1⚡' },
    { id:'fumble',  label:'reroll↑↑', desc:'Reroll two highest' },
    { id:'penalty', label:'−10 pts',  desc:'Lose 10 points' },

// Instinct die — the fun parasite specialty die (always rolled)
const INSTINCT_FACES = [
  { id:'gnash',  label:'Gnash',  desc:'+8 flat' },
  { id:'fever',  label:'Fever',  desc:'+25% of parasite attack' },
  { id:'twin',   label:'Twin',   desc:'Double your lowest attack die' },
  { id:'echo',   label:'Echo',   desc:"Add your highest human die" },

  { id:'explode',label:'Boom',   desc:'Extra exploding attack die' },
];

const EVO_STAGES = [
  { min:0,  name:'THE SPORE',    size:108, stage:0, tag:'Nesting in the cortex' },
  { min:2,  name:'THE LARVA',    size:116, stage:1, tag:'Tunnels through memory' },
  { min:4,  name:'THE CRAWLER',  size:124, stage:2, tag:'Wraps the brain stem' },
  { min:6,  name:'THE RAVAGER',  size:132, stage:3, tag:'Owns the infected mind' },
  { min:10, name:'THE DEVOURER', size:140, stage:4, tag:'Exposed. Hungry. Free.' },
];
function evoStage(m){ let s=EVO_STAGES[0]; for(const e of EVO_STAGES) if(m>=e.min) s=e; return s; }

/* ================= UTIL ================= */
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const deep = o => JSON.parse(JSON.stringify(o));
const uid = (p) => p + '_' + Math.random().toString(36).slice(2,7);
function stdFaces(){ return [1,2,3,4,5,6]; }
function hotFaces(){ return [3,4,5,6,7,8]; } // middle-balance starter
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=randInt(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }

function starterDice(){
  return [
    { id:'w1', color:'red',   faces:stdFaces() },
    { id:'s1', color:'blue',  faces:stdFaces() },
    { id:'a1', color:'green', faces:stdFaces() },
  ];
}
function starterModDie(){
  // 2 energy, 2 pct, 2 base — all level 0
  return [
    { kind:'energy', level:0 }, { kind:'energy', level:0 },
    { kind:'pct', level:0 },    { kind:'pct', level:0 },
    { kind:'base', level:0 },   { kind:'base', level:0 },
  ];
}
function starterParasite(){
  return {
    mutations: 0,
    bossMeter: 0,
    fusionPct: CFG.startFusion,
    auraFlat: CFG.startAura,
    attack: [
      { id:'atk1', faces:hotFaces() },
      { id:'atk2', faces:hotFaces() },
    ],
    // shared mod die (3 faces) — grows via soft/heavy
    mod: {
      id:'pmod',
      faces: [
        { type:'flat', n:5 },
        { type:'flat', n:8 },
        { type:'pct', n:20 },
      ],
    },
    // Instinct faces can be upgraded (ids reference INSTINCT_FACES; blank can become better)
    instinct: INSTINCT_FACES.map(f => f.id),
  };
}

function roundKind(r){
  if (r === 1) return 'training';
  if (r >= 2 && r <= 9) return 'infection';
  if (r === 10) return 'boss';
  return 'over';
}
function hostIdForRound(g, r){
  if (roundKind(r) !== 'infection') return null;
  return g.schedule[r-2]; // schedule is 8 long for rounds 2-9
}
function bossHP(g){ return CFG.hpBase + CFG.hpPerMeter * ((g.parasite && g.parasite.bossMeter) || 0); }

function modFaceValue(face){
  return MOD_LEVELS[face.kind][Math.min(2, face.level|0)];
}
function modFaceLabel(face){
  if (!face) return '?';
  const v = modFaceValue(face);
  if (face.kind==='energy') return '+'+v+'⚡';
  if (face.kind==='pct') return '+'+v+'%';
  if (face.kind==='base') return 'B+'+v;
  return '?';
}
function modFaceClass(face){
  if (!face) return 'blank';
  if (face.kind==='energy') return 'energy-face';
  if (face.kind==='pct') return 'pct';
  if (face.kind==='base') return 'base-face';
  return 'blank';
}
function pModLabel(f){
  if (!f || f.type==='blank') return '—';
  if (f.type==='flat') return '+'+f.n;
  if (f.type==='pct') return '+'+f.n+'%';
  return '?';
}
function instinctLabel(id){
  const f = INSTINCT_FACES.find(x=>x.id===id);
  return f ? f.label : id;
}

/** Unbiased integer in [0, maxExclusive). Uses crypto when available (fair across all faces). */
function randInt(maxExclusive){
  const n = maxExclusive|0;
  if (n <= 0) return 0;
  const cryptoObj = (typeof crypto !== 'undefined' && crypto.getRandomValues) ? crypto : null;
  if (cryptoObj){
    // Rejection sampling — avoids Math.random modulo bias
    const maxUint = 0x100000000;
    const limit = maxUint - (maxUint % n);
    const buf = new Uint32Array(1);
    let x;
    do {
      cryptoObj.getRandomValues(buf);
      x = buf[0];
    } while (x >= limit);
    return x % n;
  }
  return Math.floor(Math.random() * n);
}

/** Pick one of the die's face slots uniformly (all 6 sides equal chance). */
function rollFace(faces){
  const list = faces || [];
  if (!list.length) return { index:0, value:0 };
  const i = randInt(list.length);
  return { index:i, value:list[i] };
}
function rollIndex(n){ return randInt(n); }

/** Exploding attack die — on max face, roll once more and add (classic dice fun). */
function rollExplodingAttack(faces){
  const first = rollFace(faces);
  const max = Math.max(...faces);
  let total = first.value;
  let bonus = null;
  if (first.value === max){
    const extra = rollFace(faces);
    total += extra.value;
    bonus = extra;
  }
  return { index:first.index, value:total, shown:first.value, exploded:!!bonus, bonus };
}

function faceAvg(faces){ return faces.reduce((s,v)=>s+v,0)/faces.length; }

function pipHTML(v){
  if (typeof v !== 'number' || v < 1) return `<span class="num">?</span>`;
  if (v > 6) return `<span class="num">${v}</span>`;
  const map = {1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
  let cells='';
  for (let i=0;i<9;i++) cells += `<i style="visibility:${map[v].includes(i)?'visible':'hidden'}"></i>`;
  return `<span class="pips">${cells}</span><span class="face-num">${v}</span>`;
}
function dieHTML(color, value, extraCls=''){
  let face;
  if (value==null) face = `<span class="num">?</span>`;
  else if (typeof value==='number') face = pipHTML(value);
  else face = `<span class="num">${esc(String(value))}</span>`;
  return `<div class="die ${color} ${extraCls}">${face}</div>`;
}
function facesStripHTML(faces, opts={}){
  const { dieId, selectable, picked, forgedSet } = opts;
  return `<div class="face-strip">${faces.map((v,i)=>{
    const hot = v >= 7;
    const forged = forgedSet && forgedSet.has(dieId+':'+i);
    const pick = picked && picked.dieId===dieId && picked.faceIndex===i;
    const onclick = selectable ? `onclick="pickFace('${dieId}',${i})"` : '';
    return `<button class="face-chip ${hot?'hot':''} ${forged?'forged':''} ${pick?'picked':''}" ${onclick}>${v}</button>`;
  }).join('')}</div>`;
}

/* ================= STATE ================= */
let db=null, gameRef=null;
let G=null;
let me = localStorage.getItem('stp_me') || null;
let cart = null;
let cartRound = 0;
let animating = false;
let ui = { selectedDie: null, selectedFace: null, selectedModFace: null, showHelp: false };
let session = null;

function newGameData(){
  const early = shuffle(PIDS);
  let late = shuffle(PIDS), guard=0;
  while (early[3]===late[0] && guard++<40) late = shuffle(PIDS);
  const players = {};
  PIDS.forEach(p=>{
    players[p] = {
      pts: 0,
      energy: 0, // stipend applied at round start via resolve/awards; first round gets stipend on resolve of "round 0" — give opening bank
      dice: starterDice(),
      modDie: starterModDie(),
      scarLv: 0,
      perks: { freeReroll:false },
    };
  });
  // opening energy = one stipend so R1 feels good
  PIDS.forEach(p=> players[p].energy = CFG.roundStipend);
  return {
    schema: SCHEMA,
    createdAt: Date.now(),
    status: 'active',
    round: 1,
    schedule: [...early, ...late], // 8 hosts for rounds 2-9
    players,
    parasite: starterParasite(),
    rounds: {},
    escaped: false,
  };
}

function findDie(list, id){ return (list||[]).find(d=>d.id===id); }
function applyForge(die, faceIndex, amount){
  if (!die || faceIndex<0 || faceIndex>=die.faces.length) return false;
  const next = die.faces[faceIndex] + amount;
  if (CFG.faceCap && next > CFG.faceCap) return false;
  die.faces[faceIndex] = next;
  return true;
}
function countColor(dice, color){ return (dice||[]).filter(d=>d.color===color).length; }
function canAddColor(pl, color, pendingColor){
  return countColor(pl.dice, color) + (pendingColor===color?1:0) < CFG.maxDicePerColor;
}
function actionLocked(a){ return a && a.phase === 'locked'; }

/* ================= GROWTH ================= */
function softGrowthOptions(p){
  const opts = [];
  opts.push({ key:'surge', lane:'soft', title:'Surge a die', desc:'+1 to every face on one parasite attack die. Boss Meter +1.' });
  opts.push({ key:'push_mod', lane:'soft', title:'Push the mod', desc:'Upgrade the weakest parasite mod face. Boss Meter +1.' });
  if ((p.fusionPct||0) < CFG.fusionCap - 1e-9){
    opts.push({ key:'fusion', lane:'soft', title:'Deepen fusion', desc:`Fusion ${Math.round(p.fusionPct*100)}% → ${Math.round(Math.min(CFG.fusionCap, p.fusionPct+CFG.fusionStep)*100)}% of your human attack. Boss Meter +1.` });
  }
  opts.push({ key:'aura', lane:'soft', title:'Harden aura', desc:`Permanent +${CFG.auraGain} to parasite portion. Boss Meter +1.` });
  return opts;
}
function heavyGrowthOptions(p){
  return [
    { key:'new_die', lane:'heavy', title:'Spawn attack die', desc:'Add a new exploding attack die (3–8). Gain a Scar. Boss Meter +3.' },
    { key:'ribcage', lane:'heavy', title:'Ribcage Burst', desc:'+2 to every face on ALL parasite attack dice. Gain a Scar. Boss Meter +3.' },
    { key:'full_fusion', lane:'heavy', title:'Full Fusion', desc:'This round only: add 100% of your human attack again. Gain a Scar. Boss Meter +3.' },
    { key:'instinct_up', lane:'heavy', title:'Awaken Instinct', desc:'Replace Instinct blank with Fever (+25%), or boost Gnash. Gain a Scar. Boss Meter +3.' },
  ];
}
function applySoftGrowth(parasite, key){
  parasite.bossMeter = (parasite.bossMeter||0) + CFG.softMeter;
  parasite.mutations = (parasite.mutations||0) + 1;
  if (key==='surge'){
    const d = (parasite.attack||[])[0];
    if (d) d.faces = d.faces.map(v=>v+1);
    return { key, lane:'soft' };
  }
  if (key==='push_mod'){
    const faces = parasite.mod.faces;
    const rank = f => {
      if (!f || f.type==='blank') return 0;
      if (f.type==='flat') return 1 + (f.n>=8?1:0);
      if (f.type==='pct') return 3 + (f.n>=25?1:0) + (f.n>=35?1:0);
      return 5;
    };
    let bi = 0;
    for (let i=1;i<faces.length;i++) if (rank(faces[i]) < rank(faces[bi])) bi = i;
    const r = rank(faces[bi]);
    const ladder = [
      { type:'flat', n:5 }, { type:'flat', n:8 },
      { type:'pct', n:15 }, { type:'pct', n:25 }, { type:'pct', n:35 },
    ];
    faces[bi] = deep(ladder[Math.min(r, ladder.length-1)]);
    return { key, lane:'soft' };
  }
  if (key==='fusion'){
    parasite.fusionPct = Math.min(CFG.fusionCap, (parasite.fusionPct||CFG.startFusion) + CFG.fusionStep);
    return { key, lane:'soft' };
  }
  if (key==='aura'){
    parasite.auraFlat = (parasite.auraFlat||0) + CFG.auraGain;
    return { key, lane:'soft' };
  }
  return null;
}
function applyHeavyGrowth(parasite, key, hostPl){
  parasite.bossMeter = (parasite.bossMeter||0) + CFG.heavyMeter;
  parasite.mutations = (parasite.mutations||0) + 1;
  if (hostPl && (hostPl.scarLv||0) < 2) hostPl.scarLv = (hostPl.scarLv||0) + 1;
  let fusionOverride = null;
  if (key==='new_die'){
    if ((parasite.attack||[]).length < CFG.maxParAttack){
      parasite.attack.push({ id: uid('atk'), faces: hotFaces() });
    }
  } else if (key==='ribcage'){
    (parasite.attack||[]).forEach(d=>{ d.faces = d.faces.map(v=>v+2); });
  } else if (key==='full_fusion'){
    fusionOverride = 1.0;
  } else if (key==='instinct_up'){
    const inst = parasite.instinct || INSTINCT_FACES.map(f=>f.id);
    const bi = inst.indexOf('blank');
    if (bi>=0) inst[bi] = 'fever';
    else {
      const gi = inst.indexOf('gnash');
      // mark empowered gnash by duplicating fever if needed
      if (gi>=0) inst[gi] = 'fever';
    }
    parasite.instinct = inst;
  }
  return { key, lane:'heavy', fusionOverride, scarLv: hostPl ? hostPl.scarLv : 0 };
}

/* ================= COMBAT HELPERS ================= */
function normalizeModRoll(modRoll){
  if (!modRoll || !modRoll.kind) return modRoll;
  if (modRoll.value == null){
    modRoll = { ...modRoll, value: modFaceValue(modRoll) };
  }
  return modRoll;
}

function computeHumanTotal(rolls, modRoll, scarRoll, scarLv){
  // rolls should already include scar combat effects (bleed / −highest / fumble).
  // modRoll null means scar blocked mod (no mod).
  modRoll = normalizeModRoll(modRoll);
  let attack = (rolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  let total = attack;
  let pendingEnergy = 0;
  let modAdd = 0;
  let modLabel = 'no mod';
  if (modRoll && modRoll.kind==='energy'){
    pendingEnergy = modRoll.value|0;
    modLabel = '+'+pendingEnergy+'⚡ next';
  } else if (modRoll && modRoll.kind==='pct'){
    modAdd = Math.floor(attack * (modRoll.value|0) / 100);
    total += modAdd;
    modLabel = '+'+modRoll.value+'% → +'+modAdd;
  } else if (modRoll && modRoll.kind==='base'){
    modAdd = modRoll.value|0;
    total += modAdd;
    modLabel = 'Base +'+modAdd;
  }
  let scarLabel = '';
  if (scarRoll && scarRoll.label) scarLabel = scarRoll.label;
  return { attack, total, pendingEnergy, modAdd, modLabel, scarLabel };
}

/** Build display math from clean base dice + current mod/scar (for the big blue total). */
function liveHumanBreakdown(){
  const base = session.baseRolls || session.rolls || [];
  const rawAttack = base.reduce((s,d)=>s+(d.v||0), 0);
  const scar = session.scarRoll;
  // Working rolls already have scar applied for resolve — use those for final total
  const br = computeHumanTotal(session.rolls||[], session.modRoll, scar, G.players[me].scarLv||0);
  return {
    rawAttack,
    attack: br.attack,
    modAdd: br.modAdd,
    modLabel: br.modLabel,
    pendingEnergy: br.pendingEnergy,
    scarLabel: br.scarLabel,
    total: br.total,
    ptsDelta: session.ptsDelta||0,
    energyLoss: session.scarEnergyLoss||0,
  };
}

function modStatusLine(pl){
  const m = (pl && pl.modDie) || [];
  const parts = m.map(f => modFaceLabel(f));
  return parts.length ? parts.join(' · ') : '—';
}

function diceRowMiniHTML(rolls){
  return `<div class="dice-row" style="margin:6px 0">${(rolls||[]).map(d=>
    `<div class="die-wrap">${dieHTML(d.color||'red', d.scarZeroed?0:d.v)}${d.scarNote?`<div class="die-sub">${esc(d.scarNote)}</div>`:''}</div>`
  ).join('')}</div>`;
}

function computeParasitePortion(parasite, aRolls, modRoll, instinctRoll, humanAttack, highestHumanDie, fusionOverride){
  let atk = (aRolls||[]).reduce((s,d)=>s+(d.v||0), 0);
  let flat = 0, pctAdd = 0;
  if (modRoll){
    if (modRoll.type==='flat') flat += modRoll.n;
    if (modRoll.type==='pct') pctAdd += Math.floor(atk * modRoll.n / 100);
  }
  const fusionPct = fusionOverride != null ? fusionOverride : (parasite.fusionPct||CFG.startFusion);
  const fusion = Math.floor(humanAttack * fusionPct);
  let instinctAdd = 0;
  let instinctNote = instinctRoll;
  if (instinctRoll === 'gnash') instinctAdd = 8;
  else if (instinctRoll === 'fever') instinctAdd = Math.floor(atk * 0.25);
  else if (instinctRoll === 'twin'){
    const vals = (aRolls||[]).map(d=>d.v||0);
    instinctAdd = vals.length ? Math.min(...vals) : 0;
  } else if (instinctRoll === 'echo'){
    instinctAdd = highestHumanDie || 0;
  } else if (instinctRoll === 'explode'){
    // already may include exploded die in aRolls via session — add one more hot die here if not present
    // resolve uses instinctExplodeV if provided on roll payload
  } else if (instinctRoll && typeof instinctRoll === 'object' && instinctRoll.id==='explode'){
    instinctAdd = instinctRoll.extra || 0;
    instinctNote = 'explode';
  }
  const aura = parasite.auraFlat || 0;
  const total = atk + flat + pctAdd + fusion + instinctAdd + aura;
  return { atk, flat, pctAdd, fusion, fusionPct, instinctAdd, aura, total, instinctNote };
}

function expectedParThreat(p){
  const atk = (p.attack||[]).reduce((s,d)=>s+faceAvg(d.faces),0);
  let flatExp=0, pctExp=0;
  (p.mod && p.mod.faces || []).forEach(f=>{
    const n = (p.mod.faces||[]).length || 1;
    if (f.type==='flat') flatExp += f.n / n;
    if (f.type==='pct') pctExp += (atk * f.n / 100) / n;
  });
  // instinct rough +4 EV, fusion uses ~20 human attack estimate
  const fusion = Math.floor(22 * (p.fusionPct||CFG.startFusion));
  return Math.round(atk + flatExp + pctExp + fusion + (p.auraFlat||0) + 5);
}

/* ================= ROUND RESOLUTION ================= */
function resolveRound(g){
  const r = g.round;
  const actions = (g.rounds && g.rounds[r] && g.rounds[r].actions) || {};
  if (PIDS.some(p=>!actionLocked(actions[p]))) return g;
  if (g.rounds[r].result) return g;

  const kind = roundKind(r);
  const hostId = hostIdForRound(g, r);

  // Apply human spends for everyone
  PIDS.forEach(pid=>{
    const a = actions[pid], pl = g.players[pid];
    let spent = 0;
    const forges = a.forges || [];
    spent += forges.length * CFG.forgeCost;
    forges.forEach(f=>{
      const d = findDie(pl.dice, f.dieId);
      applyForge(d, f.faceIndex, CFG.forgeBump);
    });
    // mod upgrades
    (a.modUps||[]).forEach(idx=>{
      const face = pl.modDie[idx];
      if (face && face.level < 2){
        face.level += 1;
        spent += CFG.modUpgradeCost;
      }
    });
    if (a.addDie && canAddColor(pl, a.addDie, null)){
      spent += CFG.addDieCost;
      const fromRoll = (a.rolls||[]).find(d=>d.tempNew);
      pl.dice.push({ id: fromRoll ? fromRoll.dieId : uid(a.addDie[0]), color: a.addDie, faces: stdFaces() });
    }
    spent += Math.max(0, a.rerollBuys||0) * CFG.rerollCost;
    // free-reroll perk purchase removed — everyone gets CFG.freeRerollsPerRound each round
    pl.energy = Math.max(0, (pl.energy||0) - spent);
  });

  // Host growth
  let growthResult = null;
  let fusionOverride = null;
  if (kind==='infection' && hostId){
    const a = actions[hostId];
    const growth = a.growth;
    if (growth && growth.key){
      if (growth.lane==='heavy'){
        growthResult = applyHeavyGrowth(g.parasite, growth.key, g.players[hostId]);
        fusionOverride = growthResult.fusionOverride;
      } else {
        growthResult = applySoftGrowth(g.parasite, growth.key);
      }
    }
  }

  const awards = {};
  PIDS.forEach(p=> awards[p]={pts:0, energy:0, tags:[], pendingEnergy:0});

  // --- TRAINING ---
  if (kind==='training'){
    const totals = {};
    const rolls = {};
    const breakdown = {};
    PIDS.forEach(pid=>{
      const a = actions[pid];
      rolls[pid] = deep(a.rolls||[]);
      const mod = a.modRoll || null;
      const scar = a.scarRoll || null;
      const br = computeHumanTotal(a.rolls, mod, scar, g.players[pid].scarLv);
      totals[pid] = br.total;
      breakdown[pid] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(mod), scarRoll: deep(scar),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      awards[pid].pendingEnergy = breakdown[pid].pendingEnergy;
      if (a.ptsDelta) awards[pid].pts += a.ptsDelta;
    });
    const order = PIDS.slice().sort((a,b)=> totals[b]-totals[a]);
    order.forEach((pid,i)=>{ awards[pid].pts += CFG.trainRankPts[i]; awards[pid].tags.push('train'); });
    // categories
    const cats = {};
    COLORS.forEach(c=>{
      const best = PIDS.map(h=>{
        const vals = (rolls[h]||[]).filter(d=>d.color===c).map(d=>d.v);
        return { h, v: vals.length ? Math.max(...vals) : -1 };
      }).sort((a,b)=>b.v-a.v);
      if (best[0].v > best[1].v && best[0].v >= 0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else cats[c] = null;
    });
    PIDS.forEach(p=>{
      awards[p].energy += CFG.roundStipend;
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += awards[p].energy + (awards[p].pendingEnergy||0);
    });
    g.rounds[r].result = {
      kind, rolls, totals, breakdown, cats, awards,
      growth: null, hostId: null,
      resolvedAt: Date.now(),
    };
  }

  // --- INFECTION ---
  else if (kind==='infection'){
    const humans = PIDS.filter(p=>p!==hostId);
    const rolls = {};
    const humanTotals = {};
    const breakdown = {};
    let crewTotal = 0;
    humans.forEach(h=>{
      const a = actions[h];
      rolls[h] = deep(a.rolls||[]);
      const br = computeHumanTotal(a.rolls, a.modRoll, a.scarRoll, g.players[h].scarLv);
      humanTotals[h] = { attack: br.attack, total: br.total };
      breakdown[h] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(a.modRoll||null), scarRoll: deep(a.scarRoll||null),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      crewTotal += br.total;
      awards[h].pendingEnergy = breakdown[h].pendingEnergy;
      if (a.ptsDelta) awards[h].pts += a.ptsDelta;
    });

    const hAct = actions[hostId];
    rolls[hostId] = deep(hAct.rolls||[]);
    const hostHuman = computeHumanTotal(hAct.rolls, hAct.modRoll, hAct.scarRoll, g.players[hostId].scarLv);
    breakdown[hostId] = {
      attack: hostHuman.attack, total: hostHuman.total, modAdd: hostHuman.modAdd, modLabel: hostHuman.modLabel,
      modRoll: deep(hAct.modRoll||null), scarRoll: deep(hAct.scarRoll||null),
      pendingEnergy: Math.max(0, hostHuman.pendingEnergy - (hAct.scarEnergyLoss||0)),
      ptsDelta: hAct.ptsDelta||0,
      aRolls: deep(hAct.aRolls||[]), pModRoll: deep(hAct.pModRoll||null),
      instinctRoll: hAct.instinctRoll, instinctExtra: hAct.instinctExtra||0,
    };
    awards[hostId].pendingEnergy = breakdown[hostId].pendingEnergy;
    if (hAct.ptsDelta) awards[hostId].pts += hAct.ptsDelta;

    const highestHumanDie = Math.max(0, ...(hAct.rolls||[]).map(d=>d.v||0));
    let instinctPayload = hAct.instinctRoll;
    if (instinctPayload === 'explode' || (instinctPayload && instinctPayload.id==='explode')){
      // use extra from action
      instinctPayload = { id:'explode', extra: (hAct.instinctExtra||0) };
    }
    const parPart = computeParasitePortion(
      g.parasite,
      hAct.aRolls || [],
      hAct.pModRoll || null,
      instinctPayload,
      hostHuman.attack,
      highestHumanDie,
      fusionOverride
    );
    // if explode was rolled in session with extra already in instinctExtra
    if (hAct.instinctRoll==='explode' && hAct.instinctExtra){
      parPart.instinctAdd = hAct.instinctExtra;
      parPart.total = parPart.atk + parPart.flat + parPart.pctAdd + parPart.fusion + parPart.instinctAdd + parPart.aura;
    }

    const hostTotal = hostHuman.total + parPart.total;
    const hostWins = hostTotal > crewTotal; // ties → crew

    let mvp = null;
    if (!hostWins){
      humans.forEach(h=>{
        awards[h].pts += CFG.humanWinPts(r);
        awards[h].energy += CFG.winEn;
      });
      mvp = humans.reduce((a,b)=> (humanTotals[b].total > humanTotals[a].total ? b : a));
      awards[mvp].pts += CFG.mvpPts(r);
      awards[mvp].tags.push('mvp');
    } else {
      awards[hostId].pts += CFG.hostWinPts(r);
      awards[hostId].energy += CFG.winEn;
      g.parasite.bossMeter = (g.parasite.bossMeter||0) + CFG.winMeter;
    }

    const cats = {};
    COLORS.forEach(c=>{
      const pool = humans; // categories among crew only
      const best = pool.map(h=>{
        const vals = (rolls[h]||[]).filter(d=>d.color===c).map(d=>d.v);
        return { h, v: vals.length ? Math.max(...vals) : -1 };
      }).sort((a,b)=>b.v-a.v);
      if (best.length>=2 && best[0].v > best[1].v && best[0].v >= 0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else if (best.length===1 && best[0].v>=0){
        cats[c] = best[0].h;
        awards[best[0].h].pts += CFG.catPts(r);
        awards[best[0].h].energy += CFG.catEn;
        awards[best[0].h].tags.push('cat-'+c);
      } else cats[c] = null;
    });

    PIDS.forEach(p=>{
      awards[p].energy += CFG.roundStipend;
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += awards[p].energy + (awards[p].pendingEnergy||0);
    });

    g.rounds[r].result = {
      kind, hostId, hostWins,
      crewTotal, hostTotal,
      hostHuman: hostHuman.total, hostAttack: hostHuman.attack,
      parPart, growth: growthResult,
      rolls, humanTotals, breakdown, cats, mvp, awards,
      aRolls: hAct.aRolls||[], pModRoll: hAct.pModRoll||null,
      instinctRoll: hAct.instinctRoll, instinctExtra: hAct.instinctExtra||0,
      bossMeter: g.parasite.bossMeter,
      parasiteAfter: deep(g.parasite),
      resolvedAt: Date.now(),
    };
  }

  // --- BOSS ---
  else if (kind==='boss'){
    const rolls = {};
    const totals = {};
    const breakdown = {};
    let crewTotal = 0;
    PIDS.forEach(pid=>{
      const a = actions[pid];
      rolls[pid] = deep(a.rolls||[]);
      const br = computeHumanTotal(a.rolls, a.modRoll, a.scarRoll, g.players[pid].scarLv);
      totals[pid] = br.total;
      breakdown[pid] = {
        attack: br.attack, total: br.total, modAdd: br.modAdd, modLabel: br.modLabel,
        modRoll: deep(a.modRoll||null), scarRoll: deep(a.scarRoll||null),
        pendingEnergy: Math.max(0, br.pendingEnergy - (a.scarEnergyLoss||0)),
        ptsDelta: a.ptsDelta||0,
      };
      crewTotal += br.total;
      awards[pid].pendingEnergy = breakdown[pid].pendingEnergy;
      if (a.ptsDelta) awards[pid].pts += a.ptsDelta;
    });
    const hp = bossHP(g);
    const cleared = crewTotal >= hp;
    g.escaped = !cleared;
    const order = PIDS.slice().sort((a,b)=> totals[b]-totals[a]);
    const bonus = cleared ? CFG.heroBonus : CFG.heroFailBonus;
    order.forEach((pid,i)=>{
      awards[pid].pts += bonus[i];
      awards[pid].tags.push(cleared ? 'hero' : 'escape');
    });
    if (cleared){
      awards[order[0]].pts += CFG.killBlowPts;
      awards[order[0]].tags.push('kill');
    }
    PIDS.forEach(p=>{
      // no next-round stipend
      g.players[p].pts = Math.max(0, g.players[p].pts + awards[p].pts);
      g.players[p].energy += (awards[p].pendingEnergy||0);
    });
    g.rounds[r].result = {
      kind, rolls, totals, breakdown, crewTotal, hp, cleared, escaped: !cleared,
      awards, hero: order[0], bossMeter: g.parasite.bossMeter,
      resolvedAt: Date.now(),
    };
  }

  if (r >= TOTAL_ROUNDS) g.status = 'over';
  else g.round = r + 1;
  return g;
}

/* ================= FIREBASE ================= */
const APP_BUILD = 'v4.1.7';
let connectTimer = null;
let restPollTimer = null;
let usingRest = false;
let fbReady = false;

function configOK(){ return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('PASTE'); }
function dbRoot(){ return String(firebaseConfig.databaseURL||'').replace(/\/$/,''); }

function normalizeGame(v){
  if (!v || typeof v !== 'object') return v;
  const g = v;
  if (!g.rounds) g.rounds = {};
  if (!g.players) g.players = {};
  if (!g.parasite) g.parasite = starterParasite();
  PIDS.forEach(pid=>{
    const pl = g.players[pid];
    if (!pl) return;
    if (!pl.dice) pl.dice = starterDice();
    if (!pl.modDie) pl.modDie = starterModDie();
    if (!pl.perks) pl.perks = { freeReroll:false };
    if (pl.scarLv == null) pl.scarLv = 0;
    if (pl.energy == null) pl.energy = CFG.roundStipend;
    if (pl.pts == null) pl.pts = 0;
  });
  if (g.parasite && g.parasite.bossMeter == null) g.parasite.bossMeter = 0;
  return g;
}

function applyRemoteGame(v){
  try{
    if (!v){ startNewGame(); return; }
    if ((v.schema||1) < SCHEMA){
      G = normalizeGame({ ...v, status:'need_reset' });
      render();
      return;
    }
    G = normalizeGame(v);
    fbReady = true;
    if (connectTimer){ clearTimeout(connectTimer); connectTimer=null; }
    maybeResolve();
    render();
  }catch(err){
    console.error(err);
    showConnectError(err && err.message ? err.message : String(err));
  }
}

function showConnectError(msg){
  const app = $('#app');
  if (!app) return;
  app.innerHTML = `<div class="panel center">
    <h2>Can't reach the ship</h2>
    <p class="small">${esc(msg||'Connection stalled.')}</p>
    <p class="small">Build ${APP_BUILD}. Check signal, then retry.</p>
    <button class="btn" onclick="retryConnect()">Retry connection</button>
    <button class="btn ghost" style="margin-top:8px" onclick="startNewGame()">Force new game</button>
  </div>${bottomDockHTML()}`;
}

function restGetGame(){
  return fetch(dbRoot()+'/games/current.json', { cache:'no-store' })
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); });
}
function restPut(path, data){
  return fetch(dbRoot()+'/'+path+'.json', {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data), cache:'no-store'
  }).then(r=>{ if(!r.ok) throw new Error('Write failed HTTP '+r.status); return r.json(); });
}

function startRestPolling(){
  if (restPollTimer) return;
  usingRest = true;
  const tick = ()=> restGetGame().then(applyRemoteGame).catch(err=> console.warn('rest poll', err));
  tick();
  restPollTimer = setInterval(tick, 2000);
}

function initFirebase(){
  connectTimer = setTimeout(()=>{
    if (fbReady || G) return;
    // Mobile WebSocket stall → REST fallback
    console.warn('Firebase SDK slow; switching to REST');
    startRestPolling();
  }, 2500);

  try{
    if (!window.firebase){
      showConnectError('Firebase failed to load. Hard-refresh the page.');
      startRestPolling();
      return;
    }
    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    gameRef = db.ref('games/current');
    gameRef.on('value', snap=> applyRemoteGame(snap.val()), err=>{
      console.error(err);
      showConnectError(err.message||'Database permission/network error');
      startRestPolling();
    });
    // connected probe
    db.ref('.info/connected').on('value', s=>{
      if (s.val() === true) fbReady = true;
    });
  }catch(err){
    console.error(err);
    showConnectError(err.message||String(err));
    startRestPolling();
  }
}

function retryConnect(){
  G = null; fbReady = false;
  if (restPollTimer){ clearInterval(restPollTimer); restPollTimer=null; }
  usingRest = false;
  render();
  initFirebase();
}

function maybeResolve(retry){
  if (!G || G.status!=='active' || animating) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (!G.rounds) G.rounds = {};
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  if (PIDS.some(p=>!actionLocked(actions[p]))) return;
  if (G.rounds[r] && G.rounds[r].result) return;

  if (usingRest || !gameRef){
    // REST read-modify-write
    restGetGame().then(cur=>{
      cur = normalizeGame(cur || G);
      if (!cur || cur.status!=='active') return;
      if ((cur.schema||1) < SCHEMA) return;
      const rr = cur.round;
      const acts = (cur.rounds[rr] && cur.rounds[rr].actions) || {};
      if (PIDS.some(p=>!actionLocked(acts[p]))) return;
      if (cur.rounds[rr] && cur.rounds[rr].result) return;
      const next = resolveRound(cur);
      return restPut('games/current', next).then(()=>applyRemoteGame(next));
    }).catch(err=> console.warn('resolve rest', err));
    return;
  }

  gameRef.transaction(g=>{
    if (!g || g.status!=='active') return;
    if ((g.schema||1) < SCHEMA) return g;
    g = normalizeGame(g);
    return resolveRound(g);
  }).then(res=>{
    if (!res.committed && !retry) setTimeout(()=>maybeResolve(true), 400);
  }).catch(err=>{
    console.warn('transaction failed, REST fallback', err);
    usingRest = true;
    maybeResolve(true);
  });
}
function submitAction(action){
  if (!me || !G) return;
  const r = G.round;
  if (!G.rounds) G.rounds = {};
  if (usingRest || !gameRef){
    // optimistic local + REST put
    if (!G.rounds[r]) G.rounds[r] = { actions:{} };
    if (!G.rounds[r].actions) G.rounds[r].actions = {};
    G.rounds[r].actions[me] = action;
    render();
    restPut('games/current/rounds/'+r+'/actions/'+me, action)
      .then(()=> restGetGame().then(applyRemoteGame))
      .catch(err=> showConnectError(err.message||'Could not save your turn'));
    return;
  }
  gameRef.child('rounds/'+r+'/actions/'+me).set(action).catch(err=>{
    console.warn(err);
    usingRest = true;
    submitAction(action);
  });
}
function startNewGame(){
  const data = normalizeGame(newGameData());
  session = null; cart = null;
  try{ localStorage.removeItem('stp_seen_'+(G && G.createdAt)); }catch(e){}
  G = data;
  render();
  const save = ()=> {
    if (gameRef && !usingRest){
      return gameRef.set(data).catch(()=> restPut('games/current', data));
    }
    return restPut('games/current', data);
  };
  save().then(()=> applyRemoteGame(data)).catch(err=> showConnectError(err.message||'Could not create game'));
}
function confirmResetGame(){
  if (confirm('Start a fresh Schema v4 game? This wipes the current run.')) startNewGame();
}

/* ================= CART / SESSION ================= */
function freshCart(isHost){
  return {
    forges: [], modUps: [], addDie: null, buyFreeReroll: false,
    growth: null, // host only {key, lane}
  };
}
function cartCost(){
  let c = 0;
  c += (cart.forges||[]).length * CFG.forgeCost;
  c += (cart.modUps||[]).length * CFG.modUpgradeCost;
  if (cart.addDie) c += CFG.addDieCost;
  return c;
}
function myBudget(){ return (G.players[me].energy||0); }
function energyLeft(){ return myBudget() - cartCost() - ((session && session.paidRerolls)||0)*CFG.rerollCost; }
function forgedSetFromCart(){
  const s = new Set();
  (cart.forges||[]).forEach(f=> s.add(f.dieId+':'+f.faceIndex));
  return s;
}
function freeRerollThisRound(){
  return CFG.freeRerollsPerRound || 1;
}
function canAffordReroll(){
  if (session.freeLeft > 0) return true;
  return energyLeft() >= CFG.rerollCost;
}
function spendRerollCharge(){
  if (session.freeLeft > 0){ session.freeLeft--; return true; }
  if (energyLeft() >= CFG.rerollCost){ session.paidRerolls++; return true; }
  return false;
}
function resetSessionForRound(r){
  if (!session || session.round !== r){
    session = { round:r, phase:'upgrade', rolls:null, modRoll:null, scarRoll:null,
      aRolls:null, pModRoll:null, instinctRoll:null, instinctExtra:0,
      paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null, ptsDelta:0 };
  }
  if (cartRound !== r || !cart){ cart = freshCart(); cartRound = r; }
}
function seenKey(){ return `stp_seen_${G.createdAt}`; }
function lastSeen(){ return parseInt(localStorage.getItem(seenKey())||'0',10); }
function markSeen(r){ localStorage.setItem(seenKey(), String(r)); }

function previewHumanDice(pl){
  const dice = deep(pl.dice);
  (cart.forges||[]).forEach(f=>{
    const d = findDie(dice, f.dieId);
    applyForge(d, f.faceIndex, CFG.forgeBump);
  });
  if (cart.addDie) dice.push({ id:'preview', color: cart.addDie, faces:stdFaces() });
  return dice;
}
function previewModDie(pl){
  const m = deep(pl.modDie);
  (cart.modUps||[]).forEach(idx=>{ if (m[idx] && m[idx].level<2) m[idx].level++; });
  return m;
}

/* ================= RENDER SHELL ================= */
function render(){
  const app = $('#app');
  try{
  if (!configOK()){ app.innerHTML = setupScreen(); return; }
  if (!G){ app.innerHTML = `<div class="panel center"><h2 class="brand-hero" style="font-size:18px">SPACE TRIBES</h2><p>Connecting…</p><p class="small">Build ${APP_BUILD}. If this hangs, wait 3s for backup link.</p><button class="btn ghost" onclick="retryConnect()">Retry now</button></div>`; return; }
  if (G.status==='need_reset'){
    app.innerHTML = `<div class="panel center">
      <h2>Schema v4</h2>
      <p class="small">Turns are Training → Infection → Boss. Host = you + the monster. Start a fresh game.</p>
      <button class="btn" onclick="startNewGame()">Start v4 game</button>
    </div>${bottomDockHTML()}`;
    return;
  }
  if (!me){ app.innerHTML = charSelectScreen(); return; }
  if (G.status==='over'){
    // show final if R10 resolved
    const res = G.rounds[10] && G.rounds[10].result;
    if (res && lastSeen() < 10){
      app.innerHTML = chromeHTML() + verdictHTML(10) + bottomDockHTML() + instructionsModalHTML();
      return;
    }
    app.innerHTML = chromeHTML() + finalScreen() + bottomDockHTML();
    setTimeout(runFinalReveal, 50);
    return;
  }
  // auto-show last result if unseen
  const prev = G.round - 1;
  if (prev >= 1 && G.rounds[prev] && G.rounds[prev].result && lastSeen() < prev && !animating){
    app.innerHTML = chromeHTML() + verdictHTML(prev) + bottomDockHTML() + instructionsModalHTML();
    return;
  }
  app.innerHTML = gameScreen() + instructionsModalHTML();
  }catch(err){
    console.error(err);
    showConnectError('Render error: '+(err && err.message ? err.message : String(err)));
  }
}

/* ================= ROLL ================= */
function beginRoll(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  if (isHost && !(cart.growth && cart.growth.key)) return;

  const preview = previewHumanDice(G.players[me]);
  const modPrev = previewModDie(G.players[me]);
  // human rolls
  const rolls = preview.map(d=>{
    const rf = rollFace(d.faces);
    return { dieId:d.id, color:d.color, faces:d.faces, index:rf.index, v:rf.value, first:rf.value, rerolled:false, tempNew:d.id==='preview' };
  });
  if (cart.addDie){
    const last = rolls[rolls.length-1];
    if (last && last.tempNew) last.dieId = uid(cart.addDie[0]);
  }
  // mod roll
  const mi = rollIndex(modPrev.length);
  let modRoll = { index:mi, kind:modPrev[mi].kind, level:modPrev[mi].level, value:modFaceValue(modPrev[mi]) };

  // scar
  let scarRoll = null;
  let ptsDelta = 0;
  const scarLv = G.players[me].scarLv||0;
  if (scarLv > 0){
    const faces = SCAR_FACES[scarLv];
    const si = rollIndex(faces.length);
    scarRoll = { index:si, id:faces[si].id, label:faces[si].label, level:scarLv };
  }

  // Keep a clean pre-scar snapshot so scar rerolls never stack pain
  session.baseRolls = deep(rolls);
  session.baseModRoll = deep(modRoll);
  session.rolls = deep(rolls);
  session.modRoll = deep(modRoll);
  session.scarRoll = scarRoll;
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  reapplyScarFromBase();

  // host parasite rolls
  if (isHost){
    let atkDice = deep(G.parasite.attack);
    // preview growth locally for the roll
    const fake = deep(G.parasite);
    if (cart.growth.lane==='soft') applySoftGrowth(fake, cart.growth.key);
    else applyHeavyGrowth(fake, cart.growth.key, { scarLv: G.players[me].scarLv||0 });
    atkDice = fake.attack;
    session.aRolls = atkDice.map(d=>{
      const er = rollExplodingAttack(d.faces);
      return { dieId:d.id, faces:d.faces, index:er.index, v:er.value, shown:er.shown, exploded:er.exploded, first:er.value, rerolled:false };
    });
    const pMod = fake.mod.faces;
    const pi = rollIndex(pMod.length);
    session.pModRoll = deep(pMod[pi]);
    session.pModRoll.index = pi;
    const inst = fake.instinct || INSTINCT_FACES.map(f=>f.id);
    const ii = rollIndex(inst.length);
    session.instinctRoll = inst[ii];
    session.instinctExtra = 0;
    if (session.instinctRoll==='explode'){
      const er = rollExplodingAttack(hotFaces());
      session.instinctExtra = er.value;
    }
    session._previewPar = fake;
  }

  session.freeLeft = freeRerollThisRound();
  session.paidRerolls = 0;
  session.phase = 'roll';
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 550);
}

/** Restore clean dice/mod, then apply current scar once (safe to call on every scar reroll). */
function reapplyScarFromBase(){
  if (!session) return;
  session.rolls = deep(session.baseRolls || session.rolls || []);
  session.modRoll = session.baseModRoll ? deep(session.baseModRoll) : session.modRoll;
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  (session.rolls||[]).forEach(d=>{ d.scarZeroed = false; d.scarNote = ''; });
  applyScarToSession();
}

function applyScarToSession(){
  const scar = session.scarRoll;
  if (!scar) return;
  const lv = scar.level;
  const rolls = session.rolls || [];
  if (scar.id==='drain'){
    session.scarEnergyLoss = lv===1 ? 2 : 4;
  } else if (scar.id==='bleed'){
    const mult = lv===1 ? 0.9 : 0.8;
    rolls.forEach(d=>{ d.v = Math.max(0, Math.round(d.v * mult)); });
  } else if (scar.id==='static'){
    session.modRoll = null;
    if (lv===2) session.scarEnergyLoss = (session.scarEnergyLoss||0) + 1;
  } else if (scar.id==='fumble'){
    const n = lv===1 ? 1 : 2;
    for (let k=0;k<n;k++){
      if (!rolls.length) break;
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const rf = rollFace(rolls[hi].faces);
      rolls[hi].v = rf.value; rolls[hi].index = rf.index; rolls[hi].rerolled = true;
      // keep base in sync for the fumbled die so later scar rerolls don't revive the old high
      if (session.baseRolls && session.baseRolls[hi]){
        session.baseRolls[hi].v = rf.value;
        session.baseRolls[hi].index = rf.index;
        session.baseRolls[hi].first = session.baseRolls[hi].first != null ? session.baseRolls[hi].first : rf.value;
      }
    }
  } else if (scar.id==='penalty'){
    session.ptsDelta = -(lv===1 ? 5 : 10);
  } else if (scar.id==='shatter'){
    // Subtract strongest die value — keep the die so scar rerolls can restore cleanly
    if (rolls.length){
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const lost = rolls[hi].v||0;
      rolls[hi].scarNote = '−'+lost;
      rolls[hi].scarZeroed = true;
      rolls[hi].v = 0;
    }
    if (lv===2) session.ptsDelta = (session.ptsDelta||0) - 5;
  }
}

function rollPhaseHTML(r, isHost){
  const shake = session.shake ? 'rolling' : '';
  const rolls = session.rolls||[];
  const live = liveHumanBreakdown();
  const humanSum = live.total;
  const modKind = session.modRoll && session.modRoll.kind;
  let modLine = session.modRoll
    ? `<div class="mod-flip"><span class="${modFaceClass({kind:modKind})}">Mod: ${esc(live.modLabel)}</span></div>`
    : `<div class="mod-flip"><span class="blank">Mod: ${esc(live.modLabel)}</span></div>`;
  const parts = [`Dice <b>${live.attack}</b>`];
  if (live.modAdd) parts.push(`Mod <b>+${live.modAdd}</b> <span style="color:var(--dim)">(${esc(live.modLabel)})</span>`);
  else if (live.pendingEnergy) parts.push(`<span style="color:var(--energy)">${esc(live.modLabel)}</span>`);
  else parts.push(`Mod <span style="color:var(--dim)">${esc(live.modLabel)}</span>`);
  if (live.scarLabel) parts.push(`Scar <b style="color:#ff8a9a">${esc(live.scarLabel)}</b>`);
  if (live.ptsDelta) parts.push(`<span style="color:#ff8a9a">${live.ptsDelta} pts</span>`);
  if (live.energyLoss) parts.push(`<span style="color:#ff8a9a">−${live.energyLoss}⚡</span>`);
  const mathLine = `<div class="small center" style="margin-top:4px">${parts.join(' · ')}</div>
    <div class="small center" style="margin-top:2px">Final combat total</div>`;

  let scarLine = '';
  if (session.scarRoll){
    scarLine = `<div class="warn-box">Scar: <b>${session.scarRoll.label}</b> — tap scar die to reroll</div>`;
  }

  const dice = rolls.map((d,i)=>{
    const sel = session.selectedRoll && session.selectedRoll.type==='h' && session.selectedRoll.i===i;
    const shown = d.scarZeroed ? 0 : d.v;
    const sub = d.scarNote ? d.scarNote : (d.rerolled?'rerolled':'');
    return `<div class="die-wrap can-pick ${sel?'selected':''}" onclick="pickRoll('h',${i})">${dieHTML(d.color, shown, shake)}
      <div class="die-label ${d.color}">${COLOR_META[d.color].name}</div>
      <div class="die-sub">${sub}</div></div>`;
  }).join('');

  let parBlock = '';
  if (isHost){
    const aDice = (session.aRolls||[]).map((d,i)=>{
      const sel = session.selectedRoll && session.selectedRoll.type==='a' && session.selectedRoll.i===i;
      return `<div class="die-wrap can-pick ${sel?'selected':''}" onclick="pickRoll('a',${i})">${dieHTML('attack', d.v, shake)}
        <div class="die-label" style="color:#ffd2b0">Atk${d.exploded?'💥':''}</div></div>`;
    }).join('');
    const instSel = session.selectedRoll && session.selectedRoll.type==='i';
    const pModSel = session.selectedRoll && session.selectedRoll.type==='m';
    parBlock = `<div class="panel" style="border-color:#8dff6a44">
      <div class="lane-label" style="margin-top:0;color:var(--bio)">Parasite package</div>
      <div class="dice-row">${aDice}
        <div class="die-wrap can-pick ${pModSel?'selected':''}" onclick="pickRoll('m',0)">${dieHTML('mod', pModLabel(session.pModRoll), shake)}
          <div class="die-label" style="color:var(--bio)">Mod</div></div>
        <div class="die-wrap can-pick ${instSel?'selected':''}" onclick="pickRoll('i',0)">${dieHTML('instinct', instinctLabel(session.instinctRoll), shake)}
          <div class="die-label" style="color:var(--energy)">Instinct</div>
          <div class="die-sub">${session.instinctRoll==='explode'?'+'+session.instinctExtra:''}</div></div>
      </div>
      <div class="small center">Attack dice explode on max. Instinct: Gnash / Fever / Twin / Echo / Boom.</div>
    </div>`;
  }

  let scarDie = '';
  if (session.scarRoll){
    const sel = session.selectedRoll && session.selectedRoll.type==='s';
    scarDie = `<div class="die-wrap can-pick ${sel?'selected':''}" onclick="pickRoll('s',0)">${dieHTML('scar', session.scarRoll.label, shake)}
      <div class="die-label" style="color:#ff8a9a">Scar</div></div>`;
  }

  const canRR = canAffordReroll();
  return `<div class="panel">
      <div class="lane-label" style="margin-top:0">Your human roll</div>
      <div class="dice-row">${dice}${scarDie}</div>
      ${modLine}${scarLine}
      <div class="hint">Tap a die, then reroll (${session.freeLeft?`<b>${session.freeLeft} free</b> · then `:''}⚡${CFG.rerollCost})</div>
      <button class="btn reroll" onclick="confirmReroll()" ${!session.selectedRoll || !canRR?'disabled':''}>Reroll selected</button>
    </div>
    ${parBlock}
    <div class="fixed-cta" style="display:flex;flex-direction:column;gap:6px">
      ${mathLine}
      <div class="total-big crew center" style="margin:0">${humanSum}</div>
      <button class="btn" onclick="lockIn()">Lock in</button>
    </div>`;
}

function pickRoll(type, i){
  if (!session || session.phase!=='roll' || session.shake) return;
  session.selectedRoll = { type, i };
  render();
}
function confirmReroll(){
  if (!session || !session.selectedRoll || !canAffordReroll()) return;
  const { type, i } = session.selectedRoll;
  if (!spendRerollCharge()) return;
  if (type==='h'){
    // Reroll against the clean base die, then re-apply scar once
    if (!session.baseRolls || !session.baseRolls[i]) return;
    const d = session.baseRolls[i];
    const rf = rollFace(d.faces);
    d.index=rf.index; d.v=rf.value; d.first=rf.value; d.rerolled=true;
    d.scarZeroed=false; d.scarNote='';
    reapplyScarFromBase();
  } else if (type==='a'){
    const d = session.aRolls[i];
    const er = rollExplodingAttack(d.faces);
    Object.assign(d, { index:er.index, v:er.value, shown:er.shown, exploded:er.exploded, rerolled:true });
  } else if (type==='m'){
    const faces = (session._previewPar || G.parasite).mod.faces;
    const pi = rollIndex(faces.length);
    session.pModRoll = deep(faces[pi]);
    session.pModRoll.index = pi;
  } else if (type==='i'){
    const inst = (session._previewPar || G.parasite).instinct || INSTINCT_FACES.map(f=>f.id);
    session.instinctRoll = inst[rollIndex(inst.length)];
    session.instinctExtra = 0;
    if (session.instinctRoll==='explode'){
      session.instinctExtra = rollExplodingAttack(hotFaces()).value;
    }
  } else if (type==='s'){
    const lv = G.players[me].scarLv||1;
    const faces = SCAR_FACES[lv];
    const si = rollIndex(faces.length);
    session.scarRoll = { index:si, id:faces[si].id, label:faces[si].label, level:lv };
    reapplyScarFromBase();
  }
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 450);
}

function lockIn(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  const action = {
    phase:'locked',
    role: isHost ? 'host' : 'human',
    at: Date.now(),
    forges: cart.forges||[],
    modUps: cart.modUps||[],
    addDie: cart.addDie||null,
    buyFreeReroll: !!cart.buyFreeReroll,
    rerollBuys: session.paidRerolls||0,
    rolls: session.rolls,
    modRoll: session.modRoll,
    scarRoll: session.scarRoll,
    ptsDelta: session.ptsDelta||0,
    scarEnergyLoss: session.scarEnergyLoss||0,
  };
  if (isHost){
    action.growth = cart.growth;
    action.aRolls = session.aRolls;
    action.pModRoll = session.pModRoll;
    action.instinctRoll = session.instinctRoll;
    action.instinctExtra = session.instinctExtra||0;
  }
  // apply scar energy loss into pending by negative pending — stash on action
  submitAction(action);
  session = { round:r, phase:'upgrade', rolls:null, paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null };
  cart = freshCart();
  render();
}

function waitingHTML(r){
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  const hostId = hostIdForRound(G, r);
  return `<div class="panel">
    <h3 class="center">Waiting on the crew…</h3>
    ${PIDS.map(p=>{
      const ok = actionLocked(actions[p]);
      const tag = hostId===p ? ' · HOST' : '';
      return `<div class="wait-row">${crewImg(p)} <b>${PLAYERS[p].name}</b>${tag}
        <span class="st ${ok?'in':'thinking'}">${ok?'LOCKED':'…'}</span></div>`;
    }).join('')}
  </div>`;
}

/* ================= VERDICT ================= */
function playerReviewCardHTML(pid, res){
  const rolls = (res.rolls && res.rolls[pid]) || [];
  const br = (res.breakdown && res.breakdown[pid]) || null;
  // Fallback recompute from stored actions if older results lack breakdown
  let attack = br ? br.attack : rolls.reduce((s,d)=>s+(d.v||0),0);
  let total = br ? br.total : (res.totals && res.totals[pid] != null ? res.totals[pid] : attack);
  let modLabel = br ? br.modLabel : 'mod ?';
  let modAdd = br ? br.modAdd : 0;
  let pending = br ? br.pendingEnergy : 0;
  let scarLab = br && br.scarRoll ? br.scarRoll.label : '';
  const isHost = res.hostId === pid;
  let hostExtra = '';
  if (isHost && res.parPart){
    const p = res.parPart;
    const aDice = ((br && br.aRolls) || res.aRolls || []).map(d=>dieHTML('attack', d.v)).join('');
    const pMod = (br && br.pModRoll) || res.pModRoll;
    const inst = (br && br.instinctRoll) || res.instinctRoll;
    hostExtra = `<div class="lane-label" style="color:var(--bio)">Parasite</div>
      <div class="dice-row" style="margin:4px 0">${aDice}${pMod?dieHTML('mod', pModLabel(pMod)):''}${inst!=null?dieHTML('instinct', typeof inst==='string'?inst:(inst.id||'?')):''}</div>
      <div class="small">Atk ${p.atk} + mod ${p.flat||p.pctAdd||0} + fusion ${p.fusion} (${Math.round((p.fusionPct||0)*100)}%) + instinct ${p.instinctAdd} + aura ${p.aura} = <b>${Math.round(p.total)}</b></div>
      <div class="small">Human ${Math.round(res.hostHuman)} + Parasite ${Math.round(p.total)} = <b style="color:var(--danger)">${Math.round(res.hostTotal)}</b></div>`;
  }
  return `<div class="panel" style="padding:10px;margin-bottom:8px">
    <div class="award-row" style="border:none;padding:0 0 6px">
      <span class="who">${crewImg(pid)} <b>${PLAYERS[pid].name}</b>${isHost?' <span class="badge" style="background:#8dff6a33;color:var(--bio)">HOST</span>':''}</span>
      <span class="total-big crew" style="font-size:22px;margin:0">${Math.round(total)}</span>
    </div>
    ${diceRowMiniHTML(rolls)}
    <div class="small">Dice <b>${attack}</b>${modAdd?` + Mod <b>+${modAdd}</b>`:''} (${esc(modLabel)})${pending?` · +${pending}⚡ next`:''}${scarLab?` · Scar ${esc(scarLab)}`:''}</div>
    ${hostExtra}
  </div>`;
}

function verdictHTML(r){
  const res = G.rounds[r].result;
  if (!res) return '';
  let banner = '';
  let body = '';
  if (res.kind==='training'){
    banner = `<div class="result-banner h">TRAINING COMPLETE</div>`;
  } else if (res.kind==='infection'){
    banner = `<div class="result-banner ${res.hostWins?'p':'h'}">${res.hostWins ? 'THE HOST FEASTS' : 'THE CREW HOLDS'}</div>`;
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew (3)</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">${PLAYERS[res.hostId].name}+bug</div><div class="val">${Math.round(res.hostTotal)}</div></div>
    </div>
    ${res.growth?`<div class="small center" style="margin:6px 0">Growth: <b>${res.growth.key}</b> · Boss Meter ${res.bossMeter}</div>`:''}`;
  } else if (res.kind==='boss'){
    banner = `<div class="result-banner ${res.cleared?'h':'p'}">${res.cleared ? 'THE CREW SLAYS THE BEAST' : 'THE PARASITE ESCAPES'}</div>`;
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">Boss HP</div><div class="val">${res.hp}</div></div>
    </div>
    <div class="small center">${res.cleared ? `Hero: <b>${PLAYERS[res.hero].name}</b>` : 'It slips into the vents. Hollow victory on points.'}</div>`;
  }

  // Order: host first if infection, else by total desc
  let order = PIDS.slice();
  if (res.kind==='infection'){
    order = [res.hostId, ...PIDS.filter(p=>p!==res.hostId)];
  } else {
    order.sort((a,b)=>{
      const ta = (res.breakdown && res.breakdown[a] ? res.breakdown[a].total : (res.totals&&res.totals[a])||0);
      const tb = (res.breakdown && res.breakdown[b] ? res.breakdown[b].total : (res.totals&&res.totals[b])||0);
      return tb-ta;
    });
  }
  const review = `<div class="lane-label">Dice review</div>${order.map(p=>playerReviewCardHTML(p, res)).join('')}`;

  const awards = res.awards || {};
  const awardRows = PIDS.map(p=>{
    const a = awards[p] || {pts:0,energy:0,tags:[]};
    const badges = (a.tags||[]).map(t=>{
      if (t==='mvp') return '<span class="badge mvp">MVP</span>';
      if (t.startsWith('cat-')) return `<span class="badge ${t}">${t.slice(4)}</span>`;
      if (t==='kill') return '<span class="badge mvp">KILL</span>';
      return '';
    }).join('');
    const pend = (res.breakdown && res.breakdown[p] && res.breakdown[p].pendingEnergy) ? ` · mod +${res.breakdown[p].pendingEnergy}⚡` : '';
    return `<div class="award-row"><span class="who">${crewImg(p)} ${PLAYERS[p].name}${badges}</span>
      <span>+${a.pts}pts · +${a.energy}⚡${pend}</span></div>`;
  }).join('');

  return `<div class="panel">${banner}${body}</div>
    ${review}
    <div class="panel"><div class="lane-label" style="margin-top:0">Awards</div>${awardRows}
    <button class="btn" style="margin-top:12px" onclick="dismissVerdict(${r})">Continue</button>
  </div>`;
}
function dismissVerdict(r){
  markSeen(r);
  animating = false;
  render();
}

function finalScreen(){
  const escaped = !!G.escaped;
  return `<div style="padding-top:5vh">
    <div class="center">${escaped ? parasiteArtHTML(120,4) : '<div style="font-size:48px;font-family:Orbitron">HERO</div>'}</div>
    <h1 class="center brand-hero" style="font-size:22px">${escaped ? 'ESCAPED' : 'FINAL SCORES'}</h1>
    <p class="center small">${escaped ? 'The parasite got away. Rank the survivors anyway.' : '10 rounds. Two possessions each. One hero.'}</p>
    <div id="revealZone" style="margin-top:18px"></div>
    <div id="newGameZone" class="hidden" style="margin-top:20px">
      <button class="btn" onclick="startNewGame()">Play again</button>
    </div>
  </div>`;
}
function runFinalReveal(){
  const ranked = PIDS.map(p=>({p, pts:G.players[p].pts})).sort((a,b)=>a.pts-b.pts);
  const zone = $('#revealZone');
  if (!zone || zone.dataset.ran) return;
  zone.dataset.ran = '1';
  const medals = ['','4th','3rd','2nd'];
  ranked.forEach((e,i)=>{
    setTimeout(()=>{
      const isWin = i===ranked.length-1;
      const row = document.createElement('div');
      row.className = 'reveal-row'+(isWin?' winner':'');
      row.innerHTML = `<span class="place">${isWin?'1st':medals[i]||''}</span>
        ${crewImg(e.p)}
        <b>${PLAYERS[e.p].name}</b>${isWin?' <span class="badge mvp">HERO</span>':''}
        <span class="pts-final">0</span>`;
      zone.prepend(row);
      requestAnimationFrame(()=>row.classList.add('show'));
      countUp(row.querySelector('.pts-final'), e.pts);
      if (isWin){ confettiBurst(); $('#newGameZone').classList.remove('hidden'); }
    }, 900*i + 400);
  });
}
function countUp(el, target){
  const t0 = performance.now();
  const dur = 900;
  function frame(t){
    const k = Math.min(1, (t-t0)/dur);
    el.textContent = Math.round(target * (0.5-Math.cos(Math.PI*k)/2));
    if (k<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function confettiBurst(){
  const glyphs = ['*','+','✦','·'];
  for (let i=0;i<40;i++){
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (2+Math.random()*2.5)+'s';
    s.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 6000);
  }
}

/* ================= BOOT ================= */
(function boot(){
  const sf = $('#starfield');
  for (let i=0;i<60;i++){
    const s = document.createElement('i');
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = Math.random()*3+'s';
    sf.appendChild(s);
  }
  if (configOK()) initFirebase();
  render();
})();
</script></body></html>
