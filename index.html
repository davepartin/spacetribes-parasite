function resetChoices(){
  if (session && session.phase === 'roll'){
    if (!confirm('Go back and clear this round’s upgrades? Your current roll will be discarded.')) return;
    session.phase = 'upgrade';
    session.rolls = null;
    session.baseRolls = null;
    session.baseModRoll = null;
    session.modRoll = null;
    session.scarRoll = null;
    session.scarRolls = [];
    session.aRolls = null;
    session.pModRoll = null;
    session.instinctRoll = null;
    session.paidRerolls = 0;
    session.freeLeft = 0;
    session.parEnergy = 0;
    session.parRerolls = 0;
    session.humanRolled = false;
    session.humanLocked = false;
    session.parRolled = false;
    session.parLocked = false;
    session._previewPar = null;
    session.selectedRoll = null;
    session.ptsDelta = 0;
    session.scarEnergyLoss = 0;
  }
  cart = freshCart();
  ui.selectedDie = null;
  ui.selectedFace = null;
  ui.selectedModFace = null;
  render();
}

function selectDie(id){ ui.selectedDie=id; ui.selectedFace=null; render(); }
function pickFace(dieId, faceIndex){ ui.selectedDie=dieId; ui.selectedFace={dieId,faceIndex}; render(); }
function queueForge(){
  if (!ui.selectedFace || energyLeft() < CFG.forgeCost) return;
  cart.forges.push({ ...ui.selectedFace });
  render();
}
function undoForge(){ cart.forges.pop(); render(); }
function pickModFace(i){ ui.selectedModFace=i; render(); }
function queueModUp(){
  if (ui.selectedModFace==null || energyLeft() < CFG.modUpgradeCost) return;
  const pl = G.players[me];
  const preview = previewModDie(pl);
  const face = preview[ui.selectedModFace];
  if (!face || face.kind==='scar' || (face.level|0) >= modMaxLevel(face)) return;
  cart.modUps.push(ui.selectedModFace);
  render();
}
function queueHealScar(delta){
  const pl = G.players[me];
  const max = scarCount(pl);
  let n = Math.max(0, (cart.healScars||0) + (delta|0));
  n = Math.min(n, max);
  const baseSpend = (cart.forges||[]).length*CFG.forgeCost + (cart.modUps||[]).length*CFG.modUpgradeCost + (cart.addDie?CFG.addDieCost:0);
  while (n > 0 && (myBudget() - baseSpend - n*(CFG.healScarCost||2)) < 0) n--;
  cart.healScars = n;
  render();
}
function setAddDie(c){
  if (cart.addDie===c){ cart.addDie=null; }
  else if (canAddColor(G.players[me], c, null) && energyLeft() >= CFG.addDieCost){ cart.addDie=c; }
  render();
}
function clearAddDie(){ cart.addDie=null; render(); }
function pickGrowth(key, lane){
  const prevTarget = (cart.growth && cart.growth.key==='poison') ? cart.growth.target : null;
  cart.growth = { key, lane, target: key==='poison' ? prevTarget : null };
  render();
}
function pickPoisonTarget(pid){
  if (!cart.growth || cart.growth.key!=='poison') return;
  if (pid === me) return;
  cart.growth.target = pid;
  render();
}

/* ================= ROLL ================= */
function prepareHostGrowthPreview(){
  const fake = deep(G.parasite);
  if (cart && cart.growth && cart.growth.key){
    const hostFake = { scars: scarCount(G.players[me]) };
    const MOVE_KEYS = { feed:1, harden:1, outbreak:1, poison:1 };
    if (MOVE_KEYS[cart.growth.key]){
      const res = applyParasiteMove(fake, cart.growth.key, hostFake, { poisonTarget: cart.growth.target });
      session._previewTonight = res.tonightFlat || 0;
    } else if (cart.growth.lane==='soft'){
      applySoftGrowth(fake, cart.growth.key);
      session._previewTonight = 0;
    } else {
      const res = applyHeavyGrowth(fake, cart.growth.key, hostFake);
      session._previewTonight = (res && res.tonightFlat) || 0;
    }
  }
  session._previewPar = fake;
  return fake;
}
function rollHumanBundle(){
  const preview = previewHumanDice(G.players[me]);
  const modPrev = previewModDie(G.players[me]);
  const rolls = preview.map(d=>{
    const rf = rollFace(d.faces);
    const bonus = isBonusDie(d);
    return { dieId:d.id, color:d.color, faces:d.faces, index:rf.index, v:rf.value, first:rf.value, rerolled:false, tempNew:d.id==='preview', bonus };
  });
  if (cart.addDie){
    const last = rolls[rolls.length-1];
    if (last && last.tempNew){ last.dieId = uid(cart.addDie[0]); last.bonus = true; }
  }
  const mi = rollIndex(modPrev.length);
  const modRoll = { index:mi, kind:modPrev[mi].kind, level:modPrev[mi].level, value:modFaceValue(modPrev[mi]) };
  const scarsActive = Math.max(0, scarCount(G.players[me]) - Math.max(0, (cart && cart.healScars)|0));
  const scarRolls = [];
  for (let s=0; s<scarsActive; s++){
    const si = rollIndex(SCAR_DIE_FACES.length);
    const f = SCAR_DIE_FACES[si];
    scarRolls.push({ index:si, id:f.id, label:f.label, level:1 });
  }
  session.baseRolls = deep(rolls);
  session.baseModRoll = deep(modRoll);
  session.rolls = deep(rolls);
  session.modRoll = deep(modRoll);
  session.scarRolls = scarRolls;
  session.scarRoll = scarRolls[0] || null; // legacy single pointer
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  reapplyScarFromBase();
  session.humanRolled = true;
  session.humanLocked = false;
}
function rollParasiteBundle(){
  const fake = session._previewPar || prepareHostGrowthPreview();
  session.aRolls = (fake.attack||[]).map(d=>{
    const er = rollExplodingAttack(d.faces);
    return { dieId:d.id, faces:d.faces, index:er.index, v:er.value, shown:er.shown, exploded:er.exploded, first:er.value, rerolled:false };
  });
  const pMod = fake.mod.faces;
  const pi = rollIndex(pMod.length);
  session.pModRoll = deep(pMod[pi]);
  session.pModRoll.index = pi;
  const inst = fake.instinct || INSTINCT_FACES.map(f=>f.id);
  const ii = rollIndex(inst.length);
  session.instinctRoll = inst[ii];
  session.instinctExtra = 0;
  if (session.instinctRoll==='explode'){
    session.instinctExtra = rollExplodingAttack(hotFaces()).value;
  }
  session.parRolled = true;
  session.parLocked = false;
}
/** Host: enter roll phase without rolling yet — human and parasite roll independently. */
function startHostRollPhase(){
  const r = G.round;
  if (!(cart.growth && cart.growth.key)) return;
  if (cart.growth.key==='poison' && !cart.growth.target) return;
  prepareHostGrowthPreview();
  session.phase = 'roll';
  session.humanRolled = false;
  session.humanLocked = false;
  session.parRolled = false;
  session.parLocked = false;
  session.rolls = null;
  session.baseRolls = null;
  session.modRoll = null;
  session.scarRoll = null;
  session.scarRolls = [];
  session.aRolls = null;
  session.pModRoll = null;
  session.instinctRoll = null;
  session.instinctExtra = 0;
  session.parEnergy = hostParStipendNow();
  session.parRerolls = 0;
  session.freeLeft = freeRerollThisRound();
  session.paidRerolls = 0;
  session.selectedRoll = null;
  session.shake = false;
  render();
}
function beginHumanRoll(){
  if (!session || session.phase!=='roll' || session.humanLocked) return;
  rollHumanBundle();
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 550);
}
function beginParasiteRoll(){
  if (!session || session.phase!=='roll' || session.parLocked) return;
  if (!session._previewPar) prepareHostGrowthPreview();
  if (session.parEnergy == null) session.parEnergy = hostParStipendNow();
  rollParasiteBundle();
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 550);
}
function lockHumanRoll(){
  if (!session || !session.humanRolled || session.humanLocked) return;
  session.humanLocked = true;
  session.selectedRoll = null;
  render();
}
function lockParasiteRoll(){
  if (!session || !session.parRolled || session.parLocked) return;
  session.parLocked = true;
  session.selectedRoll = null;
  render();
}
/** Non-host: classic single roll of everything. */
function beginRoll(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  if (isHost){ startHostRollPhase(); return; }

  rollHumanBundle();
  session.parEnergy = 0;
  session.parRerolls = 0;
  session.humanRolled = true;
  session.humanLocked = false;
  session.parRolled = false;
  session.parLocked = false;
  session.freeLeft = freeRerollThisRound();
  session.paidRerolls = 0;
  session.phase = 'roll';
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 550);
}

/** Restore clean dice/mod, then apply each Scar die once. */
function reapplyScarFromBase(){
  if (!session) return;
  session.rolls = deep(session.baseRolls || session.rolls || []);
  session.modRoll = session.baseModRoll ? deep(session.baseModRoll) : session.modRoll;
  session.ptsDelta = 0;
  session.scarEnergyLoss = 0;
  (session.rolls||[]).forEach(d=>{ d.scarZeroed = false; d.scarNote = ''; });
  (session.scarRolls||[]).forEach(sr => applyHurtFace(sr, 'scar'));
}
function applyHurtFace(hurt, kind){
  // Scar dice are uniform (level 1 effects). Mutates session.rolls / energy / pts.
  if (!hurt || hurt.id==='blank') return;
  const rolls = session.rolls || [];
  if (hurt.id==='drain'){
    session.scarEnergyLoss = (session.scarEnergyLoss||0) + 2;
  } else if (hurt.id==='bleed'){
    rolls.forEach(d=>{ d.v = Math.max(0, Math.round(d.v * 0.9)); });
  } else if (hurt.id==='shatter'){
    if (rolls.length){
      let hi=0; for (let i=1;i<rolls.length;i++) if ((rolls[i].v||0)>(rolls[hi].v||0)) hi=i;
      const lost = rolls[hi].v||0;
      rolls[hi].scarNote = (rolls[hi].scarNote ? rolls[hi].scarNote+' · ' : '') + '−'+lost+' '+kind;
    }
  }
}

function rollPhaseHTML(r, isHost){
  const shake = session.shake ? 'rolling' : '';
  const humanRolled = !isHost || !!session.humanRolled || !!(session.rolls && session.rolls.length);
  const humanLocked = !!session.humanLocked;
  const parRolled = !!session.parRolled || !!(session.aRolls && session.aRolls.length);
  const parLocked = !!session.parLocked;
  if (!isHost && session.rolls && !session.humanRolled) session.humanRolled = true;

  const rolls = session.rolls||[];
  const live = liveHumanBreakdown();
  const humanSum = live.total;
  const modRoll = session.modRoll;
  const modFaceTxt = modRoll
    ? modFaceLabel({ kind: modRoll.kind, level: modRoll.level|0 })
    : '—';
  const modKindCls = modRoll && modRoll.kind ? modRoll.kind : 'off';
  let modPart = '0';
  if (live.modAdd) modPart = '+'+live.modAdd;
  else if (live.pendingEnergy) modPart = '+'+live.pendingEnergy+'⚡';
  else if (modRoll && modRoll.kind==='base') modPart = '+0';
  else if (modRoll && modRoll.kind==='scar') modPart = 'Scar';
  else if (!modRoll) modPart = humanRolled ? 'off' : '—';

  const scarList = session.scarRolls || [];
  let scarLine = '';
  if (scarList.length){
    const labs = scarList.map(s => s && s.label ? s.label : '—').join(' · ');
    scarLine = `<div class="warn-box">${tip('scar','Scar')} pool (${scarList.length}): <b>${esc(labs)}</b> — tap a Scar die to reroll</div>`;
  }
  if (modRoll && modRoll.kind==='scar' && !humanLocked){
    scarLine += `<div class="warn-box">Mod shows Scar — ${tip('lock','lock in')} and you grab a permanent ${tip('scar','Scar')} die</div>`;
  }
  let extraBits = '';
  if (live.scarLabel) extraBits += `<div class="small center" style="margin-top:4px;color:#ff8a9a">Scar ${esc(live.scarLabel)}</div>`;
  if (live.shatterSub) extraBits += `<div class="small center" style="color:#ff8a9a">Scar −${live.shatterSub} (strongest die — reroll it to move the hit)</div>`;
  if (live.ptsDelta) extraBits += `<div class="small center" style="color:#ff8a9a">${live.ptsDelta} pts</div>`;
  if (live.energyLoss) extraBits += `<div class="small center" style="color:#ff8a9a">−${live.energyLoss}⚡</div>`;

  const canPickHuman = humanRolled && !humanLocked;
  const dice = humanRolled ? rolls.map((d,i)=>{
    const sel = canPickHuman && session.selectedRoll && session.selectedRoll.type==='h' && session.selectedRoll.i===i;
    const shown = d.v;
    const bonus = isBonusDie(d);
    const bits = [];
    if (d.scarNote) bits.push(d.scarNote);
    else if (d.rerolled) bits.push('rerolled');
    if (bonus) bits.push('bonus');
    const faceLine = (d.faces||[]).join('·');
    const pick = canPickHuman ? `can-pick ${sel?'selected':''}" onclick="pickRoll('h',${i})` : '';
    return `<div class="die-wrap ${pick}">${dieHTML(d.color, shown, shake, {bonus})}
      <div class="die-label ${d.color}">${COLOR_META[d.color].name}${bonus?' +':''}</div>
      <div class="die-sub">${bits.join(' · ')}</div>
      <div class="die-faces">${esc(faceLine)}</div></div>`;
  }).join('') : '';

  const modSel = canPickHuman && session.selectedRoll && session.selectedRoll.type==='hm';
  const modDie = humanRolled ? `<div class="die-wrap ${canPickHuman?`can-pick ${modSel?'selected':''}" onclick="pickRoll('hm',0)`:''}">
      ${dieHTML('hmod', modFaceTxt, `${shake} ${modKindCls}`)}
      <div class="die-label hmod">${tip('mod','Mod')}</div>
      <div class="die-sub">${esc(live.modLabel)}</div>
    </div>` : '';

  let scarDie = '';
  if (humanRolled){
    scarList.forEach((sr, si)=>{
      const sel = canPickHuman && session.selectedRoll && session.selectedRoll.type==='s' && session.selectedRoll.i===si;
      scarDie += `<div class="die-wrap ${canPickHuman?`can-pick ${sel?'selected':''}" onclick="pickRoll('s',${si})`:''}">${dieHTML('scar', sr.label, shake)}
        <div class="die-label" style="color:#ff8a9a">${tip('scar','Scar')} ${si+1}</div></div>`;
    });
  }

  const finalBlock = humanRolled ? `<div class="roll-final">
      <div class="roll-eq">
        <span class="rf">Dice <b>${live.attack}</b></span>
        <span class="op">+</span>
        <span class="rf">Mod <b>${esc(String(modPart))}</b></span>
        <span class="op">=</span>
        <span class="rf total">Total <b>${humanSum}</b></span>
      </div>
      ${extraBits}
    </div>` : `<div class="hint">Roll your human dice when ready. You can roll the parasite separately.</div>`;

  const canRR = canAffordReroll();
  let humanActions = '';
  if (!humanRolled){
    humanActions = `<button class="btn reroll" onclick="beginHumanRoll()">Roll human dice</button>`;
  } else if (isHost && humanLocked){
    humanActions = `<button class="btn lock-side done" disabled>Human roll locked · ${humanSum}</button>`;
  } else {
    humanActions = `<div class="hint">Tap any die to reroll (${session.freeLeft?`<b>${session.freeLeft} free</b> · then `:''}⚡${CFG.rerollCost})</div>
      <button class="btn reroll" onclick="confirmReroll()" ${!session.selectedRoll || !isHumanRollType(session.selectedRoll.type) || !canRR?'disabled':''}>Reroll selected</button>
      ${isHost?`<button class="btn lock-side" onclick="lockHumanRoll()">Lock human roll · ${humanSum}</button>`:''}`;
  }

  const humanPanel = `<div class="panel ${humanLocked?'locked-side':''}">
      <div class="lane-label" style="margin-top:0">Your human roll${humanLocked?'<span class="lock-badge">LOCKED</span>':''}</div>
      ${humanRolled?`<div class="dice-row">${dice}<span class="dice-plus" aria-hidden="true">+</span>${modDie}${scarDie}</div>${scarLine}${finalBlock}`:finalBlock}
      ${humanActions}
    </div>`;

  let parBlock = '';
  let hostCombined = humanSum;
  let parTotal = 0;
  const parStipMax = hostParStipendNow();
  if (isHost){
    const canPickPar = parRolled && !parLocked;
    let aDice = '';
    if (parRolled){
      aDice = (session.aRolls||[]).map((d,i)=>{
        const sel = canPickPar && session.selectedRoll && session.selectedRoll.type==='a' && session.selectedRoll.i===i;
        const faceLine = (d.faces||[]).join('·');
        return `<div class="die-wrap ${canPickPar?`can-pick ${sel?'selected':''}" onclick="pickRoll('a',${i})`:''}">${dieHTML('attack', d.v, shake)}
          <div class="die-label" style="color:#ffb090">Attack</div>
          <div class="die-sub">${d.exploded?'+ bonus re-roll':''}</div>
          <div class="die-faces">${esc(faceLine)}</div></div>`;
      }).join('');
    }
    const instSel = canPickPar && session.selectedRoll && session.selectedRoll.type==='i';
    const pModSel = canPickPar && session.selectedRoll && session.selectedRoll.type==='m';
    const pModTxt = pModLabel(session.pModRoll);
    const instId = session.instinctRoll;
    const instShort = instinctShortLabel(instId);
    const instFull = instinctDesc(instId);
    const instExtra = instId==='explode' && session.instinctExtra ? ` Extra die rolled: <b>+${session.instinctExtra}</b>.` : '';
    const parEn = session.parEnergy != null ? session.parEnergy : parStipMax;
    const canParRR = canAffordParReroll();
    const parSel = session.selectedRoll && isParasiteRollType(session.selectedRoll.type);
    let parFinal = '';
    if (parRolled){
      const par = liveParasiteBreakdown(live.attack, session.rolls||[]);
      parTotal = Math.round(par.total||0);
      hostCombined = humanSum + parTotal;
      const modBit = (par.flat||0) + (par.pctAdd||0);
      parFinal = `<div class="roll-final" style="border-color:#8dff6a44">
          <div class="roll-eq par">
            <span class="rf">Atk <b>${par.atk||0}</b></span>
            <span class="op">+</span>
            <span class="rf">Mod <b>${modBit}</b></span>
            <span class="op">+</span>
            <span class="rf tiny">${tip('baseAtk','Base')} <b>${par.baseAtk||0}</b></span>
            <span class="op">+</span>
            <span class="rf tiny">Share <b>${par.fusion||0}</b></span>
            <span class="op">+</span>
            <span class="rf tiny">Spec <b>${par.instinctAdd||0}</b></span>
            <span class="op">+</span>
            <span class="rf tiny">Aura <b>${par.aura||0}</b></span>
            ${par.tonightFlat?`<span class="op">+</span><span class="rf tiny">Tonight <b>${par.tonightFlat}</b></span>`:''}
            <span class="op">=</span>
            <span class="rf total">Par <b>${parTotal}</b></span>
          </div>
          <div class="small center" style="margin-top:6px">Host total = human <b>${humanSum}</b> + parasite <b>${parTotal}</b> = <b style="color:var(--bio)">${hostCombined}</b></div>
        </div>`;
    }
    let parActions = '';
    if (!parRolled){
      parActions = `<button class="btn par-reroll" onclick="beginParasiteRoll()">Roll parasite dice</button>
        <div class="explain-box"><div class="ex-title">Parasite roll</div>
        <p>Roll Attack / Mod / Specialty separately from your human dice. Spend parasite ⚡ to reroll, then <b>Lock parasite roll</b>.</p></div>`;
    } else if (!parLocked){
      parActions = `${parFinal}
        <div class="hint">Tap a parasite die, then reroll (⚡${CFG.parRerollCost||1} each from parasite energy)</div>
        <button class="btn par-reroll" onclick="confirmParReroll()" ${!parSel || !canParRR?'disabled':''}>Reroll parasite · ⚡${CFG.parRerollCost||1}</button>
        <button class="btn lock-side par" onclick="lockParasiteRoll()">Lock parasite roll · ${parTotal}</button>
        <div class="explain-box">
          <div class="ex-title">What these dice do</div>
          <p><b>Attack</b> — hit power (faces under each die). Max face = ${tip('explode','+ bonus re-roll')}.</p>
          <p><b>Mod</b> — flat or % boost. This roll: <span class="now">${esc(pModTxt)}</span>.</p>
          <p><b>Specialty</b> — wild card. This roll: <span class="now">${esc(instFull)}</span>.${instExtra}</p>
        </div>`;
    } else {
      parActions = `${parFinal}<button class="btn lock-side done" disabled>Parasite roll locked · ${parTotal}</button>`;
    }
    const diceRow = parRolled ? `<div class="dice-row par-row">${aDice}
        <div class="die-wrap ${canPickPar?`can-pick ${pModSel?'selected':''}" onclick="pickRoll('m',0)`:''}">${dieHTML('mod', pModTxt, shake)}
          <div class="die-label" style="color:var(--bio)">Mod</div>
          <div class="die-sub">boost</div></div>
        <div class="die-wrap ${canPickPar?`can-pick ${instSel?'selected':''}" onclick="pickRoll('i',0)`:''}">${dieHTML('instinct', instShort, shake)}
          <div class="die-label" style="color:var(--energy)">${tip('instinct','Specialty')}</div>
          <div class="die-sub">${instId==='explode'&&session.instinctExtra?('+'+session.instinctExtra):''}</div></div>
      </div>` : '';
    parBlock = `<div class="panel ${parLocked?'locked-side':''}" style="border-color:#8dff6a44">
      <div class="lane-label" style="margin-top:0;color:var(--bio)">${tip('host','Parasite package')}${parLocked?'<span class="lock-badge">LOCKED</span>':''}</div>
      <div class="par-energy">Parasite ⚡ ${parEn} / ${parStipMax}</div>
      ${diceRow}
      ${parActions}
    </div>`;
  }

  let bottom = '';
  if (!isHost){
    const ready = humanRolled;
    bottom = `<button class="btn" onclick="lockIn()" ${!ready?'disabled':''}>Lock in · ${humanSum}</button>
      <div class="hint" style="margin-top:6px">${tip('lock','Lock in')} sends your roll.</div>`;
  } else if (humanLocked && parLocked){
    bottom = `<button class="btn" onclick="lockIn()">Submit both rolls · ${hostCombined}</button>`;
  } else {
    const need = [];
    if (!humanLocked) need.push(humanRolled ? 'lock human' : 'roll + lock human');
    if (!parLocked) need.push(parRolled ? 'lock parasite' : 'roll + lock parasite');
    bottom = `<button class="btn" disabled>Submit both rolls</button>
      <div class="hint" style="margin-top:6px">Still need to ${need.join(' and ')}.</div>`;
  }

  return `${humanPanel}
    ${parBlock}
    <div class="cta-spacer"></div>
    <div class="fixed-cta">${bottom}</div>`;
}

function pickRoll(type, i){
  if (!session || session.phase!=='roll' || session.shake) return;
  if (isHumanRollType(type) && session.humanLocked) return;
  if (isParasiteRollType(type) && session.parLocked) return;
  session.selectedRoll = { type, i };
  render();
}
function confirmReroll(){
  if (!session || session.humanLocked) return;
  if (!session.selectedRoll || !isHumanRollType(session.selectedRoll.type) || !canAffordReroll()) return;
  const { type, i } = session.selectedRoll;
  if (!spendRerollCharge()) return;
  if (type==='h'){
    if (!session.baseRolls || !session.baseRolls[i]) return;
    const d = session.baseRolls[i];
    const rf = rollFace(d.faces);
    d.index=rf.index; d.v=rf.value; d.first=rf.value; d.rerolled=true;
    d.scarZeroed=false; d.scarNote='';
    reapplyScarFromBase();
  } else if (type==='hm'){
    const faces = previewModDie(G.players[me]);
    const mi = rollIndex(faces.length);
    const modRoll = { index:mi, kind:faces[mi].kind, level:faces[mi].level, value:modFaceValue(faces[mi]) };
    session.baseModRoll = deep(modRoll);
    session.modRoll = deep(modRoll);
    reapplyScarFromBase();
  } else if (type==='s'){
    if (!session.scarRolls || !session.scarRolls[i]) return;
    const si = rollIndex(SCAR_DIE_FACES.length);
    const f = SCAR_DIE_FACES[si];
    session.scarRolls[i] = { index:si, id:f.id, label:f.label, level:1 };
    session.scarRoll = session.scarRolls[0] || null;
    reapplyScarFromBase();
  }
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 450);
}
function confirmParReroll(){
  if (!session || session.parLocked) return;
  if (!session.selectedRoll || !isParasiteRollType(session.selectedRoll.type) || !canAffordParReroll()) return;
  const { type, i } = session.selectedRoll;
  if (!spendParRerollCharge()) return;
  if (type==='a'){
    const d = session.aRolls[i];
    const er = rollExplodingAttack(d.faces);
    Object.assign(d, { index:er.index, v:er.value, shown:er.shown, exploded:er.exploded, rerolled:true });
  } else if (type==='m'){
    const faces = (session._previewPar || G.parasite).mod.faces;
    const pi = rollIndex(faces.length);
    session.pModRoll = deep(faces[pi]);
    session.pModRoll.index = pi;
  } else if (type==='i'){
    const inst = (session._previewPar || G.parasite).instinct || INSTINCT_FACES.map(f=>f.id);
    session.instinctRoll = inst[rollIndex(inst.length)];
    session.instinctExtra = 0;
    if (session.instinctRoll==='explode'){
      session.instinctExtra = rollExplodingAttack(hotFaces()).value;
    }
  }
  session.selectedRoll = null;
  session.shake = true;
  render();
  setTimeout(()=>{ if(session) session.shake=false; render(); }, 450);
}

function lockIn(){
  const r = G.round;
  const kind = roundKind(r);
  const isHost = kind==='infection' && hostIdForRound(G,r)===me;
  if (isHost){
    if (!session.humanLocked || !session.parLocked) return;
    if (!session.rolls || !session.aRolls) return;
  } else if (!session.rolls){
    return;
  }
  const gainScar = !!(session.modRoll && session.modRoll.kind==='scar');
  const action = {
    phase:'locked',
    role: isHost ? 'host' : 'human',
    at: Date.now(),
    forges: cart.forges||[],
    modUps: cart.modUps||[],
    addDie: cart.addDie||null,
    buyFreeReroll: !!cart.buyFreeReroll,
    rerollBuys: session.paidRerolls||0,
    healScars: Math.max(0, cart.healScars||0),
    gainScar,
    rolls: session.rolls,
    modRoll: session.modRoll,
    scarRolls: session.scarRolls||[],
    scarRoll: (session.scarRolls && session.scarRolls[0]) || session.scarRoll || null,
    ptsDelta: session.ptsDelta||0,
    scarEnergyLoss: session.scarEnergyLoss||0,
  };
  if (isHost){
    action.growth = cart.growth;
    action.aRolls = session.aRolls;
    action.pModRoll = session.pModRoll;
    action.instinctRoll = session.instinctRoll;
    action.instinctExtra = session.instinctExtra||0;
  }
  submitAction(action);
  session = { round:r, phase:'upgrade', rolls:null, paidRerolls:0, freeLeft:0, shake:false, selectedRoll:null };
  cart = freshCart();
  render();
  setTimeout(kickBots, 80);
}

function waitingHTML(r){
  const actions = (G.rounds[r] && G.rounds[r].actions) || {};
  const hostId = hostIdForRound(G, r);
  return `<div class="panel">
    <h3 class="center">Waiting on the crew…</h3>
    ${rosterOf(G).map(p=>{
      const ok = actionLocked(actions[p]);
      const tag = (hostId===p ? ' · HOST' : '') + (isComputer(p) ? ' · COMP' : '');
      return `<div class="wait-row">${whoHTML(p)}${tag}
        <span class="st ${ok?'in':'thinking'}">${ok?'LOCKED':(isComputer(p)?'PLAYING…':'…')}</span></div>`;
    }).join('')}
  </div>`;
}

function playerReviewCardHTML(pid, res){
  const rolls = (res.rolls && res.rolls[pid]) || [];
  const br = (res.breakdown && res.breakdown[pid]) || null;
  // Fallback recompute from stored actions if older results lack breakdown
  let attack = br ? br.attack : rolls.reduce((s,d)=>s+(d.v||0),0);
  let total = br ? br.total : (res.totals && res.totals[pid] != null ? res.totals[pid] : attack);
  let modLabel = br ? br.modLabel : 'mod ?';
  let modAdd = br ? br.modAdd : 0;
  let pending = br ? br.pendingEnergy : 0;
  let scarLab = '';
  if (br){
    if (br.scarRolls && br.scarRolls.length) scarLab = br.scarRolls.filter(s=>s&&s.id!=='blank').map(s=>s.label).join(' · ');
    else if (br.scarRoll) scarLab = br.scarRoll.label || '';
    if (br.scars) scarLab = (scarLab ? scarLab+' · ' : '') + br.scars + ' in pool';
  }
  const isHost = res.hostId === pid;
  let hostExtra = '';
  if (isHost && res.parPart){
    const p = res.parPart;
    const aRolls = (br && br.aRolls) || res.aRolls || [];
    const aDice = aRolls.map(d=>{
      const faceLine = (d.faces||[]).join('·');
      return `<div class="die-wrap">${dieHTML('attack', d.v)}
        <div class="die-label" style="color:#ffb090">Attack</div>
        <div class="die-sub">${d.exploded?'+ bonus re-roll':''}</div>
        ${faceLine?`<div class="die-faces">${esc(faceLine)}</div>`:''}</div>`;
    }).join('');
    const pMod = (br && br.pModRoll) || res.pModRoll;
    const inst = (br && br.instinctRoll) || res.instinctRoll;
    const instId = inst && inst.id ? inst.id : inst;
    hostExtra = `<div class="lane-label" style="color:var(--bio)">Parasite</div>
      <div class="dice-row par-row" style="margin:4px 0">${aDice}
        ${pMod?`<div class="die-wrap">${dieHTML('mod', pModLabel(pMod))}<div class="die-label" style="color:var(--bio)">Mod</div></div>`:''}
        ${inst!=null?`<div class="die-wrap">${dieHTML('instinct', instinctShortLabel(instId))}<div class="die-label" style="color:var(--energy)">Specialty</div></div>`:''}
      </div>
      <div class="small">${inst!=null?`Specialty: ${esc(instinctDesc(instId))}. `:''}Atk ${p.atk} + mod ${(p.flat||0)+(p.pctAdd||0)} + ${tip('baseAtk','base')} ${p.baseAtk||0} + share ${p.fusion} + specialty ${p.instinctAdd} + aura ${p.aura}${p.tonightFlat?` + tonight ${p.tonightFlat}`:''} = <b style="color:var(--bio)">${Math.round(p.total)}</b></div>
      <div class="small">Human ${Math.round(res.hostHuman)} + Parasite ${Math.round(p.total)} = <b style="color:var(--bio)">${Math.round(res.hostTotal)}</b></div>`;
  }
  return `<div class="panel" style="padding:10px;margin-bottom:8px">
    <div class="award-row" style="border:none;padding:0 0 6px">
      <span class="who">${whoHTML(pid)}${isHost?' <span class="badge" style="background:#8dff6a33;color:var(--bio)">HOST</span>':''}</span>
      <span class="total-big crew" style="font-size:22px;margin:0">${Math.round(total)}</span>
    </div>
    ${diceRowMiniHTML(rolls)}
    <div class="small">Dice <b>${attack}</b>${modAdd?` + Mod <b>+${modAdd}</b>`:''} (${esc(modLabel)})${pending?` · +${pending}⚡ next`:''}${scarLab?` · Scar ${esc(scarLab)}`:''}</div>
    ${hostExtra}
  </div>`;
}

function verdictHTML(r){
  const res = G.rounds[r].result;
  if (!res) return '';
  let banner = '';
  let body = '';
  if (res.kind==='training'){
    banner = `<div class="result-banner h">TRAINING COMPLETE</div>`;
  } else if (res.kind==='skirmish'){
    banner = `<div class="result-banner h">CREW SKIRMISH</div>`;
  } else if (res.kind==='infection'){
    banner = `<div class="result-banner ${res.hostWins?'p':'h'}">${res.hostWins ? 'THE HOST FEASTS' : 'THE CREW HOLDS'}</div>`;
    const crewN = res.crewSize != null ? res.crewSize : Math.max(1, rosterOf(G).length-1);
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew (${crewN})</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">${whoHTML(res.hostId,{short:true})}+bug</div><div class="val">${Math.round(res.hostTotal)}</div></div>
    </div>
    ${res.growth?`<div class="small center" style="margin:6px 0">Growth: <b>${esc(growthTitle(res.growth.key))}</b> · Boss Meter ${res.bossMeter}</div>`:''}
    ${(!res.hostWins && res.baseAttackBump)?`<div class="small center" style="margin:6px 0;color:var(--bio)">${tip('baseAtk','Base Attack')} +${res.baseAttackBump} (crew held — parasite grows)</div>`:''}`;
  } else if (res.kind==='boss'){
    banner = `<div class="result-banner ${res.cleared?'h':'p'}">${res.cleared ? 'THE CREW SLAYS THE BEAST' : 'THE PARASITE ESCAPES'}</div>`;
    body = `<div class="vs-bar">
      <div class="vs-side h"><div class="lbl">Crew</div><div class="val">${Math.round(res.crewTotal)}</div></div>
      <div class="vs-x">vs</div>
      <div class="vs-side p"><div class="lbl">Boss HP</div><div class="val">${res.hp}</div></div>
    </div>
    <div class="small center">${res.cleared ? `Hero: ${whoHTML(res.hero)}` : 'It slips into the vents. Hollow victory on points.'}</div>`;
  }

  // Order: host first if infection, else by total desc
  let order = rosterOf(G).slice();
  if (res.kind==='infection' && res.hostId){
    order = [res.hostId, ...order.filter(p=>p!==res.hostId)];
  } else {
    order.sort((a,b)=>{
      const ta = (res.breakdown && res.breakdown[a] ? res.breakdown[a].total : (res.totals&&res.totals[a])||0);
      const tb = (res.breakdown && res.breakdown[b] ? res.breakdown[b].total : (res.totals&&res.totals[b])||0);
      return tb-ta;
    });
  }
  const review = `<div class="lane-label">Dice review</div>${order.map(p=>playerReviewCardHTML(p, res)).join('')}`;

  const awards = res.awards || {};
  const awardRows = rosterOf(G).map(p=>{
    const a = awards[p] || {pts:0,energy:0,tags:[]};
    const badges = (a.tags||[]).map(t=>{
      if (t==='mvp') return '<span class="badge mvp">MVP</span>';
      if (t.startsWith('cat-')) return `<span class="badge ${t}">${t.slice(4)}</span>`;
      if (t==='kill') return '<span class="badge mvp">KILL</span>';
      return '';
    }).join('');
    const pend = (res.breakdown && res.breakdown[p] && res.breakdown[p].pendingEnergy) ? ` · mod +${res.breakdown[p].pendingEnergy}⚡` : '';
    return `<div class="award-row"><span class="who">${whoHTML(p,{bold:false})}${badges}</span>
      <span>+${a.pts}pts · +${a.energy}⚡${pend}</span></div>`;
  }).join('');

  return `<div class="panel">${banner}${body}</div>
    ${review}
    <div class="panel"><div class="lane-label" style="margin-top:0">Awards</div>${awardRows}
    <button class="btn" style="margin-top:12px" onclick="dismissVerdict(${r})">Continue</button>
  </div>`;
}
function dismissVerdict(r){
  markSeen(r);
  animating = false;
  render();
}

function finalScreen(){
  const escaped = !!G.escaped;
  return `<div style="padding-top:5vh">
    <div class="center">${escaped ? parasiteArtHTML(120,4) : '<div style="font-size:48px;font-family:Orbitron">HERO</div>'}</div>
    <h1 class="center brand-hero" style="font-size:22px">${escaped ? 'ESCAPED' : 'FINAL SCORES'}</h1>
    <p class="center small">${escaped ? 'The parasite got away. Rank the survivors anyway.' : `10 rounds. ${tableSize(G)} players. Host seats random (max 2). One hero.`}</p>
    <div id="revealZone" style="margin-top:18px"></div>
    <div id="newGameZone" class="hidden" style="margin-top:20px">
      <button class="btn" onclick="confirmResetGame()">Play again</button>
    </div>
  </div>`;
}
function runFinalReveal(){
  const ranked = rosterOf(G).map(p=>({p, pts:G.players[p].pts})).sort((a,b)=>a.pts-b.pts);
  const zone = $('#revealZone');
  if (!zone || zone.dataset.ran) return;
  zone.dataset.ran = '1';
  const n = ranked.length;
  ranked.forEach((e,i)=>{
    setTimeout(()=>{
      const isWin = i===ranked.length-1;
      const place = n - i; // 1 = winner
      const row = document.createElement('div');
      row.className = 'reveal-row'+(isWin?' winner':'');
      row.innerHTML = `<span class="place">${ordinalPlace(place)}</span>
        ${whoHTML(e.p)}${isWin?' <span class="badge mvp">HERO</span>':''}
        <span class="pts-final">0</span>`;
      zone.prepend(row);
      requestAnimationFrame(()=>row.classList.add('show'));
      countUp(row.querySelector('.pts-final'), e.pts);
      if (isWin){ confettiBurst(); $('#newGameZone').classList.remove('hidden'); }
    }, 900*i + 400);
  });
}
function countUp(el, target){
  const t0 = performance.now();
  const dur = 900;
  function frame(t){
    const k = Math.min(1, (t-t0)/dur);
    el.textContent = Math.round(target * (0.5-Math.cos(Math.PI*k)/2));
    if (k<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function confettiBurst(){
  const glyphs = ['*','+','✦','·'];
  for (let i=0;i<40;i++){
    const s = document.createElement('span');
    s.className = 'confetti';
    s.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.animationDuration = (2+Math.random()*2.5)+'s';
    s.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 6000);
  }
}

/* ================= BOOT ================= */
(function boot(){
  const sf = $('#starfield');
  for (let i=0;i<60;i++){
    const s = document.createElement('i');
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = Math.random()*3+'s';
    sf.appendChild(s);
  }
  if (configOK()) initFirebase();
  render();
})();
</script></body></html>
